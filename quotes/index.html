  {"q":"I'm not a concept. I'm just a fucked-up girl who's looking for my own peace of mind.","src":"Eternal Sunshine of the Spotless Mind","year":2004,"type":"movie","char":"Clementine Kruczynski","actors":[{"name":"Kate Winslet","role":"Clementine Kruczynski"}],"desc":"Clementine refusing to be Joel's salvation fantasy. The most important line in the film — said near the beginning, heard near the end. She told him exactly who she was. He didn't listen.","trivia":["Kate Winslet read the script in one sitting and called Charlie Kaufman directly to tell him she had to be in it.","Michel Gondry and Kaufman agreed Clementine should dye her hair a different colour in every scene."],"cat":"Identity","retort":"Clementine says this near the beginning. Joel doesn't hear it. The film is about what happens when you don't listen to people when they tell you who they are."},

  {"q":"Identity is a prison you can never escape, but the way to redeem your past is not to run from it, but to try to understand it.","src":"The Wire","year":2002,"type":"tv","char":"Proposition Joe","actors":[{"name":"Robert F. Chew","role":"Proposition Joe"}],"desc":"Said with the casual authority of a man who has lived inside one identity his entire life and knows exactly its dimensions. Not resignation — clarity.","trivia":["The Wire ran for five seasons and was largely ignored by awards bodies during its run.","It is now consistently rated among the greatest television dramas ever made."],"cat":"Identity","retort":"Prop Joe says this with the quiet certainty of a man who has lived in his identity his entire life and knows every wall of it."},

  {"q":"In the beginning was the Word. And the Word was with God, and the Word was God. And that's a lie.","src":"Leap of Faith","year":1992,"type":"movie","char":"Jonas Nightengale","actors":[{"name":"Steve Martin","role":"Jonas Nightengale"}],"desc":"A fraudulent faith healer contradicting scripture in his own sermon — and nobody notices. The satire is about how comfortable the lie is, and how much people need it to be true.","trivia":["Steve Martin based aspects of the character on research into televangelist scandals of the 1980s.","The film flopped on release but has been reconsidered as one of Martin's most serious performances."],"cat":"Truth","retort":"Jonas Nightengale contradicts scripture in his own sermon. Nobody notices. The satire is about how comfortable the lie is and how much people need it."},

  {"q":"The truth is rarely pure and never simple.","src":"The Importance of Being Earnest","year":2002,"type":"movie","char":"Algernon Moncrieff","actors":[{"name":"Rupert Everett","role":"Algernon Moncrieff"}],"desc":"Oscar Wilde's epigram — the funniest thing ever said about honesty. Every attempt to be straightforward discovers that reality refuses to cooperate.","trivia":["Oscar Wilde wrote The Importance of Being Earnest in 1895.","It was first performed three months before Wilde was arrested."],"cat":"Truth","retort":"Wilde wrote this in a comedy about people lying about their names for trivial reasons. He was arrested roughly two months after it opened, for something considerably less trivial."},

  {"q":"Cheat on a good woman and karma makes sure you end up with the bitch you deserve.","src":"Burn After Reading","year":2008,"type":"movie","char":"Chad Feldheimer","actors":[{"name":"Brad Pitt","role":"Chad Feldheimer"}],"desc":"The Coens hid a genuine moral observation inside their most deliberately stupid character. That's the joke — and the point.","trivia":["Brad Pitt prepared for Chad by spending time in gyms listening to conversations.","The Coen Brothers said they wrote Chad specifically for Pitt after No Country for Old Men."],"cat":"Truth","retort":"Chad Feldheimer says this while blackmailing someone with a sex tape. He is the dumbest person in a Coen Brothers film, which is saying something."},

  {"q":"The truth will set you free, but first it will piss you off.","src":"Erin Brockovich","year":2000,"type":"movie","char":"Erin Brockovich","actors":[{"name":"Julia Roberts","role":"Erin Brockovich"}],"desc":"Said in a legal deposition, but it's a complete description of how revelation actually works. Honesty isn't gentle. It's disruptive first.","trivia":["Julia Roberts won the Academy Award for Best Actress for this role.","The real Erin Brockovich had a cameo as a waitress in the film."],"cat":"Truth","retort":"Said while preparing a $333 million lawsuit against a corporation that poisoned a town's water supply for decades. The pissed off part took years."},

  {"q":"Everybody lies. The only variable is about what.","src":"House","year":2004,"type":"tv","char":"Gregory House","actors":[{"name":"Hugh Laurie","role":"Gregory House"}],"desc":"House's foundational axiom — and the reason he's a great diagnostician. He's not cynical about it. He uses it. Patients lie to their doctors about symptoms, habits, everything. You have to account for the lie.","trivia":["Hugh Laurie auditioned for the role from a hotel bathroom in Namibia, filming himself on a handheld camera.","The character was loosely based on Sherlock Holmes — even the name is a near-homophone."],"cat":"Truth","retort":"House builds his entire diagnostic method on this premise. He is also the most dishonest person in the hospital."},

  {"q":"A man is not finished when he is defeated. He is finished when he quits.","src":"Nixon","year":1995,"type":"movie","char":"Richard Nixon","actors":[{"name":"Anthony Hopkins","role":"Richard Nixon"}],"desc":"Nixon says this before his resignation — a man simultaneously displaying genuine resilience and utter inability to understand why he has to leave. The line is admirable and tragic at the same time.","trivia":["Anthony Hopkins watched hours of Nixon footage and said the hardest part was not doing an impression.","Oliver Stone interviewed Nixon staffers for a year before writing the script."],"cat":"Truth","retort":"Nixon says this before resigning the presidency. The distinction between defeat and quitting collapsed in the moment he said it."},

  {"q":"The curious paradox is that when I accept myself just as I am, then I can change.","src":"Ordinary People","year":1980,"type":"movie","char":"Dr. Berger","actors":[{"name":"Judd Hirsch","role":"Dr. Berger"}],"desc":"Carl Rogers's insight, put into a screenplay. Self-criticism doesn't produce change — it produces paralysis. The starting point is always acceptance of what actually is.","trivia":["Alvin Sargent won the Academy Award for Best Adapted Screenplay for Ordinary People.","The film was based on Judith Guest's novel, her debut."],"cat":"Self-Knowledge","retort":"Carl Rogers wrote this in 1961. Most people skip the acceptance and go directly to the self-improvement. That's why it doesn't work."},

  {"q":"The privilege of a lifetime is to become who you truly are.","src":"Boyhood","year":2014,"type":"movie","char":"Mason Sr.","actors":[{"name":"Ethan Hawke","role":"Mason Sr."}],"desc":"Mason's father — a man who didn't become who he was until late — saying this to his son who has his whole life still open. The line passes the baton without sentimentality.","trivia":["Boyhood was filmed over 12 years using the same cast.","Richard Linklater had no script — he wrote each section just before filming it each year."],"cat":"Self-Knowledge","retort":"Mason's father says this having spent most of Mason's childhood not being present for that becoming."},

  {"q":"What you are is what you have been. What you'll be is what you do now.","src":"Kundun","year":1997,"type":"movie","char":"The Dalai Lama","actors":[{"name":"Tenzin Thuthob Tsarong","role":"Dalai Lama"}],"desc":"The Buddha's teaching on karma, rendered in the most stripped-down form possible. The past is fixed. The present is the only lever you have.","trivia":["Martin Scorsese has said Kundun is the most personal film he has made.","The film was shot entirely in Morocco, standing in for Tibet."],"cat":"Self-Knowledge","retort":"The Dalai Lama learned this in practice, having been exiled from his home country in his mid-twenties. He has been living it ever since."},

  {"q":"The unexamined life is not worth living.","src":"Wit","year":2001,"type":"movie","char":"Vivian Bearing","actors":[{"name":"Emma Thompson","role":"Vivian Bearing"}],"desc":"A professor of John Donne's poetry is dying of cancer. She has spent her life in the examined life — and the film asks whether that was enough. Socrates's line as an open question, not a settled answer.","trivia":["Emma Thompson won the Emmy and SAG Award for this HBO film.","Director Mike Nichols said the film was the most difficult and most important work of his career."],"cat":"Self-Knowledge","retort":"Socrates said this before his trial. The jury executed him anyway. The examined life did not protect him from the city he loved."},

  {"q":"Most people are other people. Their thoughts are someone else's opinions, their lives a mimicry, their passions a quotation.","src":"De Profundis","year":1997,"type":"movie","char":"Oscar Wilde","actors":[{"name":"Stephen Fry","role":"Oscar Wilde"}],"desc":"Wilde writing from prison — a man who had been more himself than almost anyone, reflecting on the cost. This isn't contempt for others. It's horror at the waste.","trivia":["De Profundis was written as a letter by Wilde to Lord Alfred Douglas during his imprisonment in Reading Gaol.","It was not published in full until 1962, more than 60 years after his death."],"cat":"Self-Knowledge","retort":"Wilde wrote this from prison. He had been more fully himself than almost anyone. The cost was two years' hard labour and his health."},

  {"q":"To die would be an awfully big adventure.","src":"Hook","year":1991,"type":"movie","char":"Peter Pan","actors":[{"name":"Robin Williams","role":"Peter Banning / Peter Pan"}],"desc":"J.M. Barrie's line — Peter saying it with the confidence of someone who has never had to reckon with it. Heard again in adulthood, after loss, it sounds completely different.","trivia":["Robin Williams reportedly improvised many of his scenes with the Lost Boys.","Steven Spielberg has called Hook the film of his he is least satisfied with — and most fond of."],"cat":"Mortality","retort":"Peter Pan says this as a child who cannot die. Every adult who has heard it carries a different version of what it means."},

  {"q":"We're all just walking each other home.","src":"Harold and Maude","year":1971,"type":"movie","char":"Maude","actors":[{"name":"Ruth Gordon","role":"Maude"}],"desc":"Maude, 79 years old and more alive than anyone in the film, on what human life is for. Not achievement, not accumulation — accompaniment. You walk with people until it's their turn.","trivia":["The film was a massive box office failure on release and has since become a cult classic.","Cat Stevens wrote and recorded the entire soundtrack specifically for the film."],"cat":"Mortality","retort":"Maude says this at 79, having lived more fully than almost anyone in the film. The walking, for her, has been the point all along."},

  {"q":"It doesn't matter if you're born in a duck yard, as long as you are hatched from a swan's egg.","src":"Never Let Me Go","year":2010,"type":"movie","char":"Kathy H.","actors":[{"name":"Carey Mulligan","role":"Kathy H."}],"desc":"Kathy — raised to be harvested for her organs — applying a fairy tale to her own life. The tenderness with which she does it is more devastating than any anger would be.","trivia":["Kazuo Ishiguro said Never Let Me Go was the most painful book he wrote.","Mark Romanek shot the film in chronological order so the actors could age into their characters."],"cat":"Mortality","retort":"Kathy applies the fairy tale to her own life, knowing what she was created for. The tenderness with which she does it is more devastating than any anger would be."},

  {"q":"You only live twice. Once when you are born, and once when you look death in the face.","src":"You Only Live Twice","year":1967,"type":"movie","char":"Tiger Tanaka","actors":[{"name":"Tetsuro Tamba","role":"Tiger Tanaka"}],"desc":"From Ian Fleming, via the screenplay — a line that is far too true to be left in a Bond film. The quote is from Bashō. Fleming wrapped it in espionage. It survived the wrapper.","trivia":["The title comes from a haiku by Ian Fleming, loosely based on a poem by Matsuo Bashō.","This was Sean Connery's fifth Bond film and his last for United Artists."],"cat":"Mortality","retort":"Ian Fleming put a Bashō haiku in a spy novel. The line survived the wrapper because it was already true before it got there."},

  {"q":"Time is the longest distance between two places.","src":"The Glass Menagerie","year":1987,"type":"movie","char":"Tom Wingfield","actors":[{"name":"John Malkovich","role":"Tom Wingfield"}],"desc":"Tennessee Williams's line — Tom's final reflection on the sister he left behind. Distance measured not in miles but in the irrecoverable years between who you were and who you became.","trivia":["The Glass Menagerie is Tennessee Williams's most autobiographical play.","Williams based Tom on himself and Laura on his sister Rose, who was lobotomised at 28."],"cat":"Mortality","retort":"Tom says this in his closing narration, having left his sister behind in St. Louis. Tennessee Williams based Tom on himself. He left. He wrote about it for the rest of his life."},

  {"q":"All you have is what you are, and what you give.","src":"Babylon 5","year":1996,"type":"tv","char":"Delenn","actors":[{"name":"Mira Furlan","role":"Delenn"}],"desc":"Said at a memorial — the simplest possible accounting of a life. Not what you accumulated. Not what you achieved. What you gave.","trivia":["Mira Furlan played Delenn for all five seasons and said it was the role that defined her career.","J. Michael Straczynski wrote almost every episode of the series himself — an almost unparalleled feat."],"cat":"Mortality","retort":"Said at a memorial for a billion people. The accounting is all that's left when everything else is gone."},

  {"q":"You gain strength, courage, and confidence by every experience in which you really stop to look fear in the face.","src":"The Iron Lady","year":2011,"type":"movie","char":"Margaret Thatcher","actors":[{"name":"Meryl Streep","role":"Margaret Thatcher"}],"desc":"Eleanor Roosevelt's line, spoken by Thatcher — who understood that will was the only tool she had when every institution resisted her. The application doesn't require you to agree with what she did with the courage.","trivia":["Meryl Streep won her third Academy Award for this role.","She spent months studying Thatcher's voice, posture, and movement patterns."],"cat":"Courage","retort":"Eleanor Roosevelt said this. She was also deeply lonely for much of her adult life. The strength and the loneliness coexisted."},

  {"q":"It is not the critic who counts. The credit belongs to the man who is actually in the arena.","src":"Frost/Nixon","year":2008,"type":"movie","char":"Richard Nixon","actors":[{"name":"Frank Langella","role":"Richard Nixon"}],"desc":"Theodore Roosevelt's line, quoted by Nixon at his lowest moment — a man who genuinely believed in the arena even as he destroyed himself in it. The tragedy is that the belief was real.","trivia":["Frank Langella originated the role on Broadway and won the Tony Award.","Ron Howard said the interview scene was filmed over 10 days and felt like watching a boxing match."],"cat":"Courage","retort":"Theodore Roosevelt said this in 1910. Nixon quoted it the night before he resigned. The arena had already ended him. He believed in it anyway."},

  {"q":"I must not fear. Fear is the mind-killer.","src":"Dune","year":2021,"type":"movie","char":"Paul Atreides","actors":[{"name":"Timothée Chalamet","role":"Paul Atreides"}],"desc":"Frank Herbert's Bene Gesserit litany — a cognitive technique for surviving terror. The insight is that fear doesn't protect you, it paralyses you. Acknowledge it, let it pass, move.","trivia":["Denis Villeneuve said this was the line he was most afraid of including because it's so familiar to fans.","The litany appears in the first pages of Herbert's 1965 novel."],"cat":"Courage","retort":"The litany is a cognitive technique, not a cure. Paul says it at the beginning and at the end. He is still afraid, both times."},

  {"q":"The cave you fear to enter holds the treasure you seek.","src":"The Power of Myth","year":1988,"type":"tv","char":"Joseph Campbell","actors":[{"name":"Joseph Campbell","role":"Himself"}],"desc":"Campbell's distillation of the hero's journey into a single sentence. Whatever you are most avoiding is almost certainly what you most need to face.","trivia":["The Power of Myth was filmed at George Lucas's Skywalker Ranch — Lucas credited Campbell's work as foundational to Star Wars.","The series aired on PBS in 1988 and introduced Campbell's ideas to a mass audience."],"cat":"Courage","retort":"Campbell said this at Skywalker Ranch. George Lucas built a franchise on the idea. Campbell spent fifty years in the cave. The treasure was myth itself."},

  

  {"q":"The moment you make a mistake in chess, you're dead. But in the game of life, you can undo your mistakes — if you have the courage.","src":"Searching for Bobby Fischer","year":1993,"type":"movie","char":"Bruce Pandolfini","actors":[{"name":"Ben Kingsley","role":"Bruce Pandolfini"}],"desc":"The chess teacher articulating what separates the game from living — in life, unlike chess, the board can be rearranged. But you have to be willing to admit the mistake first.","trivia":["Ben Kingsley prepared by spending time with real chess coaches.","The real Josh Waitzkin went on to become a tai chi champion after his chess career."],"cat":"Choices","retort":"The chess mistake ends the game instantly and completely. The life mistake keeps going, and the board looks different, and you have to keep playing."},

  {"q":"You can't make an omelette without breaking eggs. Every decision has a cost. The question is what you can live with.","src":"The Americans","year":2016,"type":"tv","char":"Philip Jennings","actors":[{"name":"Matthew Rhys","role":"Philip Jennings"}],"desc":"A KGB spy reckoning with what he has done in service of an ideology he no longer believes in. The line is banal. The context makes it devastating.","trivia":["Matthew Rhys won the Emmy for Best Actor in the final season.","Showrunner Joe Weisberg was a former CIA officer — he brought unusual authenticity to the procedural elements."],"cat":"Choices","retort":"Philip has been making this calculation for twenty years as a KGB spy. The question of what he can live with is the question the whole show is asking."},

  {"q":"We are the choices we have made.","src":"Minority Report","year":2002,"type":"movie","char":"John Anderton","actors":[{"name":"Tom Cruise","role":"John Anderton"}],"desc":"The film's paradox made explicit — a man who arrests people for crimes they haven't committed yet, confronting the idea that character is built from what you have actually chosen, not what you might choose.","trivia":["Philip K. Dick's 1956 short story was substantially expanded for the screenplay.","Steven Spielberg consulted MIT scientists and futurists before designing the film's technology."],"cat":"Choices","retort":"Said in a world where crimes are predicted before they happen. The film asks whether choices that haven't occurred yet are still yours."},

  {"q":"Love is not breathlessness, it is not excitement, it is not the promulgation of promises of eternal passion. That is just being in love, which any fool can do. Love itself is what is left over when being in love has burned away.","src":"Captain Corelli's Mandolin","year":2001,"type":"movie","char":"Dr. Iannis","actors":[{"name":"John Hurt","role":"Dr. Iannis"}],"desc":"A father's speech to his daughter — distinguishing the feeling from the fact. Being in love is the kindling. Love is what the fire becomes when it settles.","trivia":["The line is from Louis de Bernières's novel, largely unchanged from the original.","John Hurt said he considered it the finest speech he ever delivered on screen."],"cat":"Relationships","retort":"Dr. Iannis says this to his daughter on her wedding day. She doesn't believe him yet. That's also part of the design."},

  {"q":"I have learned silence from the talkative, tolerance from the intolerant, and kindness from the unkind. I should not be ungrateful to those teachers.","src":"The Prophet","year":2014,"type":"movie","char":"Almustafa","actors":[{"name":"Liam Neeson","role":"Almustafa"}],"desc":"Kahlil Gibran's observation — that the worst people in your life have often taught you the most important things, precisely by being bad examples. A genuinely unusual form of gratitude.","trivia":["Kahlil Gibran's The Prophet was first published in 1923 and has never been out of print.","The animated film adaptation used different directors for each chapter."],"cat":"Relationships","retort":"Gibran wrote this from exile in New York, learning from the people around him who gave him the worst examples. A genuinely unusual form of gratitude."},

  {"q":"The best love is the kind that awakens the soul and makes us reach for more.","src":"The Notebook","year":2004,"type":"movie","char":"Noah Calhoun","actors":[{"name":"Ryan Gosling","role":"Noah Calhoun"}],"desc":"Noah's letter — sentimental on the surface, precise underneath. Not comfort. Not safety. The kind of love that demands more of you.","trivia":["Ryan Gosling and Rachel McAdams famously did not get along during filming.","They later dated for three years after the film's release."],"cat":"Relationships","retort":"Noah writes this in a letter. The film is built around what that kind of love looks like over a lifetime — not in the breathless early days, but in everything that comes after."},

  {"q":"Loving someone and being loved is the most important thing in the world. But you can't make someone love you.","src":"Halt and Catch Fire","year":2017,"type":"tv","char":"Cameron Howe","actors":[{"name":"Mackenzie Davis","role":"Cameron Howe"}],"desc":"Cameron, at the end of a decade of trying — saying the truest thing about desire and its limits. The show's final season is about learning to stop trying to earn love through achievement.","trivia":["Halt and Catch Fire was largely ignored during its run and has since become a cult classic.","Mackenzie Davis has said Cameron Howe is the role she is proudest of."],"cat":"Relationships","retort":"Cameron says this after a decade of building companies, partly to earn love through achievement. The stopping felt like dying. It wasn't."},

  {"q":"The mystery of human existence lies not in just staying alive, but in finding something to live for.","src":"The Brothers Karamazov","year":2008,"type":"movie","char":"Ivan Karamazov","actors":[{"name":"Sergei Nikonenko","role":"Ivan Karamazov"}],"desc":"Dostoevsky's Ivan — the intellectual brother who can demolish every argument for God and still cannot find a reason to continue. The mystery isn't death. It's meaning.","trivia":["The Brothers Karamazov was Dostoevsky's final novel, completed months before his death in 1881.","Dostoevsky considered it his masterwork."],"cat":"Purpose","retort":"Ivan Karamazov can articulate the mystery with complete precision. He cannot find an answer for himself. He hands the question to Alyosha, who carries it differently."},

  

  {"q":"The purpose of life is to be defeated by greater and greater things.","src":"Rilke on Love and Other Difficulties","year":1975,"type":"movie","char":"Rainer Maria Rilke","actors":[{"name":"Bruno Ganz","role":"Narrator"}],"desc":"Rilke's letter to a young poet — saying that the point isn't to win, it's to keep encountering things large enough to require your full self. Defeat by worthy things is a form of growth.","trivia":["Rilke's Letters to a Young Poet has never been out of print since its publication in 1929.","The letters were written between 1902 and 1908 to Franz Xaver Kappus, a young military officer."],"cat":"Purpose","retort":"Rilke wrote this to a 19-year-old soldier. Rilke died at 51. He kept encountering larger things until the largest one arrived."},

  {"q":"The weird thing about grief is that you can't see it in people. They look exactly the same as before.","src":"Rectify","year":2013,"type":"tv","char":"Daniel Holden","actors":[{"name":"Aden Young","role":"Daniel Holden"}],"desc":"Daniel, trying to understand the world he's re-entered after 19 years. The observation is about the privacy of suffering — it doesn't show, which means nobody knows when to help.","trivia":["Rectify ran for four seasons on the Sundance Channel and received widespread critical acclaim.","Creator Ray McKinnon deliberately avoided sensationalism throughout the series."],"cat":"Grief","retort":"Daniel says this three days after leaving death row. He has been watching the world through a window for nineteen years, looking for exactly this kind of clue."},

  {"q":"Grief is just love with nowhere to go.","src":"The Chosen","year":2020,"type":"tv","char":"Matthew","actors":[{"name":"Paras Patel","role":"Matthew"}],"desc":"The most economical definition of grief in existence — it reframes loss as the continuation of love, not its ending. The love didn't stop. The person did.","trivia":["The Chosen is the most-watched crowdfunded media project in history.","This line became one of the most shared quotes from the series online."],"cat":"Grief","retort":"The most economical definition of grief ever written. It reframes loss as the continuation of love, not its ending. The love didn't stop. The person did."},

  {"q":"You were my greatest adventure.","src":"The Incredibles","year":2004,"type":"movie","char":"Bob Parr","actors":[{"name":"Craig T. Nelson","role":"Bob Parr / Mr. Incredible"}],"desc":"Said to his family — the hero discovering that the thing he had been treating as a limitation was the whole point. The adventure wasn't out there. It was home.","trivia":["Brad Bird wrote the film based partly on his own experience of feeling overlooked.","The film was the first entirely CGI film to win the Academy Award for Best Animated Feature."],"cat":"Grief","retort":"Bob says this to his family at the end of a film where he spent the whole time trying to escape back into a bigger life. He was swimming in the adventure the whole time."},

  {"q":"The unexamined life is not worth living.","src":"Socrates","year":-399,"type":"historical","char":"Socrates","person":"Socrates","born":"c. 470 BC","died":"399 BC","era":"Ancient Greece","actors":[],"desc":"Said at his trial in Athens, where he was sentenced to death for corrupting the youth and impiety. He chose death over exile rather than stop philosophising. The line is either the foundation of Western thought or the most arrogant thing anyone has ever said — possibly both.","trivia":["Socrates wrote nothing. All his words come through Plato, who was his student.","He drank hemlock voluntarily, calmly, surrounded by his students."],"cat":"Self-Knowledge"},

  {"q":"In the middle of difficulty lies opportunity.","src":"Albert Einstein","year":1940,"type":"historical","char":"Albert Einstein","person":"Albert Einstein","born":"1879","died":"1955","era":"20th Century","actors":[],"desc":"Einstein spent much of his life navigating difficulty — stateless for years, Jewish in Europe in the 1930s, eventually forced to flee Germany. The line isn't optimism. It's the observation of a man who used every constraint as a forcing function.","trivia":["Einstein renounced his German citizenship in 1933 the same year Hitler came to power.","He was offered the presidency of Israel in 1952 and declined."],"cat":"Courage"},

  {"q":"We are what we repeatedly do. Excellence, then, is not an act, but a habit.","src":"Aristotle","year":-330,"type":"historical","char":"Aristotle","person":"Aristotle","born":"384 BC","died":"322 BC","era":"Ancient Greece","actors":[],"desc":"From the Nicomachean Ethics. Aristotle's entire moral philosophy rests on this: character isn't what you decide in a moment, it's what you build through repetition. Who you are is the aggregate of your days, not your peak moments.","trivia":["This exact phrasing is actually a paraphrase by Will Durant — Aristotle's original is more nuanced.","Aristotle tutored Alexander the Great from age 13."],"cat":"Self-Knowledge"},

  {"q":"It does not matter how slowly you go as long as you do not stop.","src":"Confucius","year":-479,"type":"historical","char":"Confucius","person":"Confucius","born":"551 BC","died":"479 BC","era":"Ancient China","actors":[],"desc":"Confucius spent his life trying to get hired by rulers who would let him implement his ideals of just governance. They never did. He kept going anyway, and died thinking he had failed. Two thousand years later, his ideas structured the largest civilisation on earth.","trivia":["The Analects — the record of his sayings — were compiled by his students after his death.","Confucius spent 13 years wandering between states seeking a ruler who would listen to him."],"cat":"Purpose"},

  {"q":"Be the change you wish to see in the world.","src":"Mahatma Gandhi","year":1913,"type":"historical","char":"Mahatma Gandhi","person":"Mahatma Gandhi","born":"1869","died":"1948","era":"20th Century","actors":[],"desc":"Gandhi's actual position was more demanding: we cannot demand of others what we will not embody ourselves. He lived this — spinning his own cotton, practising poverty, submitting to violence without returning it. The quote is popular because people say it. Gandhi was remarkable because he did it.","trivia":["Gandhi was nominated for the Nobel Peace Prize five times and never received it.","He trained as a barrister in London and was initially thrown off a train in South Africa for sitting in the wrong class."],"cat":"Choices"},

  {"q":"I have a dream that my four little children will one day live in a nation where they will not be judged by the colour of their skin but by the content of their character.","src":"Martin Luther King Jr.","year":1963,"type":"historical","char":"Martin Luther King Jr.","person":"Martin Luther King Jr.","born":"1929","died":"1968","era":"20th Century","actors":[],"desc":"Delivered at the March on Washington, August 28, 1963, to 250,000 people. King had used the 'dream' language before in smaller speeches — Mahalia Jackson shouted 'tell them about the dream!' from behind him and he set aside his prepared text. The speech's most famous passage was improvised.","trivia":["King was 34 years old when he delivered this speech.","He was assassinated five years later in Memphis while supporting striking sanitation workers."],"cat":"Freedom"},

  {"q":"To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.","src":"Ralph Waldo Emerson","year":1841,"type":"historical","char":"Ralph Waldo Emerson","person":"Ralph Waldo Emerson","born":"1803","died":"1882","era":"19th Century","actors":[],"desc":"From Self-Reliance. Emerson's argument was that society, tradition, and consistency all conspire to make you a diminished version of yourself. Conformity is the enemy. His student Thoreau took this seriously enough to go live alone in the woods.","trivia":["Thoreau was Emerson's protégé and lived at Walden Pond on land Emerson owned.","Emerson lost his first wife to tuberculosis after 17 months of marriage. She was 20."],"cat":"Identity"},

  {"q":"The only true wisdom is in knowing you know nothing.","src":"Socrates","year":-399,"type":"historical","char":"Socrates","person":"Socrates","born":"c. 470 BC","died":"399 BC","era":"Ancient Greece","actors":[],"desc":"The Oracle at Delphi called Socrates the wisest man in Athens. He went around trying to disprove this by finding someone wiser. Every expert he questioned turned out to know less than they thought. He concluded the Oracle was right — he alone knew that he knew nothing.","trivia":["The Oracle at Delphi's pronouncement is reported by Socrates in Plato's Apology.","Socrates also said he was a midwife of ideas — his job was to help others give birth to their own thoughts."],"cat":"Truth"},

  {"q":"Not all those who wander are lost.","src":"J.R.R. Tolkien","year":1954,"type":"historical","char":"J.R.R. Tolkien","person":"J.R.R. Tolkien","born":"1892","died":"1973","era":"20th Century","actors":[],"desc":"From a poem about Aragorn in The Fellowship of the Ring. Tolkien wrote it as a description of a man who moves through the world without revealing his true nature or destination — which is very different from being aimless. He knew exactly where he was going. He just wasn't telling.","trivia":["Tolkien was a professor of Anglo-Saxon at Oxford and invented multiple complete languages for his fiction.","He served in the Battle of the Somme. Two of his three closest friends died there."],"cat":"Purpose"},

  {"q":"In three words I can sum up everything I've learned about life: it goes on.","src":"Robert Frost","year":1936,"type":"historical","char":"Robert Frost","person":"Robert Frost","born":"1874","died":"1963","era":"20th Century","actors":[],"desc":"Frost's life was saturated with loss — a son by suicide, a daughter by puerperal fever, a wife dead young. The line could be resignation. Or it could be the most defiant thing anyone ever said: the world does not stop for your grief. And somehow, that's the thing that gets you through it.","trivia":["Frost won the Pulitzer Prize for Poetry four times — more than any other poet.","He read a poem at John F. Kennedy's inauguration in 1961. The sun was so bright he couldn't see his prepared text, so he recited a different poem from memory."],"cat":"Grief"},

  {"q":"The secret of getting ahead is getting started.","src":"Mark Twain","year":1890,"type":"historical","char":"Mark Twain","person":"Mark Twain","born":"1835","died":"1910","era":"19th Century","actors":[],"desc":"Twain declared bankruptcy at 55 after a series of bad investments and spent his final years lecturing around the world to pay his debts. He paid every creditor back in full. He had no choice but to know this from the inside.","trivia":["Mark Twain is a pen name — his real name was Samuel Clemens.","He was born the year of Halley's Comet and predicted he would die when it returned. He did, in 1910."],"cat":"Choices"},

  {"q":"Whatever you are, be a good one.","src":"Abraham Lincoln","year":1858,"type":"historical","char":"Abraham Lincoln","person":"Abraham Lincoln","born":"1809","died":"1865","era":"19th Century","actors":[],"desc":"Lincoln was a frontier lawyer, a failed businessman, a failed politician multiple times over before the presidency. The line is not about ambition. It's about integrity in whatever role you find yourself — which is the harder, and rarer, thing.","trivia":["Lincoln is enshrined in the Wrestling Hall of Fame — he lost only one match in 300 bouts as a young man.","He taught himself law by reading borrowed books by firelight."],"cat":"Identity"},

  {"q":"It is during our darkest moments that we must focus to see the light.","src":"Aristotle","year":-330,"type":"historical","char":"Aristotle","person":"Aristotle","born":"384 BC","died":"322 BC","era":"Ancient Greece","actors":[],"desc":"Aristotle's eudaimonia — human flourishing — was never about comfort. It was about functioning well precisely when functioning is hardest. The capacity to orient toward light in darkness was not a gift. It was a trained disposition, built in better times for worse ones.","trivia":["Aristotle founded the Lyceum in Athens — the school where he lectured while walking, giving rise to the term 'peripatetic' philosophy.","He wrote on biology, physics, logic, ethics, politics, and aesthetics — most of his works are lecture notes, not polished texts."],"cat":"Courage"},

  {"q":"Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.","src":"Albert Einstein","year":1945,"type":"historical","char":"Albert Einstein","person":"Albert Einstein","born":"1879","died":"1955","era":"20th Century","actors":[],"desc":"Einstein said this in a letter after the atomic bomb. He had signed the letter to Roosevelt urging the Manhattan Project, and spent the rest of his life reckoning with it. The joke is funnier and more desolate when you know where he was standing.","trivia":["Einstein's letter to Roosevelt warning of German nuclear research helped launch the Manhattan Project.","He later said it was the greatest mistake of his life."],"cat":"Truth"},

  {"q":"The measure of intelligence is the ability to change.","src":"Albert Einstein","year":1932,"type":"historical","char":"Albert Einstein","person":"Albert Einstein","born":"1879","died":"1955","era":"20th Century","actors":[],"desc":"Einstein overhauled his own theory of gravity when the evidence required it, and spent years trying to reconcile quantum mechanics with relativity even when the results confounded him. He never stopped revising. The quote is autobiographical.","trivia":["Einstein spent the last 30 years of his life searching for a unified field theory — and failed.","His brain was removed without consent during his autopsy."],"cat":"Self-Knowledge"},

  {"q":"Life is what happens when you're busy making other plans.","src":"John Lennon","year":1980,"type":"historical","char":"John Lennon","person":"John Lennon","born":"1940","died":"1980","era":"20th Century","actors":[],"desc":"From the song Beautiful Boy, written for his son Sean. Lennon had spent five years as a house husband — baking bread, raising his son, absent from music — when he wrote it. He was killed three weeks after the album Double Fantasy was released.","trivia":["Lennon had not released an album in five years when Double Fantasy came out.","He was shot outside his apartment building, the Dakota, in New York on December 8, 1980."],"cat":"Regret"},

  {"q":"The truth will set you free, but first it will make you miserable.","src":"James A. Garfield","year":1871,"type":"historical","char":"James A. Garfield","person":"James A. Garfield","born":"1831","died":"1881","era":"19th Century","actors":[],"desc":"Said at a college commencement. Garfield was a general, a scholar, and the only president elected directly from the House of Representatives. He was assassinated after just 200 days in office — shot by a disappointed office-seeker who wanted a government job. The truth set him free fast.","trivia":["Garfield could write Latin with one hand and Greek with the other simultaneously.","His assassin Charles Guiteau was found legally sane and hanged."],"cat":"Truth"},

  {"q":"We shall fight on the beaches, we shall fight on the landing grounds, we shall fight in the fields and in the streets.","src":"Winston Churchill","year":1940,"type":"historical","char":"Winston Churchill","person":"Winston Churchill","born":"1874","died":"1965","era":"20th Century","actors":[],"desc":"Delivered to the House of Commons on June 4, 1940, after Dunkirk — 300,000 men evacuated but all their equipment abandoned, France about to fall. Churchill had been Prime Minister for less than a month. The speech's purpose was not optimism. It was to make surrender unthinkable.","trivia":["Churchill delivered this speech to Parliament — the general public first heard it via a recording made later.","He was paid by the word for his journalism and books, and wrote over 40 volumes."],"cat":"Courage"},

  {"q":"I am not afraid of storms, for I am learning how to sail my ship.","src":"Louisa May Alcott","year":1868,"type":"historical","char":"Louisa May Alcott","person":"Louisa May Alcott","born":"1832","died":"1888","era":"19th Century","actors":[],"desc":"From Little Women — written under financial desperation when her publisher demanded a story for girls and Alcott had no interest in writing one. She wrote it in six weeks. The storm she was learning to sail was the demand to write commercially rather than what she actually wanted to write.","trivia":["Alcott published her gothic thrillers — the work she preferred — under a pseudonym.","Little Women was written in 10 weeks."],"cat":"Freedom"},

  {"q":"Do not go where the path may lead. Go instead where there is no path and leave a trail.","src":"Ralph Waldo Emerson","year":1841,"type":"historical","char":"Ralph Waldo Emerson","person":"Ralph Waldo Emerson","born":"1803","died":"1882","era":"19th Century","actors":[],"desc":"From Self-Reliance — Emerson's sustained argument that genius is the enemy of imitation. The path is other people's answers to their own questions. Your question is different. Your path doesn't exist yet because no one has stood where you are standing.","trivia":["Emerson dropped out of the clergy after his first wife died, saying he could no longer administer communion because he didn't believe in it.","His essay Nature (1836) effectively launched American transcendentalism."],"cat":"Freedom"},

  {"q":"Darkness cannot drive out darkness; only light can do that. Hate cannot drive out hate; only love can do that.","src":"Martin Luther King Jr.","year":1963,"type":"historical","char":"Martin Luther King Jr.","person":"Martin Luther King Jr.","born":"1929","died":"1968","era":"20th Century","actors":[],"desc":"From Strength to Love (1963). The argument is strategic, not sentimental: responding to hatred with hatred increases the total quantity of hatred in the world. King's nonviolence was not passivity. It was a calculated refusal to give opponents the kind of fight they expected.","trivia":["King wrote Strength to Love while in jail in Fulton County.","The FBI surveilled King for years and sent him an anonymous letter urging him to commit suicide."],"cat":"Truth"}
];






// ── State ──
let currentIndex = 0;
// ── Touch state ──
let touchStartX = 0, touchStartY = 0, touchCurrentX = 0, touchCurrentY = 0;
let isDragging = false;
let _lastTouchX = 0, _lastTouchT = 0, _touchVelocity = 0;
let _lastTouchY = 0, _touchVelocityY = 0;

// ── Corner peel state ──
// The peel is driven by a corner point (peelCx, peelCy) that follows the drag.
// At rest: corner is at card bottom-right (W, H). Dragging moves it up/left.
// peelCx/peelCy are in card-local pixel coords.
let _peelCx       = 0;   // current corner x (card coords)
let _peelCy       = 0;   // current corner y (card coords)
let _peelTx       = 0;   // spring target x
let _peelTy       = 0;   // spring target y
let _peelVx       = 0;   // spring velocity x
let _peelVy       = 0;   // spring velocity y
let _peelOpen     = false;
let _peelRaf      = null;
let _peelActive   = false; // true while dragging or springing
// Corner start offset (card-local) at drag start
let _peelStartCx  = 0;
let _peelStartCy  = 0;
// Gesture state
let _axisLocked   = false;
let _axisIsVert   = false;
let activeCategory = 'All';
let _navigating = false; // prevent double-taps

const allCategories = ['All', ...new Set(QUOTES.map(q => q.cat))];

// ── DOM refs ──
const cardStack      = document.getElementById('cardStack');
const counterEl      = document.getElementById('counterEl');
const progressDots   = document.getElementById('progressDots');
const infoDrawer     = document.getElementById('infoDrawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const drawerTabTitle = document.getElementById('drawerTabTitle');
const searchOverlay  = document.getElementById('search-overlay');
const searchInput    = document.getElementById('searchInput');

let filteredQuotes = QUOTES.slice();

function applyCategory(cat) {
  activeCategory = cat;
  filteredQuotes = cat === 'All' ? QUOTES.slice() : QUOTES.filter(q => q.cat === cat);
  currentIndex = 0;
  initStack();
}

// ── Build stack once, then only swap active card ──
function initStack() {
  cardStack.innerHTML = '';

  // Active card (back surface is inside it)
  const card = buildCard(filteredQuotes[currentIndex]);
  card.id = 'activeCard';
  card.classList.add('quote-card', 'active');
  cardStack.appendChild(card);

  _peelOpen = false;
  _peelActive = false;
  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }

  // Init corner to card's BR — will be set properly after layout
  requestAnimationFrame(() => {
    const front = card.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;
    _peelCx = W; _peelCy = H;
    _peelTx = W; _peelTy = H;
    _peelVx = 0; _peelVy = 0;
  });

  updateCounter();
  renderDots();
  setupSwipe();
}

// Re-render active card
function renderCard() {
  updateCounter();
  renderDots();

  const d = filteredQuotes[currentIndex];
  const newCard = buildCard(d);
  newCard.id = 'activeCard';
  newCard.classList.add('quote-card', 'active', 'card-incoming');

  const old = document.getElementById('activeCard');
  if (old) old.remove();

  // Reset peel state on every new card
  _peelOpen   = false;
  _peelActive = false;
  _axisLocked = false;
  _mouseAxisLocked = false;
  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }
  _peelVx = 0; _peelVy = 0;

  cardStack.appendChild(newCard);

  // Init corner after layout
  requestAnimationFrame(() => {
    const front = newCard.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;
    _peelCx = W; _peelCy = H;
    _peelTx = W; _peelTy = H;
  });

  setupSwipe();

  // Fire ambient colour for this category
  if (window._setAmbientCat) window._setAmbientCat(d.cat);
  // Post-swipe settle
  if (window._settleCard) window._settleCard();

  // Hide counter on swipe, show after pause
  counterEl.classList.remove('visible');
  clearTimeout(_counterTimer);
  _counterTimer = setTimeout(() => counterEl.classList.add('visible'), 3000);

  // Letterbox — fade in after card settles, remove on next swipe
  clearTimeout(_letterboxTimer);
  document.body.classList.remove('letterbox');
  _letterboxTimer = setTimeout(() => document.body.classList.add('letterbox'), 600);
}

function updateCounter() {
  counterEl.textContent = `${currentIndex + 1} / ${filteredQuotes.length}`;
}

function buildCard(d) {
  const card = document.createElement('div');
  card.className = 'quote-card';

  // Category ambient tint
  const catTints = {
    Regret: 'rgba(160,60,60,0.07)', Freedom: 'rgba(60,160,100,0.06)',
    Identity: 'rgba(120,80,200,0.07)', Truth: 'rgba(180,160,60,0.06)',
    Mortality: 'rgba(80,90,130,0.07)', Courage: 'rgba(200,110,40,0.07)',
    Grief: 'rgba(50,80,180,0.08)', Relationships: 'rgba(180,60,110,0.07)',
    Purpose: 'rgba(50,150,180,0.07)', Choices: 'rgba(150,150,50,0.06)',
    'Self-Knowledge': 'rgba(90,150,90,0.07)', War: 'rgba(150,50,50,0.09)'
  };

  // Typewriter char-by-char reveal — slow, like grain resolving
  const chars = d.q.split('').map((ch, i) =>
    ch === ' '
      ? ' '
      : `<span class="char" style="animation-delay:${i * 32}ms">${ch}</span>`
  ).join('');

  // Ghost next quote
  const nextQ = filteredQuotes[(filteredQuotes.indexOf(d) + 1) % filteredQuotes.length];
  const ghostText = nextQ ? nextQ.q : '';

  // Build front face
  const front = document.createElement('div');
  front.className = 'card-face card-front';
  if (catTints[d.cat]) {
    front.classList.add('tinted');

  }
  front.innerHTML = `
    <span class="quote-mark">"</span>
    <p class="quote-text">${chars}</p>
    <div class="quote-source">
      <div class="source-caption">${d.type === 'historical' ? (d.src + (d.era ? ' &nbsp;·&nbsp; ' + d.era : '')) : (d.src + ' &nbsp;·&nbsp; ' + d.char)}</div>

      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- lifted page corner — warm parchment colour -->

        <!-- inner shadow on lifted part -->

  `;

  // Build back face

  const sameCat = QUOTES.filter(q => q.cat === d.cat && q.src !== d.src && q.q !== d.q)
    .sort(() => Math.random() - 0.5).slice(0, 3 - sameSrc.length);
  const related = [...sameSrc, ...sameCat];

  const isHistorical = d.type === 'historical';
  const castSection = isHistorical
    ? `<div class="back-section-label">PERSON</div>
       <div class="back-cast">

           <div>
             <div class="back-actor-name">${d.person || d.src}</div>

           </div>
         </div>
       </div>`
    : `<div class="back-section-label">CAST</div>
       <div class="back-cast">
         ${d.actors.map(a => {
           const initials = a.name.split(' ').map(n => n[0]).join('');
           return `<div class="back-actor-row">
             <div class="back-actor-avatar">${initials}</div>

         }).join('')}

  back.innerHTML = `

  // Hide scroll hint when scrolled to bottom

  back.addEventListener('click', e => e.stopPropagation());

  // Both faces go inside the flip wrapper
  card.innerHTML = '';
  card.appendChild(front);
  card.appendChild(back);

  // Sticky depth overlay for back card — sticks to visible card edges while scrolling
  const stickyDepth = document.createElement('div');
  stickyDepth.className = 'card-back-depth';
  back.appendChild(stickyDepth);


  card._data = d;

  return card;
}

function _doNext() {

  renderCard();
  _navigating = false;
}

function _doPrev() {
  currentIndex = (currentIndex - 1 + filteredQuotes.length) % filteredQuotes.length;
  renderCard();
  _navigating = false;
}

function goNext() {
  if (_navigating || filteredQuotes.length === 0) return;
  _navigating = true;
  // Reset peel before swipe
  _peelOpen = false; _peelActive = false;
  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }
  const card = document.getElementById('activeCard');
  if (!card) { _doNext(); return; }
  // Clear canvas immediately so it doesn't ghost during slide-out
  const cv = card.querySelector('#peelCanvas');
  if (cv) cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
  const front = card.querySelector('.card-front');
  const back  = card.querySelector('.card-back');
  if (front) { front.style.clipPath = 'none'; front.style.visibility = 'visible'; front.style.opacity = '1'; }
  if (back)  { back.style.clipPath = 'polygon(0px 0px,0px 0px,0px 0px)'; back.style.pointerEvents = 'none'; }
  card.style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
  card.style.transform = 'translateX(-115%) rotate(-5deg) scale(0.93)';

  card.style.pointerEvents = 'none';
  setTimeout(_doNext, 460);
}

  _navigating = true;

function goRandom() {
  if (_navigating || filteredQuotes.length <= 1) return;
  _navigating = true;
  const card = document.getElementById('activeCard');
  // Pick a random index that isn't the current one
  let newIdx;
  do { newIdx = Math.floor(Math.random() * filteredQuotes.length); }
  while (newIdx === currentIndex);

  if (!card) { currentIndex = newIdx; renderCard(); _navigating = false; return; }

  // Clear canvas + peel state before animating out
  _peelOpen = false; _peelActive = false;
  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }

  // Animate out upward with slight rotation — distinct from left/right nav

    renderCard();
    _navigating = false;
  }, 260);
}

// ══════════════════════════════════════════════════════
// CORNER PAGE-PEEL SYSTEM
// ══════════════════════════════════════════════════════
//
// Geometry:
//   The card has corners at (0,0) TL, (W,0) TR, (W,H) BR, (0,H) BL.
//   The peel originates from the bottom-right corner (W, H).
//   The user drags that corner toward (peelCx, peelCy).
//   A fold line is the perpendicular bisector of the segment
//   from (W,H) to (peelCx, peelCy).
//   Everything "below" the fold line (on the peeled side) forms the flap.
//   The flap is drawn reflected across the fold line, darkened, with shine.
//
// Rendering:
//   1. .card-back    — HTML, always visible underneath (z-index 1)
//   2. .card-front   — HTML, clip-path'd to unpeeled polygon (z-index 2)
//   3. #peelCanvas   — canvas drawing only the flap + shadow (z-index 4)
// ══════════════════════════════════════════════════════

function setupSwipe() {
  const activeCard = document.getElementById('activeCard');
  if (!activeCard) return;
  const front = activeCard.querySelector('.card-front') || activeCard;
  if (front._swipeInit) return; // already set up — prevent double-binding
  front._swipeInit = true;
  front.addEventListener('touchstart',  onTouchStart, { passive: false });
  front.addEventListener('touchmove',   onTouchMove,  { passive: false });
  front.addEventListener('touchend',    onTouchEnd,   { passive: false });
  front.addEventListener('mousedown',   onMouseDown);
}

// ── Peel geometry helpers ──


// Perpendicular bisector of segment from (x1,y1) to (x2,y2).
// Returns { px, py, nx, ny } where (px,py) is midpoint, (nx,ny) is normal direction.
function _foldLine(x1, y1, x2, y2) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const dx = x2 - x1;
  const dy = y2 - y1;
  // Perpendicular direction (normalized)
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return { mx, my, nx: -dy/len, ny: dx/len, len };
}

// Find intersection of fold line (through (mx,my) with direction (nx,ny))
// with a line segment from (ax,ay) to (bx,by).
// Returns t parameter along segment (0..1), or null if no intersection.
function _segIntersect(mx, my, nx, ny, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const denom = nx * dy - ny * dx;
  if (Math.abs(denom) < 1e-10) return null;
  const t = (nx * (ay - my) - ny * (ax - mx)) / denom;
  if (t < -1e-6 || t > 1 + 1e-6) return null;
  const u = (dx * (ay - my) - dy * (ax - mx)) / denom;
  return { t: Math.max(0, Math.min(1, t)), u, x: ax + t*dx, y: ay + t*dy };
}

// Which side of fold line is a point on?
// Returns +1 or -1.
function _foldSide(mx, my, nx, ny, px, py) {
  return Math.sign((px - mx) * (-ny) + (py - my) * nx);
}

// Reflect point (px,py) across fold line through (mx,my) with normal (nx,ny)
function _reflect(mx, my, nx, ny, px, py) {
  // The fold line direction is perpendicular to (nx,ny): dir = (ny, -nx)
  // Project (p - m) onto normal, reflect
  const dot = (px - mx) * nx + (py - my) * ny;
  return { rx: px - 2*dot*nx, ry: py - 2*dot*ny };
}

// Core peel render — called every frame
function _applyPeel(card) {
  const front = card.querySelector('.card-front');
  const back  = card.querySelector('.card-back');
  if (!front) return;

  const W = front.offsetWidth  || 360;
  const H = front.offsetHeight || 400;

  // cx,cy = current peel corner position (dragged from bottom-right W,H)
  const cx = _peelCx, cy = _peelCy;
  const dist = Math.hypot(cx - W, cy - H);

  if (dist < 2) {
    _peelReset(card, front, back, W, H);
    return;
  }

  const pct = Math.min(1, dist / Math.hypot(W, H));

  // ── Fold line: perpendicular bisector of (W,H)→(cx,cy) ──
  const fmx = (W + cx) / 2, fmy = (H + cy) / 2;      // midpoint
  const fdx = cx - W, fdy = cy - H;                   // direction from origin to corner
  const flen = Math.hypot(fdx, fdy) || 1;
  // Fold line direction (perpendicular to fdx,fdy)
  const ftx = -fdy / flen, fty = fdx / flen;

  // Find where fold line hits card edges
  // Use extended bounds so corner going far off-card still clips correctly
  const hits = [];
  const EPS = -1e-6, EPS1 = 1 + 1e-6;
  if (Math.abs(fty) > 1e-6) {
    const t = (0 - fmy) / fty;
    const x = fmx + ftx * t;
    if (x >= EPS && x <= W - EPS) hits.push([Math.max(0, Math.min(W, x)), 0]);
  }
  if (Math.abs(fty) > 1e-6) {
    const t = (H - fmy) / fty;
    const x = fmx + ftx * t;
    if (x >= EPS && x <= W - EPS) hits.push([Math.max(0, Math.min(W, x)), H]);
  }
  if (Math.abs(ftx) > 1e-6) {
    const t = (0 - fmx) / ftx;
    const y = fmy + fty * t;
    if (y >= EPS && y <= H - EPS) hits.push([0, Math.max(0, Math.min(H, y))]);
  }
  if (Math.abs(ftx) > 1e-6) {
    const t = (W - fmx) / ftx;
    const y = fmy + fty * t;
    if (y >= EPS && y <= H - EPS) hits.push([W, Math.max(0, Math.min(H, y))]);
  }

  // Dedupe
  const uniq = [];
  for (const p of hits) {
    if (!uniq.some(q => Math.hypot(q[0]-p[0], q[1]-p[1]) < 1)) uniq.push(p);
  }

  // Build static (front) and peeled (back) polygons
  const nx2 = fdx / flen, ny2 = fdy / flen;
  const side_orig = Math.sign((W - fmx) * nx2 + (H - fmy) * ny2); // peeled side

  if (uniq.length < 2) {
    // Fold line outside card bounds — determine if fully peeled or not peeled at all
    // If corner has moved significantly toward left (cx < W*0.5), treat as fully peeled
    if (cx < W * 0.5) {
      // Fully peeled: hide front completely, show back entirely
      front.style.clipPath = 'polygon(0px 0px,0px 0px,0px 0px)';
      front.style.visibility = 'hidden';
      if (back) { back.style.visibility = 'visible'; back.style.clipPath = 'none'; back.style.opacity = '1'; }
    } else {
      // Not peeled: show front fully
      front.style.clipPath = 'none';
      front.style.visibility = 'visible';
      if (back) back.style.clipPath = 'polygon(0px 0px,0px 0px,0px 0px)';
    }
  } else {
    const corners = [[0,0],[W,0],[W,H],[0,H]];

    // Front poly = corners NOT on peeled side
    const frontPoly = [];
    for (let i = 0; i < 4; i++) {
      const [px,py] = corners[i];
      const side = Math.sign((px - fmx) * nx2 + (py - fmy) * ny2);
      if (side !== side_orig || side === 0) frontPoly.push([px, py]);
      const [qx,qy] = corners[(i+1)%4];
      for (const hit of uniq) {
        const onEdge = (Math.min(px,qx)-1 <= hit[0] && hit[0] <= Math.max(px,qx)+1) &&
                       (Math.min(py,qy)-1 <= hit[1] && hit[1] <= Math.max(py,qy)+1);
        if (onEdge && !frontPoly.some(p => Math.hypot(p[0]-hit[0],p[1]-hit[1])<1)) {
          frontPoly.push(hit);
        }
      }
    }

    // Back poly = corners on peeled side (what's been revealed)
    const backPoly = [];
    for (let i = 0; i < 4; i++) {
      const [px,py] = corners[i];
      const side = Math.sign((px - fmx) * nx2 + (py - fmy) * ny2);
      if (side === side_orig) backPoly.push([px, py]);
      const [qx,qy] = corners[(i+1)%4];
      for (const hit of uniq) {
        const onEdge = (Math.min(px,qx)-1 <= hit[0] && hit[0] <= Math.max(px,qx)+1) &&
                       (Math.min(py,qy)-1 <= hit[1] && hit[1] <= Math.max(py,qy)+1);
        if (onEdge && !backPoly.some(p => Math.hypot(p[0]-hit[0],p[1]-hit[1])<1)) {
          backPoly.push(hit);
        }
      }
    }

    if (frontPoly.length >= 3) {
      front.style.visibility = 'visible';
      front.style.clipPath = 'polygon(' + frontPoly.map(([px,py]) => px.toFixed(1)+'px '+py.toFixed(1)+'px').join(',') + ')';
    } else {
      front.style.visibility = 'hidden';
    }
    if (back && backPoly.length >= 3) {
      back.style.visibility = 'visible';
      back.style.opacity = '1';
      back.style.clipPath = 'polygon(' + backPoly.map(([px,py]) => px.toFixed(1)+'px '+py.toFixed(1)+'px').join(',') + ')';
    }
  }

  // ── Canvas: draw flap ──
  let canvas = card.querySelector('#peelCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'peelCanvas';
    canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:4;';
    card.appendChild(canvas);
  }
  const overflow = Math.max(W, H) * 1.2; // generous overflow all directions
  canvas.style.left = -overflow + 'px';
  canvas.style.top  = -overflow + 'px';

  const dpr = window.devicePixelRatio || 1;
  const cw = (W + overflow * 2), ch = (H + overflow * 2);
  canvas.width  = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(dpr, dpr);
  ctx.translate(overflow, overflow); // shift so card coords (0,0) map to canvas centre

  if (uniq.length >= 2) {
    const [h1, h2] = uniq;
    const nx = fdx / flen, ny = fdy / flen;
    const side_orig = Math.sign((W - fmx) * nx + (H - fmy) * ny);

    // Flap corners = card corners on peeled side + fold hits
    const corners = [[0,0],[W,0],[W,H],[0,H]];
    const flapOrig = [];
    for (let i = 0; i < 4; i++) {
      const [px,py] = corners[i];
      const side = Math.sign((px - fmx) * nx + (py - fmy) * ny);
      if (side === side_orig) flapOrig.push([px, py]);
      const [qx,qy] = corners[(i+1)%4];
      for (const h of uniq) {
        const onEdge = (Math.min(px,qx)-1 <= h[0] && h[0] <= Math.max(px,qx)+1) &&
                       (Math.min(py,qy)-1 <= h[1] && h[1] <= Math.max(py,qy)+1);
        if (onEdge && !flapOrig.some(p => Math.hypot(p[0]-h[0],p[1]-h[1])<1)) {
          flapOrig.push(h);
        }
      }
    }

    // Reflect flap corners across fold line
    const flap = flapOrig.map(([px,py]) => {
      // If this is the original corner (W,H), use the drag position (cx,cy) directly
      if (Math.hypot(px-W, py-H) < 2) return [cx, cy];
      // Otherwise reflect across fold
      const dot = (px - fmx) * nx + (py - fmy) * ny;
      return [px - 2*dot*nx, py - 2*dot*ny];
    });

    if (flap.length >= 3) {

      // ── Flap fill: flat warm dark — no gradients, no banding ──
      // Color: #1a1612 — deep warm espresso, distinct from cold card back
      ctx.save();
      const flapPath = () => {
        ctx.beginPath();
        ctx.moveTo(flap[0][0], flap[0][1]);
        for (let i = 1; i < flap.length; i++) ctx.lineTo(flap[i][0], flap[i][1]);
        ctx.closePath();
      };

      flapPath(); ctx.fillStyle = '#1a1612'; ctx.fill();

      // ── Single linear curl shadow: dark at fold only, imperceptible fade ──
      // Direction fold→tip, stops computed analytically to avoid banding
      const curlLen = Math.hypot(cx - fmx, cy - fmy) || 1;
      const curlGrad = ctx.createLinearGradient(fmx, fmy, fmx + (cx-fmx)/curlLen*curlLen, fmy + (cy-fmy)/curlLen*curlLen);
      curlGrad.addColorStop(0,    `rgba(0,0,0,${(0.55*pct).toFixed(3)})`);
      curlGrad.addColorStop(0.12, `rgba(0,0,0,${(0.38*pct).toFixed(3)})`);
      curlGrad.addColorStop(0.30, `rgba(0,0,0,${(0.18*pct).toFixed(3)})`);
      curlGrad.addColorStop(0.55, `rgba(0,0,0,${(0.06*pct).toFixed(3)})`);
      curlGrad.addColorStop(1.0,  `rgba(0,0,0,0)`);
      flapPath(); ctx.fillStyle = curlGrad; ctx.fill();

      ctx.restore();

      // Feathered edge removed — ctx.filter blur is unclipped in Safari

      // ── Crease line at fold — clipped so shadow doesn't bleed ──
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();
      ctx.beginPath();
      ctx.moveTo(h1[0], h1[1]); ctx.lineTo(h2[0], h2[1]);
      // Brighter crease as fold approaches left edge (snap feel)
      const leftEdgePct = Math.max(0, 1 - cx / W); // 0 normally, 1 at left edge
      const creaseAlpha = 0.2 + leftEdgePct * 0.5;
      const creaseWidth = 1.5 + leftEdgePct * 2;
      ctx.strokeStyle = `rgba(255,255,255,${creaseAlpha * pct})`;
      ctx.lineWidth = creaseWidth;
      ctx.shadowColor = `rgba(255,240,200,${(0.3 + leftEdgePct * 0.6) * pct})`;
      ctx.shadowBlur = 4 + leftEdgePct * 10;
      ctx.stroke();
      // Extra snap flash line when at left edge
      if (leftEdgePct > 0.7) {
        ctx.globalAlpha = (leftEdgePct - 0.7) / 0.3;
        ctx.lineWidth = 3;
        ctx.strokeStyle = `rgba(255,250,230,0.9)`;
        ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }
  }

  ctx.restore(); // end translate

  // No dynamic box-shadow on front — shadows on clip-path elements bleed onto back card
  if (back) back.style.pointerEvents = pct > 0.55 ? 'auto' : 'none';
}
function _peelReset(card, front, back, W, H) {
  if (front) {
    front.style.clipPath   = 'none';
    front.style.visibility = 'visible';
    front.style.opacity    = '1';
    front.style.transition = '';
    front.style.boxShadow  = '0 1px 0 rgba(255,255,255,0.04) inset';
  }
  const canvas = card.querySelector('#peelCanvas');
  if (canvas) {
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.opacity = '1';
    canvas.style.transition = '';
  }
  if (back) {
    back.style.pointerEvents = 'none';
    back.style.overflowY    = 'hidden';
    back.style.opacity      = '0';
    back.style.visibility   = 'hidden';
    back.style.transition   = '';
    back.style.clipPath     = 'polygon(0px 0px,0px 0px,0px 0px)';
    back.scrollTop = 0;
  }
}

// ── Spring physics for the peel corner ──
function _peelFrame() {
  const card = document.getElementById('activeCard');
  if (!card) return;

  const stiffness = 0.07;
  const damping   = 0.74;

  _peelVx += (_peelTx - _peelCx) * stiffness;
  _peelVy += (_peelTy - _peelCy) * stiffness;
  _peelVx *= damping;
  _peelVy *= damping;
  _peelCx += _peelVx;
  _peelCy += _peelVy;

  _applyPeel(card);

  const settled = Math.abs(_peelVx) < 0.4 && Math.abs(_peelVy) < 0.4 &&
                  Math.abs(_peelCx - _peelTx) < 1 && Math.abs(_peelCy - _peelTy) < 1;
  if (settled) {
    _peelCx = _peelTx; _peelCy = _peelTy;
    _applyPeel(card);
    _peelRaf = null;
    _peelActive = false;
    if (_peelOpen) {
      // Fully peeled — smooth reveal of back card
      const front2 = card.querySelector('.card-front');
      const back2  = card.querySelector('.card-back');
      // Front fades out
      if (front2) {
        front2.style.transition = 'opacity 0.45s ease';
        front2.style.opacity = '0';
        setTimeout(() => {
          if (front2) { front2.style.visibility = 'hidden'; front2.style.opacity = '1'; front2.style.transition = ''; }
        }, 460);
      }
      // Back expands to full with CSS transition on clip-path
      if (back2) {
        back2.style.transition = 'clip-path 0.35s ease';
        back2.style.clipPath = 'inset(0 0 0 0 round 20px)';
        setTimeout(() => {
          back2.style.clipPath = 'none';
          back2.style.transition = '';
          back2.style.pointerEvents = 'auto';
          back2.style.overflowY = 'auto';
        }, 370);
      }
      // Kill canvas immediately — fade+restore causes ghost crease line on back card
      const cv = card.querySelector('#peelCanvas');
      if (cv) {
        cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
        cv.style.display = 'none';
      }
    } else {
      const front = card.querySelector('.card-front');
      const back  = card.querySelector('.card-back');
      const W = front ? front.offsetWidth  : 360;
      const H = front ? front.offsetHeight : 400;
      _peelReset(card, front, back, W, H);
    }
    return;
  }
  _peelRaf = requestAnimationFrame(_peelFrame);
}

function _startPeelSpring(tx, ty) {
  _peelTx = tx; _peelTy = ty;
  if (_peelRaf) cancelAnimationFrame(_peelRaf);
  _peelRaf = requestAnimationFrame(_peelFrame);
}

// Get card-local coordinates from a client event point
function _cardLocalCoords(card, clientX, clientY) {
  const rect = card.getBoundingClientRect();
  return { lx: clientX - rect.left, ly: clientY - rect.top };
}

// ── Touch handlers ──
function onTouchStart(e) {
  touchStartX    = e.touches[0].clientX;
  touchStartY    = e.touches[0].clientY;
  touchCurrentX  = touchStartX;
  touchCurrentY  = touchStartY;
  isDragging     = false;
  _axisLocked    = false;
  _axisIsVert    = false;
  _lastTouchX    = touchStartX;
  _lastTouchY    = touchStartY;
  _lastTouchT    = Date.now();
  _touchVelocity  = 0;
  _touchVelocityY = 0;

  const card = document.getElementById('activeCard');
  if (!card) return;

  const front = card.querySelector('.card-front');
  const W = front ? front.offsetWidth  : 360;
  const H = front ? front.offsetHeight : 400;

  // If peel corner not yet initialized, set to BR
  if (_peelCy > H + 10) { _peelCx = W; _peelCy = H; _peelTx = W; _peelTy = H; }

  // Capture peel corner position at drag start
  _peelStartCx = _peelCx;
  _peelStartCy = _peelCy;

  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }
}

function onTouchMove(e) {
  const now = Date.now();
  const cx  = e.touches[0].clientX;
  const cy  = e.touches[0].clientY;
  const dx  = cx - touchStartX;
  const dy  = cy - touchStartY;
  const dt  = now - _lastTouchT || 1;

  _touchVelocity  = (cx - _lastTouchX) / dt;
  _touchVelocityY = (cy - _lastTouchY) / dt;
  _lastTouchX = cx; _lastTouchY = cy; _lastTouchT = now;
  touchCurrentX = cx; touchCurrentY = cy;

  // Lock axis after 8px movement
  if (!_axisLocked && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    // Upward drag = peel; clearly sideways = swipe
    if (dy < 0 || (_peelOpen && Math.abs(dy) > 3)) {
      _axisIsVert = true;
    } else {
      _axisIsVert = Math.abs(dy) >= Math.abs(dx) * 0.4;
    }
    _axisLocked = true;
  }
  if (!_axisLocked) return;

  if (_axisIsVert) {
    e.preventDefault();
    isDragging = false;
    const card = document.getElementById('activeCard');
    if (!card || _navigating) return;
    document.body.classList.remove('letterbox');

    const front = card.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;

    // Corner follows touch directly — free angle
    const newCx = _peelStartCx + dx;
    const newCy = _peelStartCy + dy;
    _peelCx = newCx;
    _peelCy = newCy;
    _peelActive = true;
    _applyPeel(card);

  } else {
    e.preventDefault();
    if (_peelOpen) return;
    isDragging = true;
    const card = document.getElementById('activeCard');
    if (!card) return;
    card.classList.add('dragging');
    document.body.classList.remove('letterbox');

    const resist  = Math.sign(dx) * Math.min(Math.abs(dx) * 0.85, window.innerWidth * 0.6);
    const rotate  = resist * 0.045;
    const opacity = Math.max(1 - Math.abs(resist) / (window.innerWidth * 0.7), 0.25);
    card.style.transform = `translateX(${resist}px) rotate(${rotate}deg)`;
    card.style.opacity   = opacity;
  }
}

function onTouchEnd(e) {
  const card = document.getElementById('activeCard');
  if (card) card.classList.remove('dragging');

  if (_axisIsVert && _axisLocked) {
    const front = card.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;

    // Snap decision based on how far corner has moved
    const dist = Math.hypot(_peelCx - W, _peelCy - H);
    const maxDist = Math.hypot(W, H);
    const progress = dist / maxDist;
    const threshold = 0.25;
    const flickUp = _touchVelocityY < -0.5;
    const flickDown = _touchVelocityY > 0.5;

    let peelDirX = (_peelCx - W) / (dist || 1);
    let peelDirY = (_peelCy - H) / (dist || 1);
    if (dist < 20) { peelDirX = -0.7; peelDirY = -0.7; }
    const offCardX = W + peelDirX * maxDist * 1.4;
    const offCardY = H + peelDirY * maxDist * 1.4;

    if (_peelOpen) {
      const shouldClose = progress < threshold || flickDown;
      _peelOpen = !shouldClose;
      if (shouldClose) {
        _startPeelSpring(W, H);
      } else {
        _startPeelSpring(offCardX, offCardY);
      }
    } else {
      const shouldOpen = progress > threshold || flickUp;
      _peelOpen = shouldOpen;
      if (shouldOpen) {
        _startPeelSpring(offCardX, offCardY);
      } else {
        _startPeelSpring(W, H);
      }
    }

  } else if (!_axisIsVert && isDragging && !_navigating) {
    const dx  = touchCurrentX - touchStartX;
    const vx  = Math.abs(_touchVelocity);
    if (Math.abs(dx) > 72 || vx > 0.4) {
      const dir = dx < 0 ? 'left' : 'right';
      const dur = Math.max(0.18, 0.28 - vx * 0.08);
      card.style.transition = `transform ${dur}s cubic-bezier(0.4,0,1,1), opacity ${dur}s ease`;
      card.style.transform  = `translateX(${dir === 'left' ? -110 : 110}%) rotate(${dir === 'left' ? -8 : 8}deg)`;
      card.style.opacity    = '0';
      card.style.pointerEvents = 'none';
      _navigating = true;
      setTimeout(() => { dir === 'left' ? _doNext() : _doPrev(); }, dur * 1000);
    } else {
      card.style.transition = 'transform 0.38s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease';
      card.style.transform  = '';
      card.style.opacity    = '';
      setTimeout(() => { card.style.transition = ''; }, 400);
    }
  }

  isDragging = false;
}

// ── Mouse handlers ──
let mouseStartX = 0, mouseStartY = 0, mouseDragging = false;
let _mouseVelocity = 0, _mouseVelocityY = 0;
let _lastMouseX = 0, _lastMouseY = 0, _lastMouseT = 0;
let _mouseAxisLocked = false, _mouseAxisIsVert = false;
let _mouseStartPeelCx = 0, _mouseStartPeelCy = 0;

function onMouseDown(e) {
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
  mouseDragging = false;
  _mouseVelocity = 0;
  _mouseVelocityY = 0;
  _lastMouseX = e.clientX;
  _lastMouseY = e.clientY;
  _lastMouseT = Date.now();
  _mouseAxisLocked = false;
  _mouseAxisIsVert = false;
  _mouseStartPeelCx = _peelCx;
  _mouseStartPeelCy = _peelCy;
  const card = document.getElementById('activeCard');
  if (card) {
    const front = card.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;
    if (_peelCy > H + 10) { _peelCx = W; _peelCy = H; _peelTx = W; _peelTy = H; }
    _mouseStartPeelCx = _peelCx;
    _mouseStartPeelCy = _peelCy;
  }
  if (_peelRaf) { cancelAnimationFrame(_peelRaf); _peelRaf = null; }

  document.addEventListener('mouseup',   onMouseUp);

function onMouseMove(e) {
  const now = Date.now();
  const dt  = now - _lastMouseT || 1;
  _mouseVelocity  = (e.clientX - _lastMouseX) / dt;
  _mouseVelocityY = (e.clientY - _lastMouseY) / dt;
  _lastMouseX = e.clientX;
  _lastMouseY = e.clientY;
  _lastMouseT = now;

  const dx = e.clientX - mouseStartX;
  const dy = e.clientY - mouseStartY;

  // Lock axis once: upward drag = peel, clearly sideways = swipe
  if (!_mouseAxisLocked && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
    // Any upward movement triggers peel; strongly horizontal-only = swipe
    if (dy < 0 || (_peelOpen && Math.abs(dy) > 3)) {
      _mouseAxisIsVert = true;
    } else {
      _mouseAxisIsVert = Math.abs(dy) >= Math.abs(dx) * 0.4;
    }
    _mouseAxisLocked = true;
  }
  if (!_mouseAxisLocked) return;

  if (_mouseAxisIsVert) {
    const card = document.getElementById('activeCard');
    if (!card || _navigating) return;
    const front = card.querySelector('.card-front');
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;

    // Corner follows cursor directly — free angle based on drag direction
    const rect = front.getBoundingClientRect();
    const cursorLocalX = e.clientX - rect.left;
    const cursorLocalY = e.clientY - rect.top;
    // Corner = drag delta applied from its start position, clamped so it can overflow top but not right/bottom
    const newCx = _mouseStartPeelCx + (e.clientX - mouseStartX);
    const newCy = _mouseStartPeelCy + (e.clientY - mouseStartY);
    _peelCx = newCx;
    _peelCy = newCy;
    _peelActive = true;
    _applyPeel(card);
  } else {
    if (_peelOpen) return;
    mouseDragging = true;
    const card = cardStack.querySelector('.active');
    if (card) {
      const resist = Math.sign(dx) * Math.min(Math.abs(dx) * 0.85, window.innerWidth * 0.6);
      card.style.transform = `translateX(${resist}px) rotate(${resist * 0.045}deg)`;
      card.style.opacity   = Math.max(1 - Math.abs(resist) / (window.innerWidth * 0.7), 0.25);
    }

function onMouseUp(e) {
  document.body.style.userSelect = '';
  document.body.style.webkitUserSelect = '';
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup',   onMouseUp);

  const card = document.getElementById('activeCard');
  const dx   = e.clientX - mouseStartX;
  const dy   = e.clientY - mouseStartY;

  if (_mouseAxisIsVert && _mouseAxisLocked) {
    const front = card ? card.querySelector('.card-front') : null;
    const W = front ? front.offsetWidth  : 360;
    const H = front ? front.offsetHeight : 400;

    // Progress = how far corner has moved from (W,H) as fraction of card diagonal
    const dist = Math.hypot(_peelCx - W, _peelCy - H);
    const maxDist = Math.hypot(W, H);
    const progress = dist / maxDist;
    const threshold = 0.25;
    const flickUp   = _mouseVelocityY < -0.5;
    const flickDown = _mouseVelocityY > 0.5;

    // Snap-open target: continue in current peel direction, off-card
    // Off-card target: continue in peel direction, fallback to top-left on flick
    let peelDirX = (_peelCx - W) / (dist || 1);
    let peelDirY = (_peelCy - H) / (dist || 1);
    if (dist < 20) { peelDirX = -0.7; peelDirY = -0.7; } // default diagonal on tiny peel
    const offCardX = W + peelDirX * maxDist * 1.4;
    const offCardY = H + peelDirY * maxDist * 1.4;

    if (_peelOpen) {
      const shouldClose = progress < threshold || flickDown;
      _peelOpen = !shouldClose;
      _startPeelSpring(shouldClose ? W : offCardX, shouldClose ? H : offCardY);
    } else {
      const shouldOpen = progress > threshold || flickUp;
      _peelOpen = shouldOpen;
      _startPeelSpring(shouldOpen ? offCardX : W, shouldOpen ? offCardY : H);
    }

    const vx = Math.abs(_mouseVelocity);
    if (Math.abs(dx) > 72 || vx > 0.4) {
      dx < 0 ? goNext() : goPrev();
    } else {
      card.style.transition = 'transform 0.38s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease';
      card.style.transform  = '';
      card.style.opacity    = '';
      setTimeout(() => { card.style.transition = ''; }, 400);
    }
  }

  mouseDragging = false;
}

// keyboard
document.addEventListener('keydown', e => {
  if (searchOverlay.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
