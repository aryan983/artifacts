// ── Search ──
document.getElementById('btnSearch').addEventListener('click', openSearch);
document.getElementById('searchClose').addEventListener('click', closeSearch);

function openSearch() {
  searchOverlay.classList.add('open');
  buildCategoryFilters();
  renderSearchResults('');
  setTimeout(() => searchInput.focus(), 100);
}

function closeSearch() {
  searchOverlay.classList.remove('open');
  searchInput.value = '';
}

function buildCategoryFilters() {
  const cf = document.getElementById('categoryFilter');
  cf.innerHTML = allCategories.map(cat =>
    `<button class="cat-btn${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  cf.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cf.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyCategory(btn.dataset.cat);
      renderSearchResults(searchInput.value);
    });
  });
}

searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));

function renderSearchResults(query) {
  const q = query.toLowerCase().trim();
  const pool = activeCategory === 'All' ? QUOTES : QUOTES.filter(x => x.cat === activeCategory);
  const results = q ? pool.filter(x =>
    x.q.toLowerCase().includes(q) ||
    x.src.toLowerCase().includes(q) ||
    x.char.toLowerCase().includes(q) ||
    x.actors.some(a => a.name.toLowerCase().includes(q))
  ) : pool.slice(0, 30);

  const el = document.getElementById('searchResults');
  if (results.length === 0) {
    el.innerHTML = `<div class="search-empty">No quotes found for "${query}"</div>`;
    return;
  }
  el.innerHTML = results.slice(0, 40).map(r => {
    const origIdx = QUOTES.indexOf(r);
    return `<div class="search-result-item" data-idx="${origIdx}">
      <div class="sri-quote">${r.q}</div>
      <div class="sri-meta">${r.src} · ${r.char} · ${r.year}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      const origIdx = parseInt(item.dataset.idx);
      // Always navigate globally — reset category filter to All so the quote is always reachable
      activeCategory = 'All';
      filteredQuotes = QUOTES.slice();
      currentIndex = origIdx;
      renderCard();
      closeSearch();
    });
  });
}

// ── Init ──
currentIndex = Math.floor(Math.random() * QUOTES.length);

// Letterbox timer
let _letterboxTimer = null;

// ── Ambient background — greyscale tonal only ──
(function initAmbient() {
  const canvas = document.getElementById('ambientCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // All categories map to greyscale luminance only
  // Lighter = more exposed, darker = underexposed
  const catLuminance = {
    Regret:          18,
    Freedom:         28,
    Identity:        22,
    Truth:           25,
    Mortality:       14,
    Courage:         30,
    Grief:           12,
    Relationships:   26,
    Purpose:         24,
    Choices:         20,
    'Self-Knowledge':22,
    War:             10,
  };

  let currentL = 18;
  let targetL  = 18;
  let phase    = 0;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  window._setAmbientCat = function(cat) { targetL = catLuminance[cat] ?? 18; };

  function lerp(a, b, t) { return a + (b - a) * t; }

  function draw() {
    phase += 0.003;
    currentL = lerp(currentL, targetL, 0.008);
    const L = Math.round(currentL);

    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Two slow drifting tonal pools — pure greyscale
    const x1 = w * (0.25 + 0.2  * Math.sin(phase * 0.6));
    const y1 = h * (0.3  + 0.15 * Math.cos(phase * 0.45));
    const x2 = w * (0.72 + 0.16 * Math.cos(phase * 0.55));
    const y2 = h * (0.65 + 0.12 * Math.sin(phase * 0.7));

    const g1 = ctx.createRadialGradient(x1, y1, 0, x1, y1, w * 0.6);
    g1.addColorStop(0, `rgba(${L},${L},${L},0.18)`);
    g1.addColorStop(1, `rgba(${L},${L},${L},0)`);
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, w, h);

    const L2 = Math.max(8, L - 6);
    const g2 = ctx.createRadialGradient(x2, y2, 0, x2, y2, w * 0.48);
    g2.addColorStop(0, `rgba(${L2},${L2},${L2},0.13)`);
    g2.addColorStop(1, `rgba(0,0,0,0)`);
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Idle drift + post-swipe settle ──
(function initCardMotion() {
  let driftX = 0, driftY = 0;
  let velX = 0, velY = 0;
  let targetX = 0, targetY = 0;
  const DRIFT_MAX = 5; // px
  let nextRetargetIn = 0;

  function pickNewTarget() {
    const angle = Math.random() * Math.PI * 2;
    const dist  = DRIFT_MAX * (0.4 + Math.random() * 0.6);
    targetX = Math.cos(angle) * dist;
    targetY = Math.sin(angle) * dist;
    nextRetargetIn = 180 + Math.floor(Math.random() * 120); // frames
  }
  pickNewTarget();

  function tick() {
    nextRetargetIn--;
    if (nextRetargetIn <= 0) pickNewTarget();

    // Soft spring toward target
    const stiffness = 0.012;
    const damping   = 0.88;
    velX = (velX + (targetX - driftX) * stiffness) * damping;
    velY = (velY + (targetY - driftY) * stiffness) * damping;
    driftX += velX;
    driftY += velY;

    const card = document.getElementById('activeCard');
    if (card && !card.classList.contains('dragging') && !card._settling) {
      card.style.translate = `${driftX}px ${driftY}px`;
    }

    requestAnimationFrame(tick);
  }
  tick();

  // Post-swipe settle — called from renderCard after new card appears
  window._settleCard = function() {
    const card = document.getElementById('activeCard');
    if (!card) return;
    card._settling = true;

    // Start offset — card arrives slightly rotated and shifted
    const startRot   = (Math.random() - 0.5) * 3.5;  // degrees
    const startShiftX = (Math.random() - 0.5) * 8;
    const startShiftY = 4 + Math.random() * 6;

    // Keyframe-style settle using CSS transition + requestAnimationFrame
    card.style.transition = 'none';
    card.style.translate = `${startShiftX}px ${startShiftY}px`;
    card.style.rotate    = `${startRot}deg`;

    // Frame 1 — let the above paint
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        card.style.transition = 'translate 0.55s cubic-bezier(0.22,1,0.36,1), rotate 0.55s cubic-bezier(0.22,1,0.36,1)';
        card.style.translate  = `${driftX}px ${driftY}px`;
        card.style.rotate     = '0deg';
        setTimeout(() => {
          card.style.transition = '';
          card._settling = false;
        }, 560);
      });
    });
  };
})();

// Init peel corner — will be properly set after card renders
_peelCx = 9999; _peelCy = 9999;
_peelTx = 9999; _peelTy = 9999;

// Flip back to front face
window._peelBack = function(card) {
  if (!card) card = document.getElementById('activeCard');
  if (!card) return;
  const front = card.querySelector('.card-front');
  const back  = card.querySelector('.card-back');
  const W = front ? front.offsetWidth  : 360;
  const H = front ? front.offsetHeight : 400;

  // Restore canvas so peel animation plays back
  const cv = card.querySelector('#peelCanvas');
  if (cv) { cv.style.display = ''; cv.style.opacity = '1'; cv.style.transition = ''; }

  // Restore front visibility immediately (it's behind the peel)
  if (front) {
    front.style.visibility = 'visible';
    front.style.opacity = '1';
    front.style.transition = '';
    front.style.clipPath = 'none';
  }
  if (back) {
    back.style.pointerEvents = 'none';
    back.style.overflowY = 'hidden';
  }

  // Spring the peel corner back to (W,H) — reverse animation through _peelFrame
  _peelOpen = false;
  // Corner starts from wherever it currently is (fully peeled = off-card)
  // If fully off-card, set it just off the top-left so spring plays back visibly
  if (_peelCx < 0 || _peelCy < 0) {
    _peelCx = Math.min(_peelCx, -W * 0.4);
    _peelCy = Math.min(_peelCy, -H * 0.4);
  }
  _peelTx = W; _peelTy = H;
  _peelVx = 0; _peelVy = 0;

  // Use a faster spring for the return
  if (_peelRaf) cancelAnimationFrame(_peelRaf);

  // Fixed-duration eased return — always ~900ms regardless of how far the peel went
  const revStartCx = _peelCx, revStartCy = _peelCy;
  const revDuration = 900; // ms
  let revStart = null;

  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  function reverseFrame(ts) {
    if (!revStart) revStart = ts;
    const elapsed = ts - revStart;
    const t = Math.min(elapsed / revDuration, 1);
    const e = easeInOutCubic(t);

    _peelCx = revStartCx + (W - revStartCx) * e;
    _peelCy = revStartCy + (H - revStartCy) * e;
    _applyPeel(card);

    if (t < 1) {
      _peelRaf = requestAnimationFrame(reverseFrame);
    } else {
      _peelRaf = null;
      _peelCx = W; _peelCy = H;
      _peelReset(card, front, back, W, H);
    }
  }
  _peelRaf = requestAnimationFrame(reverseFrame);
};

initStack();
document.addEventListener('keydown', e => {
  if (e.key === 'd' || e.key === 'D') document.body.classList.toggle('debug-mode');
});
</script>
