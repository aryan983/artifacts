<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lines That Matter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0a0c;
–surface: #111116;
–surface2: #18181f;
–border: rgba(255,255,255,0.07);
–accent: #c8a96e;
–accent2: #7b68ee;
–text: #e8e4dc;
–muted: #6b6878;
–pill-bg: rgba(200,169,110,0.12);
–pill-hover: rgba(200,169,110,0.22);
}

html, body {
height: 100%;
background: var(–bg);
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
}

/* ── Header ── */
header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
padding: 18px 24px 14px;
background: linear-gradient(to bottom, var(–bg) 60%, transparent);
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 18px;
letter-spacing: 0.02em;
color: var(–accent);
opacity: 0.9;
}

.counter {
font-size: 12px;
color: var(–muted);
letter-spacing: 0.08em;
font-weight: 300;
}

/* ── Main card area ── */
#stage {
position: fixed;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
padding: 80px 0 180px;
overflow: hidden;
}

.card-stack {
position: relative;
width: 100%;
max-width: 480px;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
padding: 0 20px;
}

.quote-card {
position: absolute;
width: 100%;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 40px 32px 32px;
transition: transform 0.08s ease, opacity 0.08s ease;
touch-action: pan-y;
user-select: none;
cursor: grab;
will-change: transform;
box-shadow: 0 4px 60px rgba(0,0,0,0.5);
}

.card-ghost-1 {
transform: scale(0.95) translateY(12px);
opacity: 0.4;
pointer-events: none;
z-index: 0;
}

.card-ghost-2 {
transform: scale(0.9) translateY(24px);
opacity: 0.2;
pointer-events: none;
z-index: -1;
}

.quote-card.active {
z-index: 10;
cursor: grab;
}

.quote-card.dragging {
cursor: grabbing;
transition: none;
}

.quote-card.flying-left {
transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
transform: translateX(-120%) rotate(-8deg) !important;
opacity: 0;
}

.quote-card.flying-right {
transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
transform: translateX(120%) rotate(8deg) !important;
opacity: 0;
}

.card-incoming {
animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes cardIn {
from { transform: scale(0.88) translateY(30px); opacity: 0; }
to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* ── Quote text ── */
.quote-mark {
font-family: ‘Playfair Display’, serif;
font-size: 52px;
line-height: 0.5;
color: var(–accent);
opacity: 0.35;
display: block;
margin-bottom: 12px;
}

.quote-text {
font-family: ‘Playfair Display’, serif;
font-size: clamp(18px, 5vw, 24px);
font-style: italic;
line-height: 1.55;
color: var(–text);
font-weight: 400;
margin-bottom: 28px;
}

.quote-source {
display: flex;
align-items: flex-start;
gap: 12px;
padding-top: 20px;
border-top: 1px solid var(–border);
}

.source-icon {
width: 36px;
height: 36px;
border-radius: 8px;
background: var(–surface2);
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
flex-shrink: 0;
border: 1px solid var(–border);
}

.source-details {
flex: 1;
min-width: 0;
}

.source-title {
font-size: 13px;
font-weight: 500;
color: var(–text);
opacity: 0.9;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.source-meta {
font-size: 11px;
color: var(–muted);
margin-top: 2px;
font-weight: 300;
letter-spacing: 0.04em;
}

.source-type-badge {
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
font-weight: 500;
letter-spacing: 0.06em;
text-transform: uppercase;
flex-shrink: 0;
align-self: center;
}
.badge-movie  { background: rgba(200,169,110,0.15); color: var(–accent); }
.badge-tv     { background: rgba(123,104,238,0.15); color: var(–accent2); }

/* ── Info pills ── */
.info-pills {
display: flex;
gap: 8px;
margin-top: 20px;
flex-wrap: wrap;
}

.pill {
display: flex;
align-items: center;
gap: 5px;
padding: 7px 13px;
border-radius: 30px;
background: var(–pill-bg);
border: 1px solid rgba(200,169,110,0.2);
font-size: 11px;
font-weight: 500;
color: var(–accent);
cursor: pointer;
letter-spacing: 0.05em;
text-transform: uppercase;
transition: background 0.15s ease, transform 0.1s ease;
-webkit-tap-highlight-color: transparent;
}

.pill:active { transform: scale(0.96); background: var(–pill-hover); }

.pill svg { width: 11px; height: 11px; stroke: var(–accent); fill: none; }

/* ── Drawer panel ── */
.info-drawer {
position: fixed;
inset: 0;
z-index: 200;
display: flex;
flex-direction: column;
justify-content: flex-end;
pointer-events: none;
opacity: 0;
transition: opacity 0.25s ease;
}

.info-drawer.open {
pointer-events: all;
opacity: 1;
}

.drawer-backdrop {
position: absolute;
inset: 0;
background: rgba(0,0,0,0.65);
backdrop-filter: blur(4px);
}

.drawer-sheet {
position: relative;
z-index: 1;
background: var(–surface);
border-radius: 24px 24px 0 0;
border: 1px solid var(–border);
border-bottom: none;
padding: 12px 24px 48px;
max-height: 72vh;
overflow-y: auto;
transform: translateY(100%);
transition: transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
}

.info-drawer.open .drawer-sheet {
transform: translateY(0);
}

.drawer-handle {
width: 36px;
height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 24px;
}

.drawer-tab-title {
font-family: ‘Playfair Display’, serif;
font-size: 11px;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–accent);
margin-bottom: 16px;
font-style: normal;
}

.drawer-content {
display: none;
}
.drawer-content.active { display: block; }

.drawer-movie-title {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
font-weight: 700;
color: var(–text);
margin-bottom: 6px;
}

.drawer-movie-year {
font-size: 13px;
color: var(–muted);
margin-bottom: 16px;
}

.drawer-body-text {
font-size: 14px;
line-height: 1.7;
color: rgba(232,228,220,0.75);
font-weight: 300;
}

.drawer-actor-list {
display: flex;
flex-direction: column;
gap: 12px;
margin-top: 4px;
}

.actor-row {
display: flex;
align-items: center;
gap: 14px;
padding: 12px;
background: var(–surface2);
border-radius: 12px;
border: 1px solid var(–border);
}

.actor-avatar {
width: 42px;
height: 42px;
border-radius: 50%;
background: linear-gradient(135deg, var(–accent) 0%, var(–accent2) 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 15px;
font-weight: 600;
color: var(–bg);
flex-shrink: 0;
font-family: ‘DM Sans’, sans-serif;
}

.actor-info { flex: 1; }

.actor-name {
font-size: 14px;
font-weight: 500;
color: var(–text);
}

.actor-role {
font-size: 11px;
color: var(–muted);
margin-top: 2px;
font-style: italic;
}

.trivia-item {
padding: 14px;
background: var(–surface2);
border-radius: 12px;
border-left: 3px solid var(–accent);
font-size: 13px;
line-height: 1.65;
color: rgba(232,228,220,0.8);
margin-bottom: 10px;
font-weight: 300;
}

/* ── Bottom controls ── */
#controls {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 100;
padding: 20px 24px 36px;
background: linear-gradient(to top, var(–bg) 60%, transparent);
}

.controls-inner {
max-width: 480px;
margin: 0 auto;
display: flex;
flex-direction: column;
gap: 14px;
}

/* swipe hint */
.swipe-hint {
text-align: center;
font-size: 11px;
color: var(–muted);
letter-spacing: 0.08em;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.swipe-hint::before, .swipe-hint::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–border);
}

/* ── Nav buttons ── */
.nav-buttons {
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
}

.nav-btn {
width: 52px;
height: 52px;
border-radius: 50%;
background: var(–surface2);
border: 1px solid var(–border);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: background 0.15s, transform 0.1s, border-color 0.15s;
-webkit-tap-highlight-color: transparent;
color: var(–muted);
}

.nav-btn:active { transform: scale(0.92); }

.nav-btn.primary {
width: 64px;
height: 64px;
background: var(–accent);
border-color: var(–accent);
color: var(–bg);
}

.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
.nav-btn.primary svg { width: 24px; height: 24px; stroke: var(–bg); }

/* search overlay */
#search-overlay {
position: fixed;
inset: 0;
z-index: 300;
background: var(–bg);
display: flex;
flex-direction: column;
padding: 60px 24px 24px;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease;
}

#search-overlay.open {
opacity: 1;
pointer-events: all;
}

.search-bar {
display: flex;
align-items: center;
gap: 12px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 14px 18px;
margin-bottom: 20px;
}

.search-bar svg { stroke: var(–muted); width: 18px; height: 18px; flex-shrink: 0; }

.search-bar input {
flex: 1;
background: none;
border: none;
outline: none;
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
color: var(–text);
caret-color: var(–accent);
}

.search-bar input::placeholder { color: var(–muted); }

.search-close {
background: none;
border: none;
color: var(–muted);
font-size: 14px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
padding: 4px 8px;
letter-spacing: 0.04em;
}

.search-results {
flex: 1;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 10px;
}

.search-result-item {
padding: 16px;
background: var(–surface);
border-radius: 14px;
border: 1px solid var(–border);
cursor: pointer;
transition: background 0.15s;
}

.search-result-item:active { background: var(–surface2); }

.sri-quote {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 14px;
color: var(–text);
line-height: 1.5;
margin-bottom: 8px;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.sri-meta {
font-size: 11px;
color: var(–muted);
}

.search-empty {
text-align: center;
color: var(–muted);
font-size: 14px;
padding: 40px 0;
}

.category-filter {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 12px;
scrollbar-width: none;
margin-bottom: 4px;
}
.category-filter::-webkit-scrollbar { display: none; }

.cat-btn {
white-space: nowrap;
padding: 7px 14px;
border-radius: 20px;
background: var(–surface);
border: 1px solid var(–border);
color: var(–muted);
font-size: 12px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}

.cat-btn.active {
background: var(–pill-bg);
border-color: var(–accent);
color: var(–accent);
}

/* liked icon pulse */
@keyframes heartPulse {
0%   { transform: scale(1); }
50%  { transform: scale(1.35); }
100% { transform: scale(1); }
}
.liked svg { animation: heartPulse 0.3s ease; stroke: #e05d5d !important; fill: #e05d5d !important; }

/* progress dots */
.progress-dots {
display: flex;
gap: 5px;
justify-content: center;
margin-bottom: 4px;
}
.progress-dot {
width: 5px;
height: 5px;
border-radius: 50%;
background: var(–border);
transition: all 0.25s ease;
}
.progress-dot.current {
background: var(–accent);
width: 16px;
border-radius: 3px;
}
</style>

</head>

<script>
const QUOTES = [
  // ── CLASSICS ──
  {q:"Frankly, my dear, I don't give a damn.", src:"Gone with the Wind", year:1939, type:"movie", char:"Rhett Butler", actors:[{name:"Clark Gable",role:"Rhett Butler"}], desc:"The most voted #1 movie quote of all time by the American Film Institute. Delivered in the final scene as Rhett walks out on Scarlett for good.", trivia:["The word 'damn' was considered scandalous in 1939 — producer David O. Selznick paid a $5,000 fine to use it.","Clark Gable almost didn't say it. He felt the line was too melodramatic. Director Victor Fleming convinced him to go for it."], cat:"Classic"},
  {q:"I'm going to make him an offer he can't refuse.", src:"The Godfather", year:1972, type:"movie", char:"Vito Corleone", actors:[{name:"Marlon Brando",role:"Vito Corleone"}], desc:"The defining line of Francis Ford Coppola's masterpiece. Spoken with quiet menace, it encapsulates the entire philosophy of power and fear.", trivia:["Marlon Brando improvised much of his performance. He stuffed cotton in his cheeks to appear jowly — for the actual film he wore a dental prosthetic.","The film was adapted from Mario Puzo's novel. Puzo himself co-wrote the screenplay with Coppola."], cat:"Classic"},
  {q:"You don't understand! I could've had class. I could've been a contender. I could've been somebody, instead of a bum, which is what I am.", src:"On the Waterfront", year:1954, type:"movie", char:"Terry Malloy", actors:[{name:"Marlon Brando",role:"Terry Malloy"}], desc:"One of cinema's great expressions of regret — a wasted life summed up in a taxi cab. The speech confronts the cost of moral compromise.", trivia:["Brando based his performance partly on his own feelings of having compromised himself.","The film was Elia Kazan's personal atonement for naming names to HUAC — an irony not lost on critics."], cat:"Classic"},
  {q:"Here's looking at you, kid.", src:"Casablanca", year:1942, type:"movie", char:"Rick Blaine", actors:[{name:"Humphrey Bogart",role:"Rick Blaine"}], desc:"Tender, bittersweet, and iconic. Rick says it four times in the film, each time the weight of it grows heavier.", trivia:["Bogart reportedly said this phrase to Ingrid Bergman while teaching her poker between takes.","Casablanca holds the record for most quotes in the AFI top 100 — with six entries."], cat:"Classic"},
  {q:"You talkin' to me?", src:"Taxi Driver", year:1976, type:"movie", char:"Travis Bickle", actors:[{name:"Robert De Niro",role:"Travis Bickle"}], desc:"Entirely improvised. Travis rehearses in front of a mirror, rehearsing a confrontation that exists only in his mind. A chilling portrait of isolation.", trivia:["The line is not in the original script by Paul Schrader. De Niro improvised the entire mirror scene.","Scorsese told De Niro there was nobody else in the room — the rest came naturally."], cat:"Classic"},
  {q:"What we've got here is failure to communicate.", src:"Cool Hand Luke", year:1967, type:"movie", char:"The Captain", actors:[{name:"Strother Martin",role:"The Captain"}], desc:"Bureaucratic cruelty dressed up as reason. The line captures every institution that punishes independence by calling it a communication problem.", trivia:["The line was ranked #11 in AFI's 100 greatest movie quotes.","It was sampled in Guns N' Roses' 'Civil War' in 1991, introducing it to a new generation."], cat:"Classic"},
  {q:"I love the smell of napalm in the morning.", src:"Apocalypse Now", year:1979, type:"movie", char:"Lt. Col. Kilgore", actors:[{name:"Robert Duvall",role:"Lt. Col. Kilgore"}], desc:"The full speech ends with '…smells like victory.' A blackly comic meditation on war's seduction — Kilgore means every word.", trivia:["Duvall's improvised additions to the scene were largely kept in the final cut.","Francis Ford Coppola filmed this during an actual military operation in the Philippines."], cat:"Classic"},
  {q:"You can't handle the truth!", src:"A Few Good Men", year:1992, type:"movie", char:"Col. Jessep", actors:[{name:"Jack Nicholson",role:"Col. Nathan Jessep"}], desc:"The complete speech is even more devastating — an argument that civilian comfort depends on soldiers doing terrible things. Jessep isn't entirely wrong, which makes him terrifying.", trivia:["Nicholson reportedly hated the line and argued with director Rob Reiner about it.","Tom Cruise had the line in mind throughout shooting — their first scene together was written for maximum tension."], cat:"Classic"},
  {q:"I am big! It's the pictures that got small.", src:"Sunset Boulevard", year:1950, type:"movie", char:"Norma Desmond", actors:[{name:"Gloria Swanson",role:"Norma Desmond"}], desc:"One of cinema's great lines about fame, delusion and obsolescence. Norma doesn't know she's the joke — which is the tragedy.", trivia:["Gloria Swanson was herself a faded silent film star — the line hit painfully close to home.","Billy Wilder cast her after she was passed over for a major studio role."], cat:"Classic"},
  {q:"I'm as mad as hell, and I'm not going to take this anymore!", src:"Network", year:1976, type:"movie", char:"Howard Beale", actors:[{name:"Peter Finch",role:"Howard Beale"}], desc:"Paddy Chayefsky's prophetic script predicted the age of outrage media. Howard Beale is the first televised demagogue.", trivia:["Peter Finch died of a heart attack before the film's release and became the first actor to win a posthumous Academy Award.","Director Sidney Lumet called it the most important film he ever made."], cat:"Classic"},
  {q:"All right, Mr. DeMille, I'm ready for my close-up.", src:"Sunset Boulevard", year:1950, type:"movie", char:"Norma Desmond", actors:[{name:"Gloria Swanson",role:"Norma Desmond"}], desc:"The final line of the film, delivered as Norma descends the stairs having lost her mind. Tragic, deluded, unforgettable.", trivia:["The real Cecil B. DeMille appears in the film, paying tribute to Swanson as a former collaborator.","Ranked #7 on the AFI 100 greatest movie quotes list."], cat:"Classic"},
  {q:"The stuff that dreams are made of.", src:"The Maltese Falcon", year:1941, type:"movie", char:"Sam Spade", actors:[{name:"Humphrey Bogart",role:"Sam Spade"}], desc:"Bogart, holding the fake statue at the end. A line stolen from Shakespeare's The Tempest — 'we are such stuff as dreams are made on.'", trivia:["John Huston's directorial debut.","The Maltese Falcon was the third film adaptation of Dashiell Hammett's novel — and by far the best."], cat:"Classic"},
  {q:"After all, tomorrow is another day.", src:"Gone with the Wind", year:1939, type:"movie", char:"Scarlett O'Hara", actors:[{name:"Vivien Leigh",role:"Scarlett O'Hara"}], desc:"Scarlett's defining moment — resilient, selfish, and somehow admirable. She'll deal with grief in the morning.", trivia:["It's the last line of the film, and almost the last line of Margaret Mitchell's novel.","Vivien Leigh beat out several hundred other candidates for the role of Scarlett."], cat:"Classic"},

  // ── ACTION & THRILLER ──
  {q:"I'll be back.", src:"The Terminator", year:1984, type:"movie", char:"The Terminator", actors:[{name:"Arnold Schwarzenegger",role:"The Terminator"}], desc:"Simple, flat, and completely terrifying in context. Arnie's accent actually made director James Cameron nervous about the line — it became the most quoted line of his career.", trivia:["Schwarzenegger originally said 'I'll come back' — Cameron insisted on 'I'll be back.'","The line is ranked #37 on AFI's top 100 movie quotes."], cat:"Action"},
  {q:"Go ahead, make my day.", src:"Sudden Impact", year:1983, type:"movie", char:"Harry Callahan", actors:[{name:"Clint Eastwood",role:"Harry Callahan"}], desc:"Said to a criminal holding a woman hostage over a diner breakfast. Harry is hoping they'll resist so he has an excuse to shoot. Cold.", trivia:["Ronald Reagan used the line in a 1985 speech threatening to veto a tax increase, cementing its cultural status.","It was the #6 ranked quote on AFI's top 100 list."], cat:"Action"},
  {q:"You're gonna need a bigger boat.", src:"Jaws", year:1975, type:"movie", char:"Martin Brody", actors:[{name:"Roy Scheider",role:"Martin Brody"}], desc:"Entirely improvised by Roy Scheider. A moment of terrified understatement that set the tone for the blockbuster era.", trivia:["An in-joke on set — the crew constantly complained the facilities boat was too small for all their equipment.","Steven Spielberg considered cutting the scene several times before seeing the audience reaction."], cat:"Action"},
  {q:"Do you feel lucky? Well, do ya, punk?", src:"Dirty Harry", year:1971, type:"movie", char:"Harry Callahan", actors:[{name:"Clint Eastwood",role:"Harry Callahan"}], desc:"Harry stands over a wounded robber, unsure himself if his .44 Magnum is loaded. He's bluffing — probably. Pure machismo and psychological warfare.", trivia:["The actual line is 'You've got to ask yourself one question: Do I feel lucky? Well, do ya, punk?' — most people misquote it.","Clint Eastwood initially turned down the role before agreeing to it."], cat:"Action"},
  {q:"I know what you're thinking. Did he fire six shots or only five?", src:"Dirty Harry", year:1971, type:"movie", char:"Harry Callahan", actors:[{name:"Clint Eastwood",role:"Harry Callahan"}], desc:"The opening of Harry's famous speech — a masterclass in screen intimidation. Harry's holding all the cards and he knows it.", trivia:["The opening scene was shot entirely on location in San Francisco.","The Scorpio Killer costume was modelled on the Zodiac Killer."], cat:"Action"},
  {q:"I am Groot.", src:"Guardians of the Galaxy", year:2014, type:"movie", char:"Groot", actors:[{name:"Vin Diesel",role:"Groot"}], desc:"Three words that contain multitudes. By the film's end, delivered with a sacrificial tenderness, they mean everything.", trivia:["Vin Diesel recorded this line in multiple languages for international releases.","Director James Gunn said the final 'We are Groot' took him completely by surprise during filming."], cat:"Action"},
  {q:"Why so serious?", src:"The Dark Knight", year:2008, type:"movie", char:"The Joker", actors:[{name:"Heath Ledger",role:"The Joker"}], desc:"Chaos philosophy in three words. The Joker doesn't want money, power or recognition — he just wants to watch order collapse.", trivia:["Heath Ledger kept a method-acting diary for months before filming, exploring the Joker's psyche.","Ledger died before the film's release. His performance won a posthumous Academy Award."], cat:"Action"},
  {q:"Some men just want to watch the world burn.", src:"The Dark Knight", year:2008, type:"movie", char:"Alfred Pennyworth", actors:[{name:"Michael Caine",role:"Alfred Pennyworth"}], desc:"Alfred's explanation of the Joker — a villain without motive, beyond reason, beyond negotiation. The scariest kind.", trivia:["The line was written by Christopher and Jonathan Nolan and is often cited as the most chilling moment in the script.","Michael Caine based Alfred partly on his own father."], cat:"Action"},
  {q:"With great power comes great responsibility.", src:"Spider-Man", year:2002, type:"movie", char:"Uncle Ben", actors:[{name:"Cliff Robertson",role:"Uncle Ben"}], desc:"The moral spine of the entire Spider-Man mythology. Ben dies because Peter didn't act — making this the most consequential lesson in superhero cinema.", trivia:["The phrase actually predates Spider-Man — versions of it appear in texts going back to the French Revolution.","Cliff Robertson insisted on being credited properly and had a famous dispute with Columbia over screen credit."], cat:"Action"},
  {q:"I'm the king of the world!", src:"Titanic", year:1997, type:"movie", char:"Jack Dawson", actors:[{name:"Leonardo DiCaprio",role:"Jack Dawson"}], desc:"Pure, reckless joy. Jack stands at the bow of the Titanic with everything ahead of him — a shot of freedom before the tragedy.", trivia:["James Cameron improvised this line during filming. DiCaprio was reluctant but Cameron insisted.","The shot required a full-scale bow section built specifically for the film."], cat:"Action"},

  // ── DRAMA ──
  {q:"Life is like a box of chocolates. You never know what you're gonna get.", src:"Forrest Gump", year:1994, type:"movie", char:"Forrest Gump", actors:[{name:"Tom Hanks",role:"Forrest Gump"}], desc:"Simple wisdom from a simple man. Mama Gump's philosophy has become one of the most quoted lines in American cinema.", trivia:["The box of chocolates is shown on screen but the quote differs slightly from the book, where it reads 'was like a box of chocolates.'","Tom Hanks shot his scenes on a bench in Savannah, Georgia over multiple days."], cat:"Drama"},
  {q:"Houston, we have a problem.", src:"Apollo 13", year:1995, type:"movie", char:"Jim Lovell", actors:[{name:"Tom Hanks",role:"Jim Lovell"}], desc:"The real transmission was 'Houston, we've had a problem.' The slight present-tense alteration makes it more urgent — and it stuck in culture.", trivia:["The actual words were spoken by astronaut Jack Swigert, not Jim Lovell — the film attributes them to Lovell.","Tom Hanks met the real Jim Lovell during production and they became close friends."], cat:"Drama"},
  {q:"Today, I consider myself the luckiest man on the face of the earth.", src:"The Pride of the Yankees", year:1942, type:"movie", char:"Lou Gehrig", actors:[{name:"Gary Cooper",role:"Lou Gehrig"}], desc:"Lou Gehrig's 1939 farewell speech, reproduced almost verbatim. A man facing terminal illness choosing gratitude over grief.", trivia:["Gary Cooper was actually left-handed, unlike Gehrig. He had to learn to bat right-handed and throw southpaw for the film.","The actual speech was delivered at Yankee Stadium on July 4, 1939. It lasted just 277 words."], cat:"Drama"},
  {q:"If you build it, he will come.", src:"Field of Dreams", year:1989, type:"movie", char:"Shoeless Joe Jackson", actors:[{name:"Ray Liotta",role:"Shoeless Joe Jackson"}], desc:"A voice in a cornfield tells a man to build a baseball diamond. It's really about faith, fathers, and the things we leave undone.", trivia:["The actual voice actor is not Ray Liotta — it's uncredited voice actor Ed Harris.","The original novel by W.P. Kinsella used 'he' — some editions misprint it as 'they will come.'"], cat:"Drama"},
  {q:"It's not who I am underneath, but what I do that defines me.", src:"Batman Begins", year:2005, type:"movie", char:"Bruce Wayne / Batman", actors:[{name:"Christian Bale",role:"Bruce Wayne"}], desc:"The film's thesis statement — Bruce reflecting Rachel's own words back at her. Identity is action, not origin.", trivia:["This line is an inversion of what Rachel tells Bruce earlier — Nolan structures the script to complete the circle.","Christian Bale lost nearly 30kg for The Machinist before bulking up for Batman Begins."], cat:"Drama"},
  {q:"Get busy living, or get busy dying.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"Prison philosophy stripped to its skeleton. Andy's survived something that should have broken him — this is why.", trivia:["The Shawshank Redemption was a box office disappointment on release but became the most-watched film on Netflix and consistently tops IMDb's ratings.","Frank Darabont adapted it from Stephen King's novella Rita Hayworth and Shawshank Redemption."], cat:"Drama"},
  {q:"Hope is a good thing, maybe the best of things, and no good thing ever dies.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"From Andy's letter to Red. In a film about men trapped by unjust systems, hope isn't naïve — it's the only act of defiance left.", trivia:["The letter scene was filmed in a single take. Morgan Freeman was instructed not to read it before the camera rolled.","Stephen King sold the adaptation rights to Frank Darabont for $1 — and sent him a dollar bill when the film became successful."], cat:"Drama"},
  {q:"I could've saved more. I could've saved more. I don't know, if I'd just... I could've got more.", src:"Schindler's List", year:1993, type:"movie", char:"Oskar Schindler", actors:[{name:"Liam Neeson",role:"Oskar Schindler"}], desc:"The final scene — Schindler's list saved over a thousand lives, and he's destroyed by the knowledge that it wasn't enough.", trivia:["Steven Spielberg said this was the most difficult scene he ever filmed.","Liam Neeson said he couldn't look at the Schindlerjuden watching him without breaking down."], cat:"Drama"},
  {q:"After all, tomorrow is another day.", src:"Gone with the Wind", year:1939, type:"movie", char:"Scarlett O'Hara", actors:[{name:"Vivien Leigh",role:"Scarlett O'Hara"}], desc:"Scarlett's defiant closing line — she'll deal with the heartbreak later. Resilience mistaken for optimism.", trivia:["Vivien Leigh won the Academy Award for this performance — though she was British and American actors had campaigned for the role.","Clark Gable reportedly cried during the final scene but hid it from the crew."], cat:"Drama"},
  {q:"In my experience, there is no such thing as luck.", src:"Star Wars", year:1977, type:"movie", char:"Obi-Wan Kenobi", actors:[{name:"Alec Guinness",role:"Obi-Wan Kenobi"}], desc:"Old Ben's quiet wisdom — a Jedi master's quiet rebuke of the mercenary Han Solo's worldview. Force vs cynicism.", trivia:["Alec Guinness won an Academy Award nomination for Best Supporting Actor for this role.","Guinness privately described the dialogue as 'fairy tale rubbish' but committed fully to the performance."], cat:"Drama"},

  // ── CRIME & THRILLER ──
  {q:"Say hello to my little friend!", src:"Scarface", year:1983, type:"movie", char:"Tony Montana", actors:[{name:"Al Pacino",role:"Tony Montana"}], desc:"The final act of defiance. Tony's backed into a corner, his empire burning, and he goes out on his own terms with an M203 grenade launcher.", trivia:["The scene took three weeks to film. Pacino was hospitalized with pneumonia during production.","Brian De Palma shot the finale in a real Miami mansion. The blood was tomato sauce."], cat:"Crime"},
  {q:"Every time I try to get out, they pull me back in.", src:"The Godfather Part III", year:1990, type:"movie", char:"Michael Corleone", actors:[{name:"Al Pacino",role:"Michael Corleone"}], desc:"Michael's lament — legitimacy has always been beyond his reach. The Corleone family name is a trap.", trivia:["Often misattributed to The Godfather or Part II, it's actually from the third film.","The line has been parodied and referenced so extensively it's become almost its own entity."], cat:"Crime"},
  {q:"Leave the gun. Take the cannoli.", src:"The Godfather", year:1972, type:"movie", char:"Peter Clemenza", actors:[{name:"Richard Castellano",role:"Peter Clemenza"}], desc:"After a mob hit, Pete has priorities. The line perfectly captures the banality of violence in organised crime.", trivia:["The line 'take the cannoli' was improvised by actor Richard Castellano — it wasn't in the script.","Screenwriter Robert Towne said it was the funniest and most disturbing improvisation he'd ever heard in a film."], cat:"Crime"},
  {q:"I'm funny how? Funny like I'm a clown? I amuse you?", src:"Goodfellas", year:1990, type:"movie", char:"Tommy DeVito", actors:[{name:"Joe Pesci",role:"Tommy DeVito"}], desc:"Joe Pesci's chilling improvisation — a real story that Henry Hill told Pesci about his own experience with a mob associate.", trivia:["Pesci told Scorsese about the real incident on which this scene is based — it was incorporated almost verbatim.","The scene was improvised in real time with Ray Liotta genuinely not knowing where it was going."], cat:"Crime"},
  {q:"As far back as I can remember, I always wanted to be a gangster.", src:"Goodfellas", year:1990, type:"movie", char:"Henry Hill", actors:[{name:"Ray Liotta",role:"Henry Hill"}], desc:"The opening line — Henry's voiceover delivered over a murder scene. The seduction of crime culture is laid out from frame one.", trivia:["The real Henry Hill was a technical consultant on the film.","Ray Liotta was not Martin Scorsese's first choice — Tom Cruise was considered for the role."], cat:"Crime"},
  {q:"You're going to need a bigger boat.", src:"Jaws", year:1975, type:"movie", char:"Martin Brody", actors:[{name:"Roy Scheider",role:"Martin Brody"}], desc:"See above — the quintessential improvised line of Hollywood's blockbuster era.", trivia:["Roy Scheider ad-libbed this after seeing the mechanical shark for the first time.","The shark's nickname on set was 'Bruce' — after Spielberg's lawyer."], cat:"Crime"},
  {q:"Get away from her, you bitch!", src:"Aliens", year:1986, type:"movie", char:"Ellen Ripley", actors:[{name:"Sigourney Weaver",role:"Ellen Ripley"}], desc:"Ripley, in a power loader, facing the Alien Queen to protect Newt. The defining action-hero line delivered by a woman at a time when that was still radical.", trivia:["Sigourney Weaver was nominated for an Academy Award for Best Actress — a first for an action film performance.","The line was originally a longer speech. Director James Cameron trimmed it for maximum impact."], cat:"Crime"},
  {q:"My name is Inigo Montoya. You killed my father. Prepare to die.", src:"The Princess Bride", year:1987, type:"movie", char:"Inigo Montoya", actors:[{name:"Mandy Patinkin",role:"Inigo Montoya"}], desc:"Twenty years of a man's life summarised in two sentences. Revenge, loss, and resolution — the most satisfying callback in cinema.", trivia:["Mandy Patinkin said this was his favourite role of his career because he identified with Inigo's grief — his own father had died of cancer.","The line is repeated six times in the film, each time with slightly different weight."], cat:"Crime"},
  {q:"I see dead people.", src:"The Sixth Sense", year:1999, type:"movie", char:"Cole Sear", actors:[{name:"Haley Joel Osment",role:"Cole Sear"}], desc:"Haley Joel Osment's trembling whisper — the film's central revelation delivered so quietly it became the defining horror line of its decade.", trivia:["M. Night Shyamalan kept the film's twist secret from everyone except the lead actors.","Haley Joel Osment was 10 years old during filming and received an Academy Award nomination for Best Supporting Actor."], cat:"Crime"},

  // ── ROMANCE & HUMAN ──
  {q:"You had me at hello.", src:"Jerry Maguire", year:1996, type:"movie", char:"Dorothy Boyd", actors:[{name:"Renée Zellweger",role:"Dorothy Boyd"}], desc:"Jerry's prepared a speech. Dorothy doesn't need it. Everything was decided at the front door.", trivia:["Cameron Crowe wrote the script after a real conversation with his future wife, Nancy Wilson.","Tom Cruise and Renée Zellweger had very little prior rehearsal — Crowe wanted genuine spontaneity."], cat:"Romance"},
  {q:"I'll have what she's having.", src:"When Harry Met Sally...", year:1989, type:"movie", char:"Older Woman (Estelle Reiner)", actors:[{name:"Estelle Reiner",role:"Customer at Katz's Deli"}], desc:"The punchline to Meg Ryan's famous deli scene. Delivered by director Rob Reiner's own mother — cast specifically for that one line.", trivia:["The deli scene was shot in Katz's Delicatessen, New York. A sign now marks the exact table.","Rob Reiner had originally planned to play the role himself before casting his mother."], cat:"Romance"},
  {q:"Nobody puts Baby in a corner.", src:"Dirty Dancing", year:1987, type:"movie", char:"Johnny Castle", actors:[{name:"Patrick Swayze",role:"Johnny Castle"}], desc:"The triumphant declaration that ends Baby's passive chapter. Johnny crosses the floor and claims her — it's permission and rebellion at once.", trivia:["Patrick Swayze said this was the hardest line to deliver without laughing — it felt absurd to him.","The film was shot in 43 days on a $6 million budget and grossed over $213 million worldwide."], cat:"Romance"},
  {q:"After all, tomorrow is another day!", src:"Gone with the Wind", year:1939, type:"movie", char:"Scarlett O'Hara", actors:[{name:"Vivien Leigh",role:"Scarlett O'Hara"}], desc:"Resilience personified. Scarlett has just been abandoned, her marriage is over, her world is ash — and she's already planning the comeback.", trivia:["The final scene was shot without Vivien Leigh and Clark Gable in the same frame — both were exhausted.","Producer David O. Selznick allegedly rewrote this scene eleven times."], cat:"Romance"},
  {q:"To infinity and beyond!", src:"Toy Story", year:1995, type:"movie", char:"Buzz Lightyear", actors:[{name:"Tim Allen",role:"Buzz Lightyear (voice)"}], desc:"A toy who doesn't know he's a toy, driven by a delusion that becomes metaphor. The phrase found its way into astronaut speeches and graduation addresses.", trivia:["Tim Allen said the line was supposed to sound ridiculous but ended up becoming genuinely inspiring.","'To infinity and beyond' was inscribed on a plaque at NASA's Jet Propulsion Laboratory."], cat:"Drama"},

  // ── PHILOSOPHICAL & PROFOUND ──
  {q:"After all this time? Always.", src:"Harry Potter and the Deathly Hallows", year:2011, type:"movie", char:"Severus Snape", actors:[{name:"Alan Rickman",role:"Severus Snape"}], desc:"The revelation of Snape's entire story in a single word. Years of sacrifice, cold cruelty, and secret grief distilled into 'always.'", trivia:["Alan Rickman was the only cast member told the ending by J.K. Rowling before filming began — so he could play the role correctly.","This scene made 'always' one of the most searched single words in internet history."], cat:"Profound"},
  {q:"There are more things in heaven and earth, Horatio, than are dreamt of in your philosophy.", src:"Hamlet", year:1996, type:"movie", char:"Hamlet", actors:[{name:"Kenneth Branagh",role:"Hamlet"}], desc:"Shakespeare's original — Hamlet telling Horatio that the rational mind has limits. Four centuries old and still true.", trivia:["Kenneth Branagh's 1996 adaptation is the only complete unabridged film version of Hamlet — running 4 hours.","The line is often misquoted as 'in your philosophy' when the original reads 'in your philosophy.'"], cat:"Profound"},
  {q:"The greatest trick the devil ever pulled was convincing the world he didn't exist.", src:"The Usual Suspects", year:1995, type:"movie", char:"Verbal Kint / Keyser Söze", actors:[{name:"Kevin Spacey",role:"Verbal Kint"}], desc:"The whole film is built on this principle. Verbal is the least likely suspect — because he tells you exactly what's happening and you still don't see it.", trivia:["The line is adapted from a Baudelaire poem: 'La plus belle des ruses du diable est de vous persuader qu'il n'existe pas.'","Kevin Spacey won the Academy Award for Best Supporting Actor for the role."], cat:"Profound"},
  {q:"It's only after we've lost everything that we're free to do anything.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"Tyler Durden's gospel of destruction. He's wrong about almost everything but completely right about the liberating terror of starting over.", trivia:["Fight Club was a box office disappointment on release but became one of the most discussed films of its era.","Brad Pitt spent months in physical preparation for the role and famously refused to eat normally."], cat:"Profound"},
  {q:"The first rule of Fight Club is: you do not talk about Fight Club.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"A rule designed to be broken. The irony is that Tyler tells this to hundreds of people — the club is a secret everyone knows.", trivia:["The line is delivered twice in rapid succession — a deliberate echo of the film's doubling motif.","The phrase has entered the language and is applied to anything involving secrecy."], cat:"Profound"},
  {q:"You either die a hero or you live long enough to see yourself become the villain.", src:"The Dark Knight", year:2008, type:"movie", char:"Harvey Dent", actors:[{name:"Aaron Eckhart",role:"Harvey Dent"}], desc:"Dent says it about Batman, not knowing it's about himself. The tragic prophecy of a man destroyed by the system he championed.", trivia:["Aaron Eckhart spent months studying the psychology of optimistic leaders who become corrupted.","The line was voted by fans as one of the greatest in superhero cinema history."], cat:"Profound"},
  {q:"Just when I thought I was out, they pull me back in.", src:"The Godfather Part III", year:1990, type:"movie", char:"Michael Corleone", actors:[{name:"Al Pacino",role:"Michael Corleone"}], desc:"Michael attempting to legitimise his family and finding the criminal world won't let him go. The prison is the name itself.", trivia:["Al Pacino and Francis Ford Coppola both felt this was the most difficult Corleone scene to shoot emotionally.","The line has been parodied extensively, most famously by The Simpsons."], cat:"Profound"},
  {q:"Carpe diem. Seize the day, boys. Make your lives extraordinary.", src:"Dead Poets Society", year:1989, type:"movie", char:"John Keating", actors:[{name:"Robin Williams",role:"John Keating"}], desc:"Keating's inaugural lesson — standing in front of photographs of long-dead alumni, reminding boys that they too will be dust.", trivia:["Robin Williams improvised much of his classroom material. Several scenes used genuine student reactions.","The film was ranked #52 on the AFI's list of 100 greatest American films."], cat:"Profound"},
  {q:"Oh captain, my captain.", src:"Dead Poets Society", year:1989, type:"movie", char:"Todd Anderson", actors:[{name:"Ethan Hawke",role:"Todd Anderson"}], desc:"Borrowed from Walt Whitman's elegy for Lincoln. The boys standing on desks — an act of solidarity against institutional betrayal.", trivia:["Ethan Hawke said this scene was shot with genuine emotion — Robin Williams' eyes filled with tears that weren't scripted.","The Walt Whitman poem 'O Captain! My Captain!' was written in 1865 after Lincoln's assassination."], cat:"Profound"},
  {q:"Remember who you are.", src:"The Lion King", year:1994, type:"movie", char:"Mufasa (Ghost)", actors:[{name:"James Earl Jones",role:"Mufasa"}], desc:"A father's voice from beyond death reminding a son of his responsibility. Simple, devastating, universally true.", trivia:["James Earl Jones and Jeremy Irons were cast partly because of the power of their contrasting voices.","The film's wildebeest stampede sequence took three years to produce and required entirely new rendering software."], cat:"Profound"},
  {q:"Why are you trying so hard to fit in when you were born to stand out?", src:"What a Girl Wants", year:2003, type:"movie", char:"Henry Dashwood", actors:[{name:"Colin Firth",role:"Henry Dashwood"}], desc:"Not a canonical classic, but the line landed in culture. Permission to be strange, amplified by every teenager who ever felt out of place.", trivia:["The film was based on the 1958 play The Reluctant Debutante.","Colin Firth reportedly added the line after suggesting the script needed a clearer thesis statement."], cat:"Profound"},
  {q:"It ain't about how hard you hit. It's about how hard you can get hit and keep moving forward.", src:"Rocky Balboa", year:2006, type:"movie", char:"Rocky Balboa", actors:[{name:"Sylvester Stallone",role:"Rocky Balboa"}], desc:"Stallone wrote this speech for himself after years of professional disappointment. Rocky's talking to his son, but Sly's talking to himself.", trivia:["The speech was not in the original script — Stallone wrote it the night before filming.","Rocky Balboa was made 16 years after Rocky V, with virtually no studio support."], cat:"Profound"},
  {q:"Fear is the path to the dark side. Fear leads to anger, anger leads to hate, hate leads to suffering.", src:"The Phantom Menace", year:1999, type:"movie", char:"Yoda", actors:[{name:"Frank Oz",role:"Yoda (voice)"}], desc:"Yoda diagnosing Anakin's future in one chain of causation. The philosophy of the entire prequel trilogy compressed into four clauses.", trivia:["Frank Oz puppeteered Yoda while delivering all lines — CGI Yoda was introduced later.","George Lucas cited Buddhist philosophy as the primary inspiration for Yoda's teachings."], cat:"Profound"},
  {q:"We accept the love we think we deserve.", src:"The Perks of Being a Wallflower", year:2012, type:"movie", char:"Bill", actors:[{name:"Paul Rudd",role:"Bill"}], desc:"A high school teacher telling a student the quiet truth about self-worth and relationships. Becomes the film's emotional key.", trivia:["The film was written and directed by Stephen Chbosky, who also wrote the original novel.","Paul Rudd said he delivers the line differently depending on which screening he's seen — each time it hits differently."], cat:"Profound"},

  // ── TV ──
  {q:"I am the one who knocks.", src:"Breaking Bad", year:2011, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"The moment Walter White becomes Heisenberg — permanently. He's spent a season pretending to be afraid. He's not afraid. He is the thing that kills.", trivia:["Writer Gennifer Hutchison said she had no idea the monologue would become iconic when writing it.","Bryan Cranston said he considered this the most important scene of the entire series."], cat:"TV"},
  {q:"Say my name.", src:"Breaking Bad", year:2012, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Heisenberg demanding acknowledgement from a rival drug distributor. Three words, total dominance, no ambiguity about who's in charge now.", trivia:["The scene was filmed in the Albuquerque desert over two days.","The line was later the title of the show's season 5 episode 7."], cat:"TV"},
  {q:"You come at the king, you best not miss.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's street philosophy — escalation without a decisive blow is fatal. He's right. It's also his own prophecy.", trivia:["Michael K. Williams said Omar was the most complicated and personal role of his career.","Omar Little became one of the most beloved TV characters ever written — Barack Obama cited him as his favourite character."], cat:"TV"},
  {q:"A man's gotta have a code.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's ethics are rigid even within moral chaos. He doesn't rob civilians, he doesn't harm innocents. His code is more consistent than most legitimate characters.", trivia:["David Simon based Omar loosely on a real-life Baltimore stick-up artist named Donnie Andrews.","The Wire was famously snubbed by awards shows but is now widely considered the greatest TV drama ever made."], cat:"TV"},
  {q:"Money ain't got no owners, only spenders.", src:"The Wire", year:2003, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar on economics. Money is neutral — it flows to whoever takes it. A street philosopher in a broken system.", trivia:["The Wire season 3 introduced 'Hamsterdam' — a real debate on drug decriminalisation that the show's writers had with actual Baltimore politicians.","David Simon worked as a crime reporter for the Baltimore Sun before creating the show."], cat:"TV"},
  {q:"More is lost by indecision than wrong decision.", src:"The Sopranos", year:2000, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"Tony's management philosophy. It's sound advice from a terrible man. The Sopranos specialised in making you nod along with the monster.", trivia:["James Gandolfini improvised many of Tony's more philosophical moments in consultation with the writers.","The Sopranos changed the economic model of prestige television, proving that subscribers would pay for dark, morally complex drama."], cat:"TV"},
  {q:"Those who want respect, give respect.", src:"The Sopranos", year:1999, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"Tony preaching what he doesn't practise — which is half the point of The Sopranos. His self-awareness never reaches deep enough.", trivia:["David Chase has said Tony Soprano was partly inspired by his own difficult relationship with his mother.","James Gandolfini won three Emmy Awards for the role."], cat:"TV"},
  {q:"I am not in danger, Skyler. I am the danger.", src:"Breaking Bad", year:2012, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"The full speech ends '…I am the one who knocks.' But this is the pivot — Walter is done asking permission to be what he's become.", trivia:["Anna Gunn, playing Skyler, said filming this scene was the most frightened she ever felt on set.","Bryan Cranston said this was the moment Walter White died and only Heisenberg remained."], cat:"TV"},
  {q:"I did it for me. I liked it. I was good at it. And I was really… I was alive.", src:"Breaking Bad", year:2013, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"The show's final confession — the story was never about providing for his family. It was about ego, identity, and finally feeling real.", trivia:["Vince Gilligan said this scene completed Walt's journey — the last honest moment in five seasons of self-deception.","The line was not in early drafts. Bryan Cranston and Gilligan wrote it together in rehearsal."], cat:"TV"},
  {q:"If you believe that I'm a killer, what do you think is going to happen when I walk out of that door?", src:"The Wire", year:2004, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar in court, cross-examining a detective. The courtroom scene is one of TV's finest — a man without legal legitimacy more credible than the law itself.", trivia:["The scene was based on a real court testimony that David Simon observed as a journalist.","Michael K. Williams had never acted professionally before The Wire — he was a dancer."], cat:"TV"},
  {q:"I don't want to survive. I want to live.", src:"12 Years a Slave", year:2013, type:"movie", char:"Solomon Northup", actors:[{name:"Chiwetel Ejiofor",role:"Solomon Northup"}], desc:"The distinction between mere biological endurance and a life worth living. Northup refuses to let enslavement reduce him to mere survival.", trivia:["The film is based on Solomon Northup's 1853 memoir — one of the most important abolitionist texts in American history.","Chiwetel Ejiofor won the BAFTA for Best Actor. The film won the Academy Award for Best Picture."], cat:"Drama"},
  {q:"Before you judge me, try hard to love me. Look within your heart then ask, have you seen my childhood?", src:"Michael Jackson", year:1995, type:"tv", char:"Michael Jackson", actors:[{name:"Michael Jackson",role:"Himself"}], desc:"Not scripted fiction — MJ's real voice from the song 'Childhood.' An artist's plea for understanding wrapped in melody.", trivia:["The song was written for the film Free Willy 2 but became one of Jackson's most personal artistic statements.","Jackson's childhood trauma from his career launch at age 6 informed nearly all his work."], cat:"TV"},
  {q:"The things you own end up owning you.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"Anti-consumerism as self-liberation — Tyler Durden's manifesto. Twenty-five years on, it's been printed on merchandise sold at Urban Outfitters. The irony is not lost.", trivia:["David Fincher deliberately made Tyler Durden's philosophy seductive — and then showed its consequences.","The film cost $63 million and grossed $37 million in cinemas. On DVD and streaming it became a generational touchstone."], cat:"Profound"},
  {q:"The world will ask you who you are, and if you do not know, the world will tell you.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"The quiet terror of identity — define yourself or be defined. Andy speaks from the lowest point of his life and still sees clearly.", trivia:["Frank Darabont wrote the screenplay in eight weeks, convinced the studios wouldn't option a Stephen King drama without horror.","The film received seven Academy Award nominations and won none."], cat:"Profound"},
  {q:"I've seen things you people wouldn't believe. Attack ships on fire off the shoulder of Orion.", src:"Blade Runner", year:1982, type:"movie", char:"Roy Batty", actors:[{name:"Rutger Hauer",role:"Roy Batty"}], desc:"The dying words of a replicant — memories that will be lost with him. The most beautiful death speech in science fiction. Mostly improvised.", trivia:["Rutger Hauer largely wrote this speech himself the night before filming, cutting the scripted version to its essence.","Director Ridley Scott called it 'the greatest death monologue in cinema history.'"], cat:"Profound"},
  {q:"All those moments will be lost in time, like tears in rain.", src:"Blade Runner", year:1982, type:"movie", char:"Roy Batty", actors:[{name:"Rutger Hauer",role:"Roy Batty"}], desc:"The continuation of Roy's final speech. A meditation on mortality and the uniqueness of consciousness. He's a machine. He's more human than anyone.", trivia:["This line was also improvised by Hauer — the original script ended differently.","'Tears in rain' has been adopted by philosophers discussing personal identity and the nature of memory."], cat:"Profound"},
  {q:"Do or do not. There is no try.", src:"The Empire Strikes Back", year:1980, type:"movie", char:"Yoda", actors:[{name:"Frank Oz",role:"Yoda (voice)"}], desc:"Yoda refusing Luke's hedging. Commitment is the Force's first demand. The line has been cited in military training, sports coaching, and countless commencement speeches.", trivia:["Frank Oz performed Yoda with his right hand while puppeteering with three other operators behind the scenes.","George Lucas wrote Yoda's dialogue with a specific grammatical inversion (object-subject-verb) to suggest an alien thought pattern."], cat:"Profound"},
  {q:"Never tell me the odds.", src:"The Empire Strikes Back", year:1980, type:"movie", char:"Han Solo", actors:[{name:"Harrison Ford",role:"Han Solo"}], desc:"Han dismissing C-3PO's survival calculations. The entire Han Solo character in four words — confident, anti-intellectual, right.", trivia:["Harrison Ford improvised many of Han Solo's most beloved lines, often in conflict with George Lucas's scripted dialogue.","The asteroid field sequence required entirely new ILM technology to render."], cat:"Action"},
  {q:"I find your lack of faith disturbing.", src:"Star Wars", year:1977, type:"movie", char:"Darth Vader", actors:[{name:"David Prowse",role:"Darth Vader (body)"},{name:"James Earl Jones",role:"Darth Vader (voice)"}], desc:"Vader Force-choking an Imperial officer mid-meeting for doubting the Death Star's weakness. Authority expressed through casual murder.", trivia:["James Earl Jones was uncredited at his own request for the original theatrical release.","David Prowse (the man inside the suit) only discovered Vader was Luke's father by reading the script — he'd been given false pages during filming."], cat:"Action"},
  {q:"You are who you are. Nothing more, nothing less.", src:"The Lion King", year:1994, type:"movie", char:"Rafiki", actors:[{name:"Robert Guillaume",role:"Rafiki (voice)"}], desc:"Simple identity philosophy from the mandrill philosopher-shaman. Acceptance without diminishment.", trivia:["Robert Guillaume improvised much of Rafiki's accent and cadence.","The Lion King is loosely based on Shakespeare's Hamlet — Disney has never officially confirmed this."], cat:"Profound"},
  {q:"Courage is not the absence of fear. It is the judgement that something else is more important than fear.", src:"The Princess Diaries", year:2001, type:"movie", char:"Queen Clarisse Renaldi", actors:[{name:"Julie Andrews",role:"Queen Clarisse Renaldi"}], desc:"Julie Andrews reframing heroism. Bravery isn't emotional immunity — it's hierarchy of priorities.", trivia:["The quote is often incorrectly attributed to Ambrose Redmoon — but this film is its most famous delivery.","Director Garry Marshall said this line was the original pitch for the whole film."], cat:"Profound"},
  {q:"Love is patient, love is kind.", src:"1 Corinthians", year:1984, type:"movie", char:"Various", actors:[{name:"Various actors",role:"Wedding scenes"}], desc:"The passage from Corinthians has appeared in countless films — but in Four Weddings and a Funeral, read at the altar, it lands with new weight.", trivia:["1 Corinthians 13 is the most commonly chosen reading at Christian weddings in the UK.","In Four Weddings, the passage is recited by the deaf character George — signing and speaking simultaneously."], cat:"Romance"},

  // ── MORE TV CLASSICS ──
  {q:"Winter is coming.", src:"Game of Thrones", year:2011, type:"tv", char:"Ned Stark", actors:[{name:"Sean Bean",role:"Ned Stark"}], desc:"The Stark family motto — and the entire show's central warning. Most of the realm ignores it. Most of the realm suffers for it.", trivia:["George R.R. Martin conceived 'Winter is Coming' as a commentary on climate change and political short-termism.","Sean Bean's Ned Stark was killed at the end of season 1 — subverting the convention that the moral protagonist survives."], cat:"TV"},
  {q:"A lion does not concern himself with the opinion of sheep.", src:"Game of Thrones", year:2011, type:"tv", char:"Tywin Lannister", actors:[{name:"Charles Dance",role:"Tywin Lannister"}], desc:"Tywin's aristocratic worldview — contempt for popular opinion dressed as philosophy. He's monstrous and he's usually right.", trivia:["Charles Dance said Tywin was the easiest role to inhabit because the character's logic was internally consistent.","GRRM has said Tywin Lannister is the most difficult character to write because his evil is functional and reasonable."], cat:"TV"},
  {q:"When you play the game of thrones, you win or you die.", src:"Game of Thrones", year:2011, type:"tv", char:"Cersei Lannister", actors:[{name:"Lena Headey",role:"Cersei Lannister"}], desc:"Cersei's statement of political reality — power has no neutral position, no half-measures. This line defines the show's entire moral framework.", trivia:["The line is almost verbatim from George R.R. Martin's novel.","Lena Headey won multiple Emmy nominations for the role but never won, which became a running industry joke."], cat:"TV"},
  {q:"Not today.", src:"Game of Thrones", year:2012, type:"tv", char:"Arya Stark / Syrio Forel", actors:[{name:"Maisie Williams",role:"Arya Stark"},{name:"Miltos Yerolemou",role:"Syrio Forel"}], desc:"Syrio Forel's answer to the God of Death — refused. Arya carries this into every battle. A two-word philosophy of survival.", trivia:["Miltos Yerolemou (Syrio Forel) trained Maisie Williams in actual swordsmanship for the role.","The line 'not today' is spoken by Arya at the Battle of Winterfell as she kills the Night King — the payoff of seven seasons."], cat:"TV"},
  {q:"I drink and I know things.", src:"Game of Thrones", year:2016, type:"tv", char:"Tyrion Lannister", actors:[{name:"Peter Dinklage",role:"Tyrion Lannister"}], desc:"Tyrion's self-deprecating philosophy — using humour to deflect the tragedy of being the most intelligent person in every room and the least respected.", trivia:["Peter Dinklage won an Emmy for his portrayal of Tyrion, and the character became one of the most popular in television history.","The line was used on thousands of mugs, t-shirts and prints within weeks of airing."], cat:"TV"},
  {q:"The night is dark and full of terrors.", src:"Game of Thrones", year:2011, type:"tv", char:"Melisandre", actors:[{name:"Carice van Houten",role:"Melisandre"}], desc:"The Lord of Light religion's prayer against darkness — used by Melisandre with absolute conviction that disguises absolute ruthlessness.", trivia:["Carice van Houten said she enjoyed playing Melisandre's certainty — it's rarer in dramatic characters than ambiguity.","The phrase became standard online vocabulary for expressing dread."], cat:"TV"},
  {q:"The world is not a wish-granting factory.", src:"The Fault in Our Stars", year:2014, type:"movie", char:"Augustus Waters", actors:[{name:"Ansel Elgort",role:"Augustus Waters"}], desc:"A teenager with cancer refusing to sentimentalise his situation. The film earned its emotional power by resisting the comforting lies.", trivia:["Based on John Green's 2012 novel — Green based Augustus partly on a friend who died of bone cancer.","The film grossed $307 million worldwide on a $12 million budget."], cat:"Profound"},
  {q:"The truth will set you free. But first, it will piss you off.", src:"Knives Out", year:2019, type:"movie", char:"Benoit Blanc", actors:[{name:"Daniel Craig",role:"Benoit Blanc"}], desc:"A rewritten Gloria Steinem quote — recontextualised as detective philosophy. Rian Johnson's script is full of adapted wisdom.", trivia:["Daniel Craig said he based Benoit Blanc's accent on a specific Southern Gothic tradition he researched extensively.","The film was written with Craig specifically in mind after Johnson saw his dramatic range."], cat:"Profound"},
  {q:"I'm also just a girl, standing in front of a boy, asking him to love her.", src:"Notting Hill", year:1999, type:"movie", char:"Anna Scott", actors:[{name:"Julia Roberts",role:"Anna Scott"}], desc:"A movie star discarding her fame as a credential and appealing to the most basic human vulnerability. The best romantic speech in British cinema.", trivia:["Richard Curtis wrote the scene in one sitting and said it was the quickest piece of writing he'd ever done.","Julia Roberts said the line felt almost embarrassingly naked — which is exactly what made it work."], cat:"Romance"},
  {q:"Happiness is only real when shared.", src:"Into the Wild", year:2007, type:"movie", char:"Christopher McCandless", actors:[{name:"Emile Hirsch",role:"Christopher McCandless"}], desc:"McCandless's final journal entry, written as he was dying alone in Alaska. The thing he discovered too late.", trivia:["The real Christopher McCandless died in August 1992 aged 24. His story was first told in Jon Krakauer's 1996 book.","Director Sean Penn corresponded with McCandless's family for years before they granted permission for the film."], cat:"Profound"},
  {q:"To be, or not to be, that is the question.", src:"Hamlet", year:1996, type:"movie", char:"Hamlet", actors:[{name:"Kenneth Branagh",role:"Hamlet"}], desc:"The most famous line in English literature. The entire play — and arguably the entire Western dramatic tradition — turns on this question.", trivia:["The soliloquy has been analysed in more academic papers than any other passage in English literature.","Kenneth Branagh filmed the soliloquy in a single unbroken take with no cuts."], cat:"Classic"},
  {q:"Et tu, Bruté?", src:"Julius Caesar (film)", year:1953, type:"movie", char:"Julius Caesar", actors:[{name:"Louis Calhern",role:"Julius Caesar"}], desc:"Shakespeare's dramatisation of Caesar's final words — the betrayal of a friend cutting deeper than the knife. Historically probably not said.", trivia:["Historical sources give different last words — Suetonius suggested Caesar said nothing, others suggest Greek.","The phrase has become shorthand in English for betrayal by a trusted ally."], cat:"Classic"},
  {q:"Elementary, my dear Watson.", src:"Sherlock Holmes", year:1984, type:"tv", char:"Sherlock Holmes", actors:[{name:"Jeremy Brett",role:"Sherlock Holmes"}], desc:"Arthur Conan Doyle never actually wrote this exact phrase — it's an amalgamation. But Jeremy Brett's delivery made it definitive.", trivia:["The phrase first appeared in a Strand Magazine parody in 1915, not in any Doyle original.","Jeremy Brett is widely considered the definitive screen Holmes — he was diagnosed with bipolar disorder and channelled it into the role."], cat:"Classic"},
  {q:"My precious.", src:"The Lord of the Rings: The Two Towers", year:2002, type:"movie", char:"Gollum", actors:[{name:"Andy Serkis",role:"Gollum"}], desc:"Gollum's entire tragedy in two words — an object of beauty that corrupted its bearer over centuries. Addiction, obsession, and the destruction of self.", trivia:["Andy Serkis developed the Gollum voice after imagining a character with addiction-style psychology.","Peter Jackson called Serkis's Gollum performance the most technically and emotionally demanding in the trilogy."], cat:"Classic"},
  {q:"You shall not pass!", src:"The Lord of the Rings: The Fellowship of the Ring", year:2001, type:"movie", char:"Gandalf", actors:[{name:"Ian McKellen",role:"Gandalf"}], desc:"Gandalf standing alone on the Bridge of Khazad-dûm against a Balrog. The line is an act of pure will — the sacrifice of the old wizard for the Fellowship.", trivia:["Ian McKellen said this was the single most emotionally demanding line he'd ever been asked to deliver.","Tolkien's original text reads 'You cannot pass' — the film altered it for emphasis."], cat:"Classic"},
  {q:"It's a dangerous business, Frodo, going out your door.", src:"The Lord of the Rings: The Fellowship of the Ring", year:2001, type:"movie", char:"Bilbo Baggins", actors:[{name:"Ian Holm",role:"Bilbo Baggins"}], desc:"Tolkien's most beautiful sentence — the first step as the one of consequence. All adventure begins with leaving the comfortable known.", trivia:["Tolkien wrote this in The Fellowship of the Ring — it was Bilbo's journal entry.","Ian Holm had previously played Frodo on BBC Radio 4's 1981 adaptation of Lord of the Rings."], cat:"Classic"},
  {q:"There can be only one.", src:"Highlander", year:1986, type:"movie", char:"Conner MacLeod", actors:[{name:"Christopher Lambert",role:"Conner MacLeod"}], desc:"The tagline that became canon. Immortals hunting each other across centuries for the Prize — brutal, romantic, and completely mad.", trivia:["The film was a box office flop but became one of the most beloved cult films in history.","Freddie Mercury watched the film and immediately offered Queen's services for the soundtrack."], cat:"Action"},
  {q:"I'll make him an offer he can't refuse.", src:"The Godfather", year:1972, type:"movie", char:"Vito Corleone", actors:[{name:"Marlon Brando",role:"Vito Corleone"}], desc:"The quintessential expression of power — not a threat, but a certainty. Vito never raises his voice. He doesn't need to.", trivia:["Brando won the Academy Award for Best Actor but sent activist Sacheen Littlefeather to refuse it on his behalf.","The voice Brando used was developed after shoving cotton in his cheeks — a prosthetic was made for the film."], cat:"Crime"},
  {q:"I am your father.", src:"The Empire Strikes Back", year:1980, type:"movie", char:"Darth Vader", actors:[{name:"James Earl Jones",role:"Darth Vader (voice)"}], desc:"The most famous twist in cinema. It fundamentally changed the nature of the hero's journey — the monster is the father.", trivia:["Almost no one on set knew the real line — David Prowse was given false dialogue and James Earl Jones recorded the real line in post-production.","Mark Hamill has described his reaction when told the truth as 'I was absolutely floored.'"], cat:"Action"},
  {q:"No. I am your father.", src:"The Empire Strikes Back", year:1980, type:"movie", char:"Darth Vader", actors:[{name:"James Earl Jones",role:"Darth Vader (voice)"},{name:"Mark Hamill",role:"Luke Skywalker"}], desc:"The actual famous quote — most people misremember it as 'Luke, I am your father.' The 'No' is doing enormous work here.", trivia:["The misquote 'Luke, I am your father' is so pervasive that many people refuse to believe the correct version.","Empire Strikes Back was directed by Irvin Kershner, not George Lucas — widely considered the best film in the franchise as a result."], cat:"Action"},
  {q:"Roads? Where we're going, we don't need roads.", src:"Back to the Future", year:1985, type:"movie", char:"Doc Brown", actors:[{name:"Christopher Lloyd",role:"Doc Brown"}], desc:"The last line of the film — the perfect set-up for a sequel that wasn't yet planned. Ambition and possibility in one perfect image.", trivia:["The ending was changed multiple times. The original script had a different mechanism entirely.","Christopher Lloyd said Doc Brown is the most joyful character he's ever played."], cat:"Action"},
  {q:"Nobody's perfect.", src:"Some Like It Hot", year:1959, type:"movie", char:"Osgood Fielding III", actors:[{name:"Joe E. Brown",role:"Osgood Fielding III"}], desc:"The last line of the greatest comedy ending in Hollywood history. Jerry reveals he's a man. Osgood shrugs. Nobody's perfect.", trivia:["Billy Wilder's original ending had Osgood discover the truth and the two of them get married — the studio refused it.","Joe E. Brown delivered the line with such conviction that it survived as a perfect punchline — and a strangely progressive statement for 1959."], cat:"Classic"},

  // ── MORE PROFOUND TV ──
  {q:"Clear eyes, full hearts, can't lose.", src:"Friday Night Lights", year:2006, type:"tv", char:"Coach Eric Taylor", actors:[{name:"Kyle Chandler",role:"Coach Eric Taylor"}], desc:"A coach addressing his team in a small Texas town. Simple enough to be a cliché, earned enough to be profound. The entire show in four words.", trivia:["The phrase became the actual motto of real high school football teams across America after the show aired.","Kyle Chandler won the Emmy for Best Actor in 2011. He wore the exact same suit he'd worn to his first Emmy ceremony years earlier."], cat:"TV"},
  {q:"I am the one who knocks. I am the danger.", src:"Breaking Bad", year:2011, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Heisenberg's complete declaration — he doesn't warn, he doesn't threaten. He identifies. This is the end of Walter White and the beginning of something worse.", trivia:["This scene is cited in studies of TV writing as the definitive moment of character transformation.","Bryan Cranston won four Emmy Awards for his portrayal of Walter White."], cat:"TV"},
  {q:"Yeah, science!", src:"Breaking Bad", year:2009, type:"tv", char:"Jesse Pinkman", actors:[{name:"Aaron Paul",role:"Jesse Pinkman"}], desc:"Jesse's celebration of chemistry — naively enthusiastic in a context of moral catastrophe. Aaron Paul turned Jesse's comic relief into tragedy.", trivia:["Aaron Paul won three Emmy Awards for Jesse Pinkman — a record for supporting actor.","The line became a popular internet meme and is printed on chemistry teacher merchandise worldwide."], cat:"TV"},
  {q:"You either win, or you learn.", src:"Peaky Blinders", year:2013, type:"tv", char:"Tommy Shelby", actors:[{name:"Cillian Murphy",role:"Tommy Shelby"}], desc:"Tommy's operational philosophy. Defeat isn't failure if you extract intelligence from it. Post-traumatic pragmatism.", trivia:["Cillian Murphy prepared for the role by studying WWI trauma and shell shock treatment.","Peaky Blinders was rejected by multiple networks before BBC Two picked it up."], cat:"TV"},
  {q:"I believe in America.", src:"The Godfather", year:1972, type:"movie", char:"Amerigo Bonasera", actors:[{name:"Salvatore Corsitto",role:"Amerigo Bonasera"}], desc:"The first line of the film — an immigrant funeral director appealing to the Don. Three words that immediately establish everything the film is about.", trivia:["The first scene was famously filmed with no natural light — entirely lit by a single source for dramatic chiaroscuro.","Director of Photography Gordon Willis was nicknamed 'The Prince of Darkness' for his work on the Godfather trilogy."], cat:"Classic"},
  {q:"There are only two ways I can see this ending, and one of them involves me rolling you up in that carpet.", src:"True Detective", year:2014, type:"tv", char:"Rust Cohle", actors:[{name:"Matthew McConaughey",role:"Rust Cohle"}], desc:"Rust's quiet menace — delivered without raising his voice, totally convincing. McConaughey found in Cohle a character darker than anything else in his career.", trivia:["Matthew McConaughey and Woody Harrelson insisted on spending weeks together before filming to establish their character chemistry.","Nic Pizzolatto wrote the entire first season in a cabin in Los Angeles with no staff."], cat:"TV"},
  {q:"Time is a flat circle.", src:"True Detective", year:2014, type:"tv", char:"Rust Cohle", actors:[{name:"Matthew McConaughey",role:"Rust Cohle"}], desc:"Cohle's nihilistic cosmology — events repeat endlessly, consciousness is a tragedy, free will is an illusion. Delivered while drunk in an interrogation. Riveting.", trivia:["The line references philosopher Friedrich Nietzsche's concept of eternal recurrence.","Matthew McConaughey won the Academy Award for Best Actor (Dallas Buyers Club) the same year True Detective aired."], cat:"TV"},
  {q:"You know the difference between you and me? I make this look good.", src:"Men in Black", year:1997, type:"movie", char:"James Edwards / J", actors:[{name:"Will Smith",role:"J"}], desc:"First line Will Smith's character says in the MIB uniform. Pure swagger, pure charm. Smith at his most effortlessly compelling.", trivia:["Will Smith turned down the lead in Matrix to make Men in Black. He has since publicly expressed regret.","The film introduced audiences to the concept of 'neuralyzing' memory — the device became a pop culture staple."], cat:"Action"},
  {q:"Hasta la vista, baby.", src:"Terminator 2: Judgment Day", year:1991, type:"movie", char:"The Terminator", actors:[{name:"Arnold Schwarzenegger",role:"The Terminator"}], desc:"A Terminator, reprogrammed to protect a boy, learning slang. Said before freezing a liquid metal killer with liquid nitrogen and shattering him.", trivia:["The line was written for a scene explaining that John Connor taught the T-800 to say it.","In the German dub, the line became 'Auf Wiedersehen, Baby' — keeping the spirit if not the text."], cat:"Action"},
  {q:"Life moves pretty fast. If you don't stop and look around once in a while, you could miss it.", src:"Ferris Bueller's Day Off", year:1986, type:"movie", char:"Ferris Bueller", actors:[{name:"Matthew Broderick",role:"Ferris Bueller"}], desc:"Ferris breaking the fourth wall to give the audience permission to pause. The entire 1980s in one philosophy of presence.", trivia:["John Hughes wrote the script in six days. He was 35 when it was released and identified completely with a teenager.","Matthew Broderick has said he still gets this line shouted at him more than anything else from his career."], cat:"Profound"},
  {q:"Bueller?... Bueller?... Bueller?", src:"Ferris Bueller's Day Off", year:1986, type:"movie", char:"Economics Teacher", actors:[{name:"Ben Stein",role:"Economics Teacher"}], desc:"The flat drone of institutionalised boredom — a teacher reading off a register into an indifferent void. Ben Stein played himself, essentially.", trivia:["Ben Stein is a speechwriter turned actor. He ad-libbed most of the economics lecture.","The droning delivery was specifically directed — John Hughes wanted it to feel like a sedative."], cat:"Classic"},
  {q:"I'm not bad. I'm just drawn that way.", src:"Who Framed Roger Rabbit", year:1988, type:"movie", char:"Jessica Rabbit", actors:[{name:"Kathleen Turner",role:"Jessica Rabbit (voice)"}], desc:"A cartoon femme fatale offering the most concise nature vs. nurture argument in cinema. She didn't choose to be a stereotype.", trivia:["Kathleen Turner voiced Jessica uncredited — she preferred to keep the role mysterious.","The film required entirely new compositing technology — developing techniques used in every subsequent live-action/animation hybrid."], cat:"Classic"},
  {q:"We're on a mission from God.", src:"The Blues Brothers", year:1980, type:"movie", char:"Jake Blues", actors:[{name:"John Belushi",role:"Jake Blues"}], desc:"Said with complete earnestness by a man in a suit leaving prison. The film commits to the absurdity with deadpan sincerity.", trivia:["John Belushi died of a drug overdose on March 5, 1982, two years after the film's release.","The Blues Brothers holds the record for most vehicles destroyed in a film — 103 cars written off."], cat:"Classic"},
  {q:"I see you.", src:"Avatar", year:2009, type:"movie", char:"Neytiri", actors:[{name:"Zoe Saldana",role:"Neytiri"}], desc:"The Na'vi phrase for ultimate recognition — to see someone's soul, not merely their face. A concept of love without equivalent in English.", trivia:["James Cameron developed the Na'vi language with linguist Paul Frommer, creating over a thousand words.","Avatar became the highest-grossing film of all time — twice — each time recaptured by a re-release."], cat:"Profound"},
  {q:"My mama always said life was like a box of chocolates.", src:"Forrest Gump", year:1994, type:"movie", char:"Forrest Gump", actors:[{name:"Tom Hanks",role:"Forrest Gump"}], desc:"Forrest sitting on a bench, sharing wisdom with a stranger while waiting for a bus. Simplicity as philosophy.", trivia:["Tom Hanks was not director Robert Zemeckis's first choice. Bill Murray, John Travolta and Chevy Chase all passed on the role.","The film won six Academy Awards including Best Picture and Best Actor."], cat:"Classic"},
  {q:"They may take our lives, but they'll never take our freedom!", src:"Braveheart", year:1995, type:"movie", char:"William Wallace", actors:[{name:"Mel Gibson",role:"William Wallace"}], desc:"The battle cry before Stirling. Historically completely inaccurate. Emotionally completely irresistible. That's cinema.", trivia:["The film's Battle of Stirling was filmed in Ireland — Scotland refused to provide military extras.","Mel Gibson prepared for the role by studying Celtic mythology and the actual historical records, then ignored most of them."], cat:"Action"},
  {q:"You is kind, you is smart, you is important.", src:"The Help", year:2011, type:"movie", char:"Aibileen Clark", actors:[{name:"Viola Davis",role:"Aibileen Clark"}], desc:"Aibileen telling a white child the things her own community was never told. The most quietly devastating line in recent American cinema.", trivia:["Viola Davis received an Academy Award nomination for Best Actress for this role.","Octavia Spencer won the Academy Award for Best Supporting Actress — the first Black woman to win in a decade."], cat:"Drama"},

  // ── SUCCESSION ──
  {q:"I'm not going to get hurt. I don't get hurt.", src:"Succession", year:2018, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan Roy's operating principle — a man who survived a brutal childhood by deciding vulnerability wasn't an option. It defines his relationships with everyone, including his children.", trivia:["Brian Cox said Logan was the most exhausting role of his career because the character never relaxes, never lets his guard down, even for a moment.","Jesse Armstrong modelled Logan Roy partly on Rupert Murdoch and Robert Maxwell."], cat:"TV"},
  {q:"I am a cog in a wheel that was built by idiots.", src:"Succession", year:2019, type:"tv", char:"Kendall Roy", actors:[{name:"Jeremy Strong",role:"Kendall Roy"}], desc:"Kendall's self-aware despair — he knows the machine is broken, knows his role in it, and still can't leave.", trivia:["Jeremy Strong researched narcissistic family systems and succession dynamics in real business dynasties before filming.","Strong stayed in character between takes throughout the entire series — his co-stars found this occasionally alarming."], cat:"TV"},
  {q:"You are not serious people.", src:"Succession", year:2021, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan's nuclear dismissal of his own children's bid to run his empire. Six words that end a family.", trivia:["Jesse Armstrong said this line was written as the emotional climax of the entire show — not the finale.","The scene was filmed in a single take. Brian Cox improvised 'You are not serious people' on the second pass."], cat:"TV"},
