  {q:"I love you but you are not serious people.", src:"Succession", year:2021, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"The full version — the 'I love you' makes it worse, not better. Logan Roy's love has always been conditional and weaponised.", trivia:["Brian Cox said the 'I love you' was the hardest part to deliver genuinely because the character rarely means it.","Succession won the Emmy for Outstanding Drama Series in all four of its eligible seasons."], cat:"TV"},
  {q:"Make the case for me. I'm listening.", src:"Succession", year:2019, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan forcing his children to audition for his approval in real time. The cruelty is that he's genuinely curious, not just sadistic.", trivia:["The dinner scene this comes from was cited by critics as one of the finest single scenes in TV history.","Jesse Armstrong wrote all four seasons before filming began — an unusual approach in American TV."], cat:"TV"},
  {q:"Kendall, what do you think?", src:"Succession", year:2021, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Often Logan's most devastating line — not when he attacks, but when he turns to Kendall and waits. The power of expectation as cruelty.", trivia:["Jeremy Strong won the Emmy for Outstanding Lead Actor in a Drama Series for Succession.","The show's writers room spent weeks on the question of who Logan truly loved, if anyone."], cat:"TV"},

  // ── MAD MEN ──
  {q:"What you call love was invented by guys like me, to sell nylons.", src:"Mad Men", year:2007, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don Draper's cynical diagnosis of romantic love — a feeling manufactured for commercial purposes. He believes it because he built his life on manufactured feelings.", trivia:["Matthew Weiner, who created Mad Men, spent years trying to get it made after AMC was the fourth network to read the script.","Jon Hamm was relatively unknown before Mad Men — he had been working as a waiter a year before casting."], cat:"TV"},
  {q:"People tell you who they are, but we ignore it because we want them to be who we want them to be.", src:"Mad Men", year:2010, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don on self-deception in relationships — and on himself, since he has been lying about his identity for twenty years.", trivia:["Mad Men won the Emmy for Outstanding Drama Series four consecutive years — a record at the time.","Jon Hamm said this line was the one that most resonated with him personally."], cat:"TV"},
  {q:"This never happened. It will shock you how much it never happened.", src:"Mad Men", year:2007, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don advising a mistress on how to live with a secret. He is an expert. His entire life is built on this principle.", trivia:["Matthew Weiner based Don Draper's identity theft partly on a real post-WWII phenomenon of men who reinvented themselves.","The show shot entirely in Los Angeles while being set in New York — every exterior was recreated on stage."], cat:"TV"},
  {q:"I have a life, and it only goes in one direction — forward.", src:"Mad Men", year:2012, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don's refusal to reckon with his past. By the final season, the audience knows this is exactly what destroys him.", trivia:["Jon Hamm did not win an Emmy for Mad Men until the show's final season — despite seven previous nominations.","The show's finale remains one of the most debated in television history."], cat:"TV"},

  // ── FLEABAG ──
  {q:"Hair is everything. We wish it wasn't so we could actually think about something else occasionally, but it is.", src:"Fleabag", year:2019, type:"tv", char:"Fleabag", actors:[{name:"Phoebe Waller-Bridge",role:"Fleabag"}], desc:"Fleabag on vanity, grief, and the absurdity of still caring about hair when your life is falling apart. Funny and devastating simultaneously.", trivia:["Phoebe Waller-Bridge wrote, starred in, and produced Fleabag — initially as a one-woman stage show at the Edinburgh Fringe.","The series won six Emmy Awards including Outstanding Comedy Series, Lead Actress, Writing and Directing."], cat:"TV"},
  {q:"I want someone to tell me what to wear every morning. I want someone to tell me what to eat. I want someone to tell me what to do. I just don't want to have to make any decisions anymore.", src:"Fleabag", year:2016, type:"tv", char:"Fleabag", actors:[{name:"Phoebe Waller-Bridge",role:"Fleabag"}], desc:"Fleabag's most honest speech — not asking for love, but for relief from consciousness. The comedy of the series contains real grief.", trivia:["Waller-Bridge based much of Fleabag's psychology on conversations with friends about grief and female shame.","The 'fourth wall breaks' — Fleabag looking at camera — were used to show her only real intimacy is with the audience."], cat:"TV"},
  {q:"I think you know how to love better than any of us. That's why you find it all so painful.", src:"Fleabag", year:2019, type:"tv", char:"The Priest", actors:[{name:"Andrew Scott",role:"The Priest"}], desc:"The Priest's diagnosis of Fleabag — love as wound, sensitivity as both gift and curse.", trivia:["Andrew Scott and Phoebe Waller-Bridge reportedly spent weeks developing the chemistry before shooting began.","Andrew Scott won the BAFTA for Best Supporting Actor for the role."], cat:"TV"},
  {q:"Kneel.", src:"Fleabag", year:2019, type:"tv", char:"The Priest", actors:[{name:"Andrew Scott",role:"The Priest"}], desc:"A single word that ends the most electric scene in the series. Context makes it everything.", trivia:["The confession booth scene was filmed in one continuous twelve-minute take.","Waller-Bridge said writing the Priest was the hardest character she has ever attempted because he had to be genuinely good."], cat:"TV"},

  // ── THE CROWN / BRITISH ──
  {q:"Grief is the price we pay for love.", src:"The Crown", year:2017, type:"tv", char:"Queen Elizabeth II", actors:[{name:"Claire Foy",role:"Queen Elizabeth II"}], desc:"The Queen's message to America after 9/11 — attributed in the show to Elizabeth II, it resonated globally as a simple truth about loss.", trivia:["The line is adapted from a real message sent by Queen Elizabeth II to the American people after September 11, 2001.","Claire Foy won the Emmy and Golden Globe for her portrayal of the Queen in Seasons 1 and 2."], cat:"TV"},
  {q:"Duty first, self second. That is the deal.", src:"The Crown", year:2016, type:"tv", char:"King George VI", actors:[{name:"Jared Harris",role:"King George VI"}], desc:"The royal compact — personal sacrifice as constitutional obligation. It defines and destroys every member of the family.", trivia:["Jared Harris said this speech was the one that made him understand the show wasn't about royalty but about obligation.","Peter Morgan spent three years researching the Royal Family before writing a single page of The Crown."], cat:"TV"},

  // ── CHERNOBYL ──
  {q:"Every lie we tell incurs a debt to the truth. Sooner or later, that debt is paid.", src:"Chernobyl", year:2019, type:"tv", char:"Valery Legasov", actors:[{name:"Jared Harris",role:"Valery Legasov"}], desc:"The opening and closing thesis of the miniseries — and the entire Soviet failure in one sentence. Institutional lying as slow-motion catastrophe.", trivia:["Jared Harris researched the real Legasov's taped confessions, which were discovered after his suicide and helped expose the cover-up.","Craig Mazin wrote the miniseries after five years of research. He said Legasov's tapes were the emotional core of the project."], cat:"TV"},
  {q:"What is the cost of lies? It's not that we'll mistake them for the truth. The real danger is that if we hear enough lies, then we no longer recognise the truth at all.", src:"Chernobyl", year:2019, type:"tv", char:"Valery Legasov", actors:[{name:"Jared Harris",role:"Valery Legasov"}], desc:"Legasov's opening monologue — a statement about Soviet disinformation that became uncomfortably relevant to contemporary politics.", trivia:["The monologue is spoken by Legasov from a tape he recorded before his death — Mazin used the real tapes as source material.","Chernobyl received 19 Emmy nominations and won 10 — the most for a limited series at that point."], cat:"TV"},
  {q:"You'll do it because it must be done. That is all.", src:"Chernobyl", year:2019, type:"tv", char:"Boris Shcherbina", actors:[{name:"Stellan Skarsgård",role:"Boris Shcherbina"}], desc:"A Soviet bureaucrat who transforms across the series into a man of conscience. This line is his pivot — bureaucratic language used for a moral act.", trivia:["Stellan Skarsgård won the Emmy for Outstanding Supporting Actor in a Limited Series.","The character of Shcherbina was based on a real Soviet Deputy Prime Minister who directed the liquidation effort."], cat:"TV"},

  // ── FARGO ──
  {q:"You're a part of an ongoing criminal enterprise. That means you will be held responsible for all of it.", src:"Fargo", year:1996, type:"movie", char:"Marge Gunderson", actors:[{name:"Frances McDormand",role:"Marge Gunderson"}], desc:"Marge delivering justice to a murderer she's just arrested, with a pregnant belly and total calm. The contrast is the point.", trivia:["Frances McDormand won the Academy Award for Best Actress — she was actually pregnant during filming.","The Coen Brothers wrote the role of Marge specifically for McDormand, who is married to Joel Coen."], cat:"Crime"},
  {q:"There's more to life than a little money, you know. Don'tcha know that?", src:"Fargo", year:1996, type:"movie", char:"Marge Gunderson", actors:[{name:"Frances McDormand",role:"Marge Gunderson"}], desc:"Marge's final speech to Grimsrud in the police car — a meditation on decency versus greed from one of cinema's most moral characters.", trivia:["The film was based on real events, according to the Coens' opening title card — this is entirely false, a deliberate artistic choice.","Fargo won the Academy Award for Best Original Screenplay and Best Actress."], cat:"Crime"},

  // ── NO COUNTRY FOR OLD MEN ──
  {q:"What's the most you ever lost on a coin toss?", src:"No Country for Old Men", year:2007, type:"movie", char:"Anton Chigurh", actors:[{name:"Javier Bardem",role:"Anton Chigurh"}], desc:"Chigurh forcing a gas station owner to gamble for his life on a coin he didn't know was in the air. Pure terror through mundane conversation.", trivia:["Javier Bardem won the Academy Award for Best Supporting Actor. He did not watch any of his scenes during production.","Cormac McCarthy sold the novel rights to the Coens for a very small sum because he trusted them completely."], cat:"Crime"},
  {q:"You can't stop what's coming. It ain't all waiting on you. That's vanity.", src:"No Country for Old Men", year:2007, type:"movie", char:"Ellis", actors:[{name:"Barry Corbin",role:"Ellis"}], desc:"An old man telling Sheriff Bell that his generation's sense of responsibility for the world is itself a form of pride.", trivia:["The Coen Brothers adapted the novel almost word-for-word. McCarthy said their script was the most faithful adaptation of his work.","The film's ending — Bell's dream — is one of the most discussed in American cinema for its ambiguity."], cat:"Crime"},
  {q:"If the rule you followed brought you to this, of what use was the rule?", src:"No Country for Old Men", year:2007, type:"movie", char:"Anton Chigurh", actors:[{name:"Javier Bardem",role:"Anton Chigurh"}], desc:"Chigurh's nihilist philosophy — systems of morality that produce suffering aren't morality at all. He's wrong and he's consistent.", trivia:["Javier Bardem learned English specifically for this role. He spoke no English before auditioning.","The film won four Academy Awards including Best Picture."], cat:"Crime"},

  // ── THERE WILL BE BLOOD ──
  {q:"I'm finished!", src:"There Will Be Blood", year:2007, type:"movie", char:"Daniel Plainview", actors:[{name:"Daniel Day-Lewis",role:"Daniel Plainview"}], desc:"The last line of the film, after Plainview has murdered Eli Sunday in his bowling alley. Delivered with exhausted contempt. Magnificent and disturbing.", trivia:["Daniel Day-Lewis won his second Academy Award for Best Actor for this role.","Paul Thomas Anderson wrote the script specifically for Day-Lewis after sending him a handwritten letter."], cat:"Drama"},
  {q:"I have a competition in me. I want no one else to succeed. I hate most people.", src:"There Will Be Blood", year:2007, type:"movie", char:"Daniel Plainview", actors:[{name:"Daniel Day-Lewis",role:"Daniel Plainview"}], desc:"The most honest thing Plainview says in the entire film — and he says it to a man he's about to betray. He means every word.", trivia:["Day-Lewis spent months developing Plainview's voice — partly inspired by John Huston.","The film is loosely based on Upton Sinclair's 1927 novel Oil!"], cat:"Drama"},

  // ── WHIPLASH ──
  {q:"There are no two words in the English language more harmful than 'good job.'", src:"Whiplash", year:2014, type:"movie", char:"Terence Fletcher", actors:[{name:"J.K. Simmons",role:"Terence Fletcher"}], desc:"Fletcher's operating principle — excellence cannot coexist with comfort. He's a monster who produces greatness and destroys people. The film refuses to decide which matters more.", trivia:["J.K. Simmons won the Academy Award for Best Supporting Actor. He trained with a real drum instructor for months.","Director Damien Chazelle based the film on his own experience in a brutal high school jazz program."], cat:"Drama"},
  {q:"The next Charlie Parker would never be discouraged. That's what I'm trying to do. I'm trying to push people beyond what's expected of them.", src:"Whiplash", year:2014, type:"movie", char:"Terence Fletcher", actors:[{name:"J.K. Simmons",role:"Terence Fletcher"}], desc:"Fletcher's rationalisation — the abuse as necessary catalyst for genius. The film never fully disproves him, which makes it unsettling.", trivia:["Damien Chazelle deliberately left the ending ambiguous — Andrew's final performance could be seen as either a triumph or a surrender to Fletcher.","The film was shot in 19 days on a $3.3 million budget."], cat:"Drama"},

  // ── MOONLIGHT ──
  {q:"Who is you, Chiron?", src:"Moonlight", year:2016, type:"movie", char:"Juan", actors:[{name:"Mahershala Ali",role:"Juan"}], desc:"A drug dealer asking a boy a question that defines the entire film. Identity, self-knowledge, and the people who plant the seed of it in unlikely places.", trivia:["Mahershala Ali won the Academy Award for Best Supporting Actor — the first Muslim actor to win an Oscar.","Barry Jenkins shot Moonlight using a specific palette for each of the film's three chapters, reflecting Chiron's changing psychology."], cat:"Drama"},
  {q:"At some point, you gotta decide for yourself who you gonna be. Can't let nobody make that decision for you.", src:"Moonlight", year:2016, type:"movie", char:"Juan", actors:[{name:"Mahershala Ali",role:"Juan"}], desc:"Juan's wisdom — the most important gift he gives Chiron is permission to exist. Coming from a man who's also destroying the boy's community, it's complicated.", trivia:["Moonlight won the Academy Award for Best Picture — in a ceremony where La La Land was incorrectly announced first.","The film cost $1.5 million and grossed $65 million worldwide."], cat:"Drama"},

  // ── PARASITE ──
  {q:"You know what kind of plan never fails? No plan at all. No plan. You know why? If you make a plan, life never works out that way.", src:"Parasite", year:2019, type:"movie", char:"Ki-woo Kim", actors:[{name:"Choi Woo-shik",role:"Ki-woo Kim"}], desc:"The film's central irony — a family that plans meticulously and is destroyed by events no plan could anticipate. Bong Joon-ho's thesis on class and fate.", trivia:["Parasite was the first non-English language film to win the Academy Award for Best Picture.","Bong Joon-ho spent two years developing the script's architecture — every object and room carries symbolic weight."], cat:"Drama"},
  {q:"You know, I've been rich and I've been poor. Believe me, rich is better.", src:"Parasite", year:2019, type:"movie", char:"Park Yeon-kyo", actors:[{name:"Cho Yeo-jeong",role:"Park Yeon-kyo"}], desc:"The rich wife's casual honesty — a line that lands differently after everything the Kims do to reach her world.", trivia:["Bong Joon-ho said this line was inspired by a quote from Sophie Tucker, the American comedian.","Parasite grossed over $260 million worldwide on a $11 million budget."], cat:"Drama"},

  // ── GOOD WILL HUNTING ──
  {q:"It's not your fault.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"Sean repeating it, again and again, until Will finally breaks. Trauma recognised and named in the simplest possible language.", trivia:["Matt Damon and Ben Affleck wrote the script while at Harvard. Robin Williams improvised the entire park scene.","Robin Williams won the Academy Award for Best Supporting Actor — his only competitive Oscar win."], cat:"Drama"},
  {q:"You don't know about real loss, 'cause it only occurs when you've loved something more than you love yourself.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"Sean's rebuke of Will's cleverness — you can read about loss, but you don't understand it until you've lived it.", trivia:["The script was sold to Castle Rock but they demanded a happy ending — Miramax bought it and let the writers keep the original.","Ben Affleck and Matt Damon won the Academy Award for Best Original Screenplay."], cat:"Drama"},
  {q:"Real loss is only possible when you love something more than you love yourself.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"The companion to 'it's not your fault' — Sean explaining what genuine grief costs. He lost his wife. Will has never let himself love that much.", trivia:["Robin Williams ad-libbed the story about his wife farting in her sleep — it's completely genuine.","Gus Van Sant directed the film with minimal intervention in the script, which was essentially complete before he joined."], cat:"Drama"},

  // ── AMERICAN BEAUTY ──
  {q:"It's a great thing when you realise you still have the ability to surprise yourself.", src:"American Beauty", year:1999, type:"movie", char:"Lester Burnham", actors:[{name:"Kevin Spacey",role:"Lester Burnham"}], desc:"Lester's late-life awakening — not wisdom exactly, but a spark of self-reclamation in a life of quiet deadness.", trivia:["Kevin Spacey won the Academy Award for Best Actor. He said it was the most autobiographical role he'd ever played.","American Beauty won five Academy Awards including Best Picture and Best Director."], cat:"Drama"},
  {q:"I guess I could be pretty pissed off about what happened to me, but it's hard to stay mad when there's so much beauty in the world.", src:"American Beauty", year:1999, type:"movie", char:"Lester Burnham", actors:[{name:"Kevin Spacey",role:"Lester Burnham"}], desc:"Lester's final voiceover — dead, looking back on the beauty he almost missed. Sam Mendes called it the film's emotional purpose.", trivia:["The plastic bag scene was created using CGI — though director Sam Mendes originally wanted a real bag.","Alan Ball wrote the screenplay after processing a traumatic period in his own life."], cat:"Drama"},

  // ── CASINO ROYALE / BOND ──
  {q:"I've got a little itch, down there. Would you mind?", src:"Casino Royale", year:2006, type:"movie", char:"James Bond", actors:[{name:"Daniel Craig",role:"James Bond"}], desc:"Bond, naked, being tortured by Le Chiffre. He cracks a joke. The line redefined Bond's stoicism as dark humour under impossible pressure.", trivia:["Daniel Craig was heavily criticised when cast as Bond — fans petitioned against him as 'too blonde and brutish.'","Martin Campbell directed both GoldenEye and Casino Royale — the two most critically acclaimed Bond debuts."], cat:"Action"},
  {q:"You're not my type.", src:"Casino Royale", year:2006, type:"movie", char:"James Bond", actors:[{name:"Daniel Craig",role:"James Bond"}], desc:"Said to a beautiful woman in a hospital bed while barely alive. The original Bond composure — nothing dents it.", trivia:["The film is based on Ian Fleming's first Bond novel, published in 1953.","Daniel Craig worked with a personal trainer for eight months to achieve the famous beach scene physique."], cat:"Action"},

  // ── SPORTS / INSPIRATIONAL FILMS ──
  {q:"You play for the name on the front of the jersey, not the name on the back.", src:"Miracle", year:2004, type:"movie", char:"Herb Brooks", actors:[{name:"Kurt Russell",role:"Herb Brooks"}], desc:"Brooks's philosophy for the 1980 US Olympic hockey team — team identity above personal glory. They beat the Soviet Union. The miracle was real.", trivia:["Kurt Russell said this was the most emotionally demanding sports film he had ever made because the events were real and the players were still alive.","The 1980 US Olympic hockey team's victory over the Soviet Union is considered one of the greatest upsets in sports history."], cat:"Drama"},
  {q:"The hay is in the barn.", src:"Moneyball", year:2011, type:"movie", char:"Billy Beane", actors:[{name:"Brad Pitt",role:"Billy Beane"}], desc:"Billy's phrase for preparation complete — whatever happens now, the work is done. Preparation as the only thing you can control.", trivia:["Brad Pitt spent months with the real Billy Beane to develop the role.","Michael Lewis's book was considered unfilmable — Steven Soderbergh was attached for years before Aaron Sorkin rewrote the script."], cat:"Drama"},
  {q:"Winning isn't everything, but wanting to win is.", src:"Any Given Sunday", year:1999, type:"movie", char:"Tony D'Amato", actors:[{name:"Al Pacino",role:"Tony D'Amato"}], desc:"The distinction between outcome and drive — Lombardi's maxim reframed as psychology rather than pressure.", trivia:["Al Pacino's motivational speech in Any Given Sunday is one of the most viewed sports film clips online.","Oliver Stone based the film partly on conversations with real NFL coaches and players."], cat:"Drama"},
  {q:"On any given Sunday you're gonna win or you're gonna lose. The point is can you win or lose like a man?", src:"Any Given Sunday", year:1999, type:"movie", char:"Tony D'Amato", actors:[{name:"Al Pacino",role:"Tony D'Amato"}], desc:"The pre-game speech's thesis — character defined by how you carry either outcome.", trivia:["The film features dozens of real NFL players and coaches in cameo roles.","The speech has been used in real NFL locker rooms before actual games."], cat:"Drama"},

  // ── SILENCE OF THE LAMBS / THRILLER ──
  {q:"Clarice, doesn't this random violence comfort you? Of the meaninglessness? Is it not a relief to find that not everything can be explained?", src:"The Silence of the Lambs", year:1991, type:"movie", char:"Hannibal Lecter", actors:[{name:"Anthony Hopkins",role:"Hannibal Lecter"}], desc:"Lecter as philosopher — probing for Clarice's faith in the rational mind while being the living proof that it fails.", trivia:["Anthony Hopkins appeared on screen for only 16 minutes in the film — and won the Academy Award for Best Actor.","Jonathan Demme insisted on shooting Lecter's scenes with the camera directly on Hopkins's eyes — unprecedented at the time."], cat:"Crime"},
  {q:"First principles, Clarice. Simplicity. Read Marcus Aurelius.", src:"The Silence of the Lambs", year:1991, type:"movie", char:"Hannibal Lecter", actors:[{name:"Anthony Hopkins",role:"Hannibal Lecter"}], desc:"Lecter directing Clarice's investigation through classical philosophy while simultaneously manipulating everyone around him.", trivia:["Thomas Harris based Hannibal Lecter partly on a real Mexican surgeon he met while visiting a prison in 1962.","The Silence of the Lambs is one of only three films to sweep the five major Academy Awards."], cat:"Crime"},

  // ── HEAT ──
  {q:"Don't let yourself get attached to anything you are not willing to walk out on in 30 seconds flat if you feel the heat around the corner.", src:"Heat", year:1995, type:"movie", char:"Neil McCauley", actors:[{name:"Robert De Niro",role:"Neil McCauley"}], desc:"The professional criminal's code of living — freedom through non-attachment. And the tragedy is McCauley eventually breaks this rule.", trivia:["Michael Mann spent over a decade developing the characters in Heat — it began as a 1989 TV movie called L.A. Takedown.","The coffee shop scene between De Niro and Pacino was their first scene together despite appearing in The Godfather Part II."], cat:"Crime"},
  {q:"I'm double-parked with a case of the ass, there's nothin' stoppin' us from walkin'.", src:"Heat", year:1995, type:"movie", char:"Chris Shiherlis", actors:[{name:"Val Kilmer",role:"Chris Shiherlis"}], desc:"Val Kilmer's funniest and most human line — criminal philosophy delivered like a parking complaint. Heat's genius was finding human moments inside crime.", trivia:["Val Kilmer improvised this line — Michael Mann kept it because it perfectly captured Shiherlis's reckless humour.","The bank heist sequence in Heat is studied in film schools as the definitive action shootout."], cat:"Crime"},

  // ── PRISONER / BRITISH CLASSICS ──
  {q:"I am not a number. I am a free man.", src:"The Prisoner", year:1967, type:"tv", char:"Number Six", actors:[{name:"Patrick McGoohan",role:"Number Six"}], desc:"The defiant weekly declaration of a secret agent imprisoned in a mysterious village. A Cold War statement about individuality versus the state.", trivia:["Patrick McGoohan created, wrote, and directed much of The Prisoner in addition to starring in it.","The show ran for 17 episodes and has never been satisfactorily explained — McGoohan took many secrets to his grave."], cat:"TV"},

  // ── APOCALYPSE NOW EXTENDED ──
  {q:"The horror. The horror.", src:"Apocalypse Now", year:1979, type:"movie", char:"Colonel Kurtz", actors:[{name:"Marlon Brando",role:"Colonel Kurtz"}], desc:"Kurtz's dying words — the full weight of what he's seen and done and become. Borrowed from Conrad's Heart of Darkness. The most economical summary of war.", trivia:["Marlon Brando arrived on set overweight and refused to be filmed in full light — all his scenes are in shadow or close-up.","Francis Ford Coppola based the script on Joseph Conrad's 1899 novella Heart of Darkness."], cat:"Classic"},
  {q:"I love the smell of napalm in the morning. It smells like victory.", src:"Apocalypse Now", year:1979, type:"movie", char:"Lt. Col. Kilgore", actors:[{name:"Robert Duvall",role:"Lt. Col. Kilgore"}], desc:"The complete Kilgore speech — he's describing a battle he won, surrounded by the evidence of mass death, completely at peace. The film's darkest comedy.", trivia:["Robert Duvall was nominated for the Academy Award for Best Supporting Actor for only eleven minutes of screen time.","The film's production was legendarily chaotic — documented in the companion film Hearts of Darkness: A Filmmaker's Apocalypse."], cat:"Classic"},

  // ── ALIENS / SCI-FI ──
  {q:"In space, no one can hear you scream.", src:"Alien", year:1979, type:"movie", char:"Tagline", actors:[{name:"Ridley Scott",role:"Director"}], desc:"Not actually said in the film — the tagline. But it distilled the horror of Alien's premise so precisely it became the most famous movie tagline ever written.", trivia:["The tagline was written by Barbara Gips, a copywriter at ad agency Foote, Cone & Belding.","Ridley Scott said the tagline captured exactly what the film was about and wished he'd thought of it himself."], cat:"Action"},
  {q:"We're all going to die, the only question is how you check out.", src:"Alien 3", year:1992, type:"movie", char:"Dillon", actors:[{name:"Charles S. Dutton",role:"Dillon"}], desc:"Dillon's prisoners choosing to fight rather than accept a passive death. In Alien 3's bleakest vision, dignity is the only victory available.", trivia:["David Fincher's directorial debut — he has since disowned the film due to studio interference.","The film killed off Newt and Hicks in the opening sequence — a decision that outraged fans of Aliens."], cat:"Action"},
  {q:"I've made a huge mistake.", src:"Arrested Development", year:2003, type:"tv", char:"G.O.B. Bluth", actors:[{name:"Will Arnett",role:"G.O.B. Bluth"}], desc:"G.O.B.'s catchphrase — delivered with magnificent self-awareness and zero actual self-reflection. The entire character in four words.", trivia:["Will Arnett said the line became a cultural shorthand because everyone has felt it and nobody says it that honestly.","Arrested Development was cancelled by Fox after three seasons, then revived by Netflix — a first for a major TV series."], cat:"TV"},

  // ── OFFICE ──
  {q:"That's what she said.", src:"The Office", year:2005, type:"tv", char:"Michael Scott", actors:[{name:"Steve Carell",role:"Michael Scott"}], desc:"Michael's reflexive weaponisation of innuendo — deployed at every possible moment, usually at the worst one. Steve Carell's timing made it an art form.", trivia:["The joke predates The Office — it was a popular phrase in the early 2000s, but Michael Scott made it his signature.","Steve Carell said he never got tired of the line because the contexts were always new."], cat:"TV"},
  {q:"Would I rather be feared or loved? Easy. Both. I want people to be afraid of how much they love me.", src:"The Office", year:2005, type:"tv", char:"Michael Scott", actors:[{name:"Steve Carell",role:"Michael Scott"}], desc:"Michael's management philosophy — absurd and yet containing a tiny grain of human truth about the desire to be both powerful and liked.", trivia:["The Office US was adapted from the British original by Ricky Gervais and Stephen Merchant, who approved the American version.","Steve Carell was initially not the studio's first choice — they wanted an American version of Gervais's David Brent."], cat:"TV"},
  {q:"I am Beyoncé, always.", src:"The Office", year:2009, type:"tv", char:"Michael Scott", actors:[{name:"Steve Carell",role:"Michael Scott"}], desc:"Michael's self-affirmation without logic or justification — confidence as religion.", trivia:["The line was partly improvised by Carell. The writers kept it because it perfectly encapsulated Michael's delusion.","Beyoncé has publicly referenced the line at concerts and interviews."], cat:"TV"},

  // ── WIRE EXTRA ──
  {q:"All in the game, yo. All in the game.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's philosophy of the street — everyone in the game has accepted its terms, including the risk of dying by them.", trivia:["Michael K. Williams died in September 2021. David Simon wrote a long tribute calling him the most important actor in The Wire.","Omar Little never carries a gun indoors — a personal code the character maintains throughout the series."], cat:"TV"},
  {q:"The wire always got to be there.", src:"The Wire", year:2004, type:"tv", char:"Clay Davis", actors:[{name:"Isiah Whitlock Jr.",role:"Clay Davis"}], desc:"Clay Davis, corrupt politician, on the necessity of surveillance as power. The show's title is literal and metaphorical simultaneously.", trivia:["Isiah Whitlock Jr. improvised much of Clay Davis's distinctive vocal delivery.","David Simon spent a year embedded with the Baltimore Police Department before writing the first season."], cat:"TV"},
  {q:"We used to make shit in this country. Build shit. Now we just put our hand in the next guy's pocket.", src:"The Wire", year:2004, type:"tv", char:"Frank Sobotka", actors:[{name:"Chris Bauer",role:"Frank Sobotka"}], desc:"Season 2's thesis — industrial decline, deindustrialisation, and the desperation it creates. As relevant now as when written.", trivia:["Season 2 of The Wire is the most criminally underrated TV season ever made, according to David Simon.","Chris Bauer based Frank Sobotka's physicality on working-class men he knew growing up in Baltimore."], cat:"TV"},

  // ── SOPRANOS EXTRA ──
  {q:"A wrong decision is better than indecision.", src:"The Sopranos", year:2002, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"Tony's management operating system — paralysis is the only true failure. He lives this and it destroys him.", trivia:["James Gandolfini was reportedly offered the role by David Chase after a single meeting in a New York restaurant.","The Sopranos ran for 86 episodes — Chase said it was exactly the right length."], cat:"TV"},
  {q:"You got any idea what my life would be worth if certain people thought I was informing?", src:"The Sopranos", year:1999, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"Tony explaining to his therapist why the therapy itself is dangerous. The premise of the show is inherently self-destructive.", trivia:["The therapy scenes were suggested by David Chase's own experience in therapy.","Lorraine Bracco, who plays Dr. Melfi, was originally asked to audition for the role of Carmela."], cat:"TV"},

  // ── BREAKING BAD EXTRA ──
  {q:"No more half measures, Walter.", src:"Breaking Bad", year:2010, type:"tv", char:"Mike Ehrmantraut", actors:[{name:"Jonathan Banks",role:"Mike Ehrmantraut"}], desc:"Mike's parable about a domestic abuser — the story of why he stopped trying to handle things gently. Full commitment or none.", trivia:["Jonathan Banks said this was the speech that defined Mike Ehrmantraut's entire psychology.","The monologue is entirely in one take — Banks insisted on it."], cat:"TV"},
  {q:"Tread lightly.", src:"Breaking Bad", year:2013, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Heisenberg's final warning to Hank — delivered quietly, without raising his voice, in a garage. The most chilling moment of the series.", trivia:["The scene was the cold open of Season 5B — shown at the beginning before flashing back in time.","Bryan Cranston said this was the scene in which Walter White completed his transformation."], cat:"TV"},
  {q:"I'm the danger. I'm the one who knocks.", src:"Breaking Bad", year:2011, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"The complete declaration — a chemistry teacher who has become the thing that frightens criminals. The show's most quoted moment.", trivia:["The episode title is 'Cornered.' Vince Gilligan said the title referred to Skyler, not Walter.","The speech was written in a single afternoon. Gilligan said it arrived almost fully formed."], cat:"TV"},
  {q:"Jesse, you asked me if I was in the meth business or the money business. Neither. I'm in the empire business.", src:"Breaking Bad", year:2012, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Walter's confession of true motive — it was never about money or survival. It was about scale, dominance, legacy.", trivia:["Vince Gilligan said this was the line that revealed Walt's real character had always been there, waiting.","The 'empire' speech was delivered against the backdrop of a $70 million methylamine deal."], cat:"TV"},

  // ── GAME OF THRONES EXTRA ──
  {q:"Chaos isn't a pit. Chaos is a ladder.", src:"Game of Thrones", year:2013, type:"tv", char:"Petyr 'Littlefinger' Baelish", actors:[{name:"Aidan Gillen",role:"Petyr Baelish"}], desc:"Littlefinger's entire worldview — where others see disorder as threat, he sees opportunity. The philosophy of every opportunist in history.", trivia:["The monologue is delivered partially in voiceover while Ros is being killed — Benioff and Weiss designed the contrast deliberately.","Aidan Gillen said he played Littlefinger as a man who had loved once and never recovered from its failure."], cat:"TV"},
  {q:"Hold the door!", src:"Game of Thrones", year:2016, type:"tv", char:"Hodor / Wylis", actors:[{name:"Kristian Nairn",role:"Hodor"}], desc:"The most devastating etymology in television history — 'Hodor' is a corruption of 'hold the door.' A man's entire life reduced to a single tragic command.", trivia:["George R.R. Martin told showrunners Benioff and Weiss this origin in their very first meeting — years before it aired.","Kristian Nairn (Hodor) said he cried when he found out the meaning. He'd been playing the character for six years without knowing."], cat:"TV"},
  {q:"The man who passes the sentence should swing the sword.", src:"Game of Thrones", year:2011, type:"tv", char:"Ned Stark", actors:[{name:"Sean Bean",role:"Ned Stark"}], desc:"Ned's code of honour — those who order death should witness it personally. He teaches this to Bran. It's also what gets him killed.", trivia:["Sean Bean's Ned Stark was killed at the end of season 1 — the first major subversion of the 'hero lives' convention in prestige TV.","GRRM inserted Ned's death into the novel to signal that no character was safe — a radical choice in 1996."], cat:"TV"},
  {q:"Power resides where men believe it resides. It's a trick, a shadow on the wall.", src:"Game of Thrones", year:2012, type:"tv", char:"Varys", actors:[{name:"Conleth Hill",role:"Varys"}], desc:"Varys's riddle about power — the most political speech in the show. Power is a shared fiction. Those who see through it have more of it.", trivia:["Conleth Hill said Varys was the most carefully written character in the show because George R.R. Martin kept his motivations hidden even from the writers.","The 'riddle of power' speech is studied in political science courses as a statement of soft power theory."], cat:"TV"},

  // ── FILMS — MISC PROFOUND ──
  {q:"Why do we fall, sir? So we might learn to pick ourselves up.", src:"Batman Begins", year:2005, type:"movie", char:"Alfred Pennyworth", actors:[{name:"Michael Caine",role:"Alfred Pennyworth"}], desc:"Thomas Wayne's words, quoted by Alfred. The ethical foundation of the entire Nolan trilogy — Bruce doesn't avenge his parents, he learns from the fall.", trivia:["Michael Caine said he based Alfred on the best butlers he had ever met — men of absolute discretion and genuine love.","The line is repeated in The Dark Knight Rises in a pivotal scene."], cat:"Profound"},
  {q:"The only way to get what you want in this world is through hard work.", src:"The Princess and the Frog", year:2009, type:"movie", char:"Tiana", actors:[{name:"Anika Noni Rose",role:"Tiana"}], desc:"Disney's first Black princess — and her philosophy is work ethic, not wishing on stars. A deliberate counter-narrative from the studio that invented wishing.", trivia:["Tiana was Disney's first Black princess in 72 years of animated features.","The film's New Orleans setting was researched through months of location visits and consultation with local musicians."], cat:"Profound"},
  {q:"The truth is, everyone is going to hurt you. You just got to find the ones worth suffering for.", src:"Various", year:1999, type:"movie", char:"Multiple characters", actors:[{name:"Various actors",role:"Various"}], desc:"Attributed to Bob Marley but widely quoted in film — the idea that vulnerability to pain is the price of connection.", trivia:["The quote's true origin is disputed — it appears in several films and is widely attributed to Marley without clear source.","The sentiment appears in different forms across 20th century literature and has been adopted across cultures."], cat:"Profound"},
  {q:"You have to believe me. I am not the man I was.", src:"A Christmas Carol", year:1984, type:"movie", char:"Ebenezer Scrooge", actors:[{name:"George C. Scott",role:"Ebenezer Scrooge"}], desc:"Scrooge's complete transformation — not a plan or a resolution, but an identity statement. He has been changed by seeing himself clearly.", trivia:["Charles Dickens published A Christmas Carol in 1843. It sold out its first edition of 6,000 copies in five days.","The story has been adapted for film and television over 135 times — more than any other Christmas story."], cat:"Classic"},
  {q:"Don't dream it. Be it.", src:"The Rocky Horror Picture Show", year:1975, type:"movie", char:"Dr. Frank-N-Furter", actors:[{name:"Tim Curry",role:"Dr. Frank-N-Furter"}], desc:"Frank-N-Furter's liberation theology — the transposition of dreaming and being is the whole film's philosophy.", trivia:["Rocky Horror ran for only one week in its initial US release before being pulled. Its midnight screening revival began in 1976 and never stopped.","Tim Curry said Frank-N-Furter was the most liberating and terrifying character he has ever played simultaneously."], cat:"Profound"},
  {q:"Certifiably, ridiculously, inconveniently in love with you.", src:"Crazy, Stupid, Love", year:2011, type:"movie", char:"Jacob Palmer", actors:[{name:"Ryan Gosling",role:"Jacob Palmer"}], desc:"The manosphere Casanova reduced to honesty by a woman he didn't expect. Love as vulnerability accepted.", trivia:["The film's twist — that Jacob is dating Hannah, who is Cal's daughter — was kept secret from cast members until the scene was shot.","Emma Stone improvised much of her first scene with Ryan Gosling."], cat:"Romance"},
  {q:"Just keep swimming.", src:"Finding Nemo", year:2003, type:"movie", char:"Dory", actors:[{name:"Ellen DeGeneres",role:"Dory (voice)"}], desc:"Dory's philosophy of persistence — with no memory and no plan, she still moves forward. The most useful advice in any children's film.", trivia:["Ellen DeGeneres improvised the 'Just keep swimming' song entirely — it was not in the original script.","Finding Nemo spent twelve weeks at #1 at the box office and became the best-selling DVD of all time at that point."], cat:"Profound"},
  {q:"Ohana means family. Family means nobody gets left behind or forgotten.", src:"Lilo & Stitch", year:2002, type:"movie", char:"Lilo", actors:[{name:"Daveigh Chase",role:"Lilo (voice)"}], desc:"A little girl and a dangerous alien discovering what family means — not blood, but commitment. Disney at its most genuinely affecting.", trivia:["The film was almost entirely written and animated in the Florida studio — away from the main California production.","The relationship between Lilo and her sister Nani was praised by critics as the most realistic sibling bond in animation."], cat:"Profound"},
  {q:"The flower that blooms in adversity is the most rare and beautiful of all.", src:"Mulan", year:1998, type:"movie", char:"The Emperor of China", actors:[{name:"Pat Morita",role:"The Emperor (voice)"}], desc:"The Emperor's final assessment of Mulan — not despite her struggles but because of them. The standard Western narrative reversed.", trivia:["Mulan is based on the Chinese legend of Hua Mulan, which dates back to a 5th or 6th century poem called The Ballad of Mulan.","Pat Morita, famous as Mr. Miyagi, was the only non-Asian actor in the principal voice cast."], cat:"Profound"},
  {q:"To infinity and beyond isn't just a phrase — it's a challenge to never stop exploring.", src:"Buzz Lightyear of Star Command", year:2000, type:"tv", char:"Buzz Lightyear", actors:[{name:"Patrick Warburton",role:"Buzz Lightyear (voice)"}], desc:"Buzz's philosophy expanded — the original phrase from Toy Story transformed into a statement about the nature of curiosity.", trivia:["Patrick Warburton replaced Tim Allen in the TV series — Allen only voiced Buzz in the feature films.","NASA has used the phrase 'to infinity and beyond' in multiple mission communications as a tribute."], cat:"Profound"},
  {q:"I'm flying, Jack!", src:"Titanic", year:1997, type:"movie", char:"Rose DeWitt Bukater", actors:[{name:"Kate Winslet",role:"Rose DeWitt Bukater"}], desc:"Rose at the bow, Jack's arms around her, the world ahead — pure joy before the ice. James Cameron's most unguarded romantic image.", trivia:["Kate Winslet said this scene took three days to film due to weather and technical challenges.","The bow scene was filmed at the edge of a specially constructed tank — the ocean visible beyond the edge of the set."], cat:"Romance"},
  {q:"You make me want to be a better man.", src:"As Good as It Gets", year:1997, type:"movie", char:"Melvin Udall", actors:[{name:"Jack Nicholson",role:"Melvin Udall"}], desc:"A misanthrope's greatest compliment — not 'I love you' but 'you've changed what I aim for.' Perhaps the most meaningful romantic declaration in comedy.", trivia:["Jack Nicholson won his third Academy Award for Best Actor for this role.","Helen Hunt and Jack Nicholson won the lead acting awards — one of very few times a romantic film swept both categories."], cat:"Romance"},
  {q:"Love actually is all around.", src:"Love Actually", year:2003, type:"movie", char:"David (PM)", actors:[{name:"Hugh Grant",role:"David the Prime Minister"}], desc:"The film's thesis stated simply — in airports, in offices, in ordinary moments. Richard Curtis's unashamed optimism about human connection.", trivia:["Love Actually was Richard Curtis's directorial debut and has become the defining British Christmas film.","The airport arrival scenes were filmed at Heathrow with real passengers giving consent — many of the reactions are genuine."], cat:"Romance"},
  {q:"Gentlemen, you can't fight in here. This is the War Room!", src:"Dr. Strangelove", year:1964, type:"movie", char:"President Merkin Muffley", actors:[{name:"Peter Sellers",role:"President Merkin Muffley"}], desc:"Stanley Kubrick's blackest joke — the absurdity of polite protocol during nuclear annihilation. The whole film is in this line.", trivia:["Peter Sellers played three roles in the film. A fourth role, Major Kong, was recast to Slim Pickens after Sellers broke his ankle.","Stanley Kubrick researched nuclear strategy so thoroughly that the Pentagon investigated whether he had classified sources."], cat:"Classic"},
  {q:"The greatest trick the devil ever pulled was convincing the world he didn't exist — and like that, he is gone.", src:"The Usual Suspects", year:1995, type:"movie", char:"Verbal Kint", actors:[{name:"Kevin Spacey",role:"Verbal Kint"}], desc:"The complete quote — the film's final reveal compressed into the last seconds. Verbal has been Keyser Söze all along.", trivia:["Bryan Singer's direction was to never let the audience suspect Verbal — so his performance is calibrated to seem victimised.","The line is adapted from a Charles Baudelaire poem about the nature of evil."], cat:"Crime"},
  {q:"I want you to get mad. I want you to say: I'm a human being, goddammit! My life has value!", src:"Network", year:1976, type:"movie", char:"Howard Beale", actors:[{name:"Peter Finch",role:"Howard Beale"}], desc:"Beale's full call to action — not politics, not policy, but a demand for basic human dignity. Fifty years on, it still sounds contemporary.", trivia:["Paddy Chayefsky's script predicted 24-hour news, reality TV, and outrage media thirty years before they existed.","The film is included in the United States National Film Registry as culturally significant."], cat:"Classic"},
  {q:"I'd like to make her look a little more attractive. How far can you pull back?", src:"Network", year:1976, type:"movie", char:"Network executive", actors:[{name:"Various",role:"Network executives"}], desc:"The darkest comedy in Network — the TV business aestheticising human pain. Paddy Chayefsky's satire of media has only aged into warning.", trivia:["Paddy Chayefsky won the Academy Award for Best Original Screenplay for Network.","Sidney Lumet said Network was the most prescient script he ever read."], cat:"Classic"},
  {q:"I'm going to give you a little advice. There's a force in the universe that makes things happen; all you have to do is get in touch with it, stop thinking, let things happen, and be the ball.", src:"Caddyshack", year:1980, type:"movie", char:"Ty Webb", actors:[{name:"Chevy Chase",role:"Ty Webb"}], desc:"Absurdist Zen masquerading as golf advice. Chevy Chase improvised most of Ty's dialogue, producing the film's most quotable comic philosophy.", trivia:["Chevy Chase and Bill Murray did not share any scripted scenes — their famous improvised exchange was shot in one afternoon.","Caddyshack was a critical failure but a massive box office success — it is now regarded as one of the greatest comedies ever made."], cat:"Classic"},
  {q:"Leave the gun, take the cannoli.", src:"The Godfather", year:1972, type:"movie", char:"Peter Clemenza", actors:[{name:"Richard Castellano",role:"Peter Clemenza"}], desc:"After a mob execution, Peter has his priorities. The mundane persistence of appetite alongside violence — the Godfather's dark comedy in one image.", trivia:["Entirely improvised by Richard Castellano — not in the script.","Francis Ford Coppola has said this is his favourite improvisation in all three Godfather films."], cat:"Crime"},
  {q:"Keep your friends close, but your enemies closer.", src:"The Godfather Part II", year:1974, type:"movie", char:"Michael Corleone", actors:[{name:"Al Pacino",role:"Michael Corleone"}], desc:"Michael's operational philosophy for survival — often misattributed to Sun Tzu, it appears in no classical text. It is pure Corleone.", trivia:["The line doesn't appear in Mario Puzo's novel — it was added to the screenplay by Coppola and Puzo.","Al Pacino was not nominated for an Academy Award for the role — a decision that is still considered a major oversight."], cat:"Crime"},
  {q:"Revenge is a dish best served cold.", src:"Star Trek II: The Wrath of Khan", year:1982, type:"movie", char:"Khan", actors:[{name:"Ricardo Montalbán",role:"Khan Noonien Singh"}], desc:"Khan misattributing a Klingon proverb as he prepares his revenge against Kirk. The line predates Star Trek — it appears in a 19th century French novel.", trivia:["Ricardo Montalbán filmed his scenes without ever being on the same set as William Shatner — they were in different cities.","The Wrath of Khan reversed the fortunes of the Star Trek franchise after the disappointing first film."], cat:"Action"},
  {q:"Live long and prosper.", src:"Star Trek", year:1967, type:"tv", char:"Spock", actors:[{name:"Leonard Nimoy",role:"Spock"}], desc:"The Vulcan salutation — logic and longevity as the highest values. Leonard Nimoy created the gesture himself, based on a Jewish priestly blessing.", trivia:["Leonard Nimoy took the hand gesture from the Priestly Blessing used in Jewish synagogue services.","Nimoy fought to keep the gesture — the producers initially felt it was too unusual for mainstream audiences."], cat:"TV"},
  {q:"He's not the Messiah. He's a very naughty boy.", src:"Monty Python's Life of Brian", year:1979, type:"movie", char:"Brian's Mother", actors:[{name:"Terry Jones",role:"Brian's Mother"}], desc:"The punchline to the entire film's theological argument — false messiahs require credulous followers. British satire at its most irreverent and most logical.", trivia:["The film was banned in Ireland and Norway on release. Norway's ban inspired the marketing tagline 'So funny it was banned in Norway.'","George Harrison financed the film through his production company HandMade Films — because he 'wanted to see it.'"], cat:"Classic"},
  {q:"Nobody expects the Spanish Inquisition!", src:"Monty Python's Flying Circus", year:1970, type:"tv", char:"Cardinal Ximénez", actors:[{name:"Michael Palin",role:"Cardinal Ximénez"}], desc:"The recurring sketch's punchline — surprise as the Inquisition's chief weapon, announced with total confidence by people who just burst through a door.", trivia:["Michael Palin said they used the line three times in the sketch because once would be funny and twice would be expected — three times is absurd.","The phrase has entered the language as shorthand for any unexpected development."], cat:"TV"},
  {q:"What is your favourite colour?", src:"Monty Python and the Holy Grail", year:1975, type:"movie", char:"Bridgekeeper", actors:[{name:"Terry Gilliam",role:"Bridgekeeper"}], desc:"The simplest question as the most dangerous trap. The film's entire comic genius is the collision of epic stakes with mundane bureaucracy.", trivia:["The film was shot in Scotland for £229,000 — the Pythons used coconuts instead of horses because they couldn't afford real ones.","Terry Gilliam and Terry Jones co-directed because neither could direct independently at that point."], cat:"Classic"},
  {q:"Strange women lying in ponds distributing swords is no basis for a system of government.", src:"Monty Python and the Holy Grail", year:1975, type:"movie", char:"Dennis", actors:[{name:"Michael Palin",role:"Dennis"}], desc:"The film's sharpest political joke — Dennis the anarchist-communist peasant offers the most coherent critique of monarchy in cinema.", trivia:["Michael Palin said this speech was his favourite in the entire Python canon.","The film has been adapted into the West End / Broadway musical Spamalot, which ran for years."], cat:"Classic"},
  {q:"Never give up! Never surrender!", src:"Galaxy Quest", year:1999, type:"movie", char:"Jason Nesmith / Commander Taggart", actors:[{name:"Tim Allen",role:"Jason Nesmith"}], desc:"A washed-up actor's catchphrase taken literally by aliens who believe his fictional show is a historical documentary. Meta-heroism at its finest.", trivia:["Galaxy Quest is consistently ranked by critics and fans as one of the best Star Trek films, despite not being a Star Trek film.","The film is beloved by the actual Star Trek cast — many have called it the most accurate depiction of the franchise's culture."], cat:"Action"},

  // ── FINAL BATCH ──
  {q:"Every passing minute is another chance to turn it all around.", src:"Vanilla Sky", year:2001, type:"movie", char:"Sofia Serrano", actors:[{name:"Penélope Cruz",role:"Sofia Serrano"}], desc:"A simple reframe of time — not diminishing resource but renewable chance. Cameron Crowe buried his warmest line in one of his strangest films.", trivia:["Vanilla Sky is a remake of the Spanish film Abre los ojos (Open Your Eyes) — Penélope Cruz played the same role in both.","Cameron Crowe said this line was the one he was most proud of writing in his career."], cat:"Profound"},
  {q:"I don't want to be a product of my environment. I want my environment to be a product of me.", src:"The Departed", year:2006, type:"movie", char:"Frank Costello", actors:[{name:"Jack Nicholson",role:"Frank Costello"}], desc:"Costello's opening philosophy — agency versus determinism stated as pure will. The line that defines his character before a single crime is shown.", trivia:["Jack Nicholson improvised the butter scene and most of his opening monologue.","The Departed won Martin Scorsese his first Academy Award for Best Director after multiple previous nominations."], cat:"Crime"},
  {q:"I smell a rat.", src:"The Departed", year:2006, type:"movie", char:"Frank Costello", actors:[{name:"Jack Nicholson",role:"Frank Costello"}], desc:"Costello's instinct — precise, dangerous, usually correct. The entire film is about competing rats in competing organisations.", trivia:["The Departed is a remake of the Hong Kong film Infernal Affairs (2002).","Martin Scorsese said the film was his attempt to make a straightforward genre picture — it became one of his most acclaimed."], cat:"Crime"},
  {q:"Your scientists were so preoccupied with whether or not they could, they didn't stop to think if they should.", src:"Jurassic Park", year:1993, type:"movie", char:"Dr. Ian Malcolm", actors:[{name:"Jeff Goldblum",role:"Dr. Ian Malcolm"}], desc:"The film's moral in one sentence — a standing rebuke to any technology developed without ethical framework. Applies to AI, genetic engineering, and nuclear weapons.", trivia:["Jeff Goldblum largely improvised the delivery and pacing of this line — the script gave him the words, he gave it the rhythm.","Steven Spielberg said this was the line he kept coming back to while making the film — it was the entire reason for the story."], cat:"Profound"},
  {q:"Life finds a way.", src:"Jurassic Park", year:1993, type:"movie", char:"Dr. Ian Malcolm", actors:[{name:"Jeff Goldblum",role:"Dr. Ian Malcolm"}], desc:"Malcolm's elegant chaos theory — nature's persistence against any attempt to contain or control it. Three words that also describe evolution itself.", trivia:["Jeff Goldblum said he ad-libbed the specific delivery — the pause before 'way' was entirely his choice.","The line has been adopted in biology papers and ecological studies as shorthand for evolutionary resilience."], cat:"Profound"},
  {q:"Hasta la vista, baby.", src:"Terminator 2: Judgment Day", year:1991, type:"movie", char:"The T-800", actors:[{name:"Arnold Schwarzenegger",role:"The T-800"}], desc:"Learnt from John Connor, deployed at the perfect moment to shatter a liquid-metal killer. Human slang repurposed by a machine for maximum effect.", trivia:["Schwarzenegger practised the line hundreds of times to get the delivery exactly flat and deadpan.","The German release changed it to 'Auf Wiedersehen, Baby' — in Norwegian it became 'Ha det bra, baby.'"], cat:"Action"},
  {q:"You're a wizard, Harry.", src:"Harry Potter and the Philosopher's Stone", year:2001, type:"movie", char:"Rubeus Hagrid", actors:[{name:"Robbie Coltrane",role:"Rubeus Hagrid"}], desc:"The revelation that changes Harry's life — and the line that launched a billion children's imaginations. Simple, declarative, world-altering.", trivia:["Robbie Coltrane said the line more than forty times across different takes.","J.K. Rowling said the moment Harry is told he's a wizard was the first scene she conceived — the whole series grew outward from it."], cat:"Classic"},
  {q:"It does not do to dwell on dreams and forget to live.", src:"Harry Potter and the Philosopher's Stone", year:2001, type:"movie", char:"Albus Dumbledore", actors:[{name:"Richard Harris",role:"Albus Dumbledore"}], desc:"Dumbledore warning Harry away from the Mirror of Erised — the mirror that shows the deepest desire of your heart, and will drive you mad.", trivia:["Richard Harris died during production of Chamber of Secrets — Michael Gambon took over the role from Prisoner of Azkaban onwards.","J.K. Rowling based the Mirror of Erised on the concept of nostalgia and unhealthy attachment."], cat:"Profound"},
  {q:"It is our choices, Harry, that show what we truly are, far more than our abilities.", src:"Harry Potter and the Chamber of Secrets", year:2002, type:"movie", char:"Albus Dumbledore", actors:[{name:"Richard Harris",role:"Albus Dumbledore"}], desc:"Dumbledore's answer to Harry's fear that the Sorting Hat nearly put him in Slytherin. Character through decision, not destiny.", trivia:["This is the thesis of the entire Harry Potter series — choice versus fate.","J.K. Rowling has said this is the line she is most proud of writing."], cat:"Profound"},
  {q:"We are only as strong as we are united, as weak as we are divided.", src:"Harry Potter and the Goblet of Fire", year:2005, type:"movie", char:"Albus Dumbledore", actors:[{name:"Michael Gambon",role:"Albus Dumbledore"}], desc:"Dumbledore's end-of-year speech after Cedric Diggory's murder — unity as survival principle when genuine evil returns.", trivia:["Michael Gambon said delivering Dumbledore's serious speeches was the most demanding aspect of the role.","The line is quoted in schools, military academies, and political speeches around the world."], cat:"Profound"},
  {q:"The stuff of legend.", src:"Master and Commander: The Far Side of the World", year:2003, type:"movie", char:"Dr. Stephen Maturin", actors:[{name:"Paul Bettany",role:"Dr. Stephen Maturin"}], desc:"A naturalist on the Galapagos, seeing evolution's evidence before Darwin. Awe without category.", trivia:["The film is based on Patrick O'Brian's twenty-volume Aubrey–Maturin series — one of the greatest series in English literature.","Director Peter Weir spent three years in pre-production building historically accurate replicas of the HMS Surprise."], cat:"Drama"},
  {q:"It's a funny thing about mothers and fathers. Even when their own child is the most disgusting little blister you could ever imagine, they still think that he or she is wonderful.", src:"Matilda", year:1996, type:"movie", char:"Miss Honey", actors:[{name:"Embeth Davidtz",role:"Miss Honey"}], desc:"Miss Honey on parental love — and its catastrophic absence in Matilda's case. Roald Dahl's darkest observation given tenderness by the film.", trivia:["Mara Wilson, who played Matilda, lost her mother to breast cancer during filming — the cast and crew quietly supported her throughout.","Danny DeVito directed and produced the film while playing Mr. Wormwood."], cat:"Drama"},
  {q:"A person's a person, no matter how small.", src:"Horton Hears a Who!", year:2008, type:"movie", char:"Horton the Elephant", actors:[{name:"Jim Carrey",role:"Horton (voice)"}], desc:"Dr. Seuss's founding principle — the moral weight of existence is not proportional to size, power, or visibility.", trivia:["Dr. Seuss wrote the book in 1954 — it was widely interpreted as a statement about post-war pacifism and the rights of smaller nations.","Jim Carrey said voicing Horton was one of the most morally uncomplicated roles of his career."], cat:"Profound"},
  {q:"With the right kind of eyes you can almost see the high-water mark — that place where the wave finally broke and rolled back.", src:"Fear and Loathing in Las Vegas", year:1998, type:"movie", char:"Raoul Duke", actors:[{name:"Johnny Depp",role:"Raoul Duke"}], desc:"Hunter S. Thompson's elegy for the 1960s counterculture — the moment idealism peaked before corporate reality absorbed it.", trivia:["Johnny Depp spent months with the real Hunter S. Thompson preparing for the role.","Terry Gilliam insisted on practical effects for most of the drug sequences — achieved through light and camera technique."], cat:"Profound"},
  {q:"We were somewhere around Barstow on the edge of the desert when the drugs began to take hold.", src:"Fear and Loathing in Las Vegas", year:1998, type:"movie", char:"Raoul Duke", actors:[{name:"Johnny Depp",role:"Raoul Duke"}], desc:"One of the great opening lines — Thompson's novel begins identically. The reader/viewer is thrown into chaos from the first word.", trivia:["Thompson's novel was based on a real assignment to cover the Mint 400 motorcycle race for Sports Illustrated in 1971.","The book was rejected by multiple publishers before Rolling Stone ran it as a two-part serial."], cat:"Profound"},

  {q:"Surely you can't be serious.", src:"Airplane!", year:1980, type:"movie", char:"Ted Striker", actors:[{name:"Robert Hays",role:"Ted Striker"}], desc:"The straight man setting up Nielsen's most famous line. The joke works because Striker is completely sincere.", trivia:["The entire film is a parody of the 1957 film Zero Hour — the filmmakers bought the rights and essentially recreated scenes.","The Zucker, Abrahams and Zucker team introduced four jokes per minute — more than any comedy film before it."], cat:"Classic"},

  {q:"It's not who you are underneath, it's what you do that defines you.", src:"Batman Begins", year:2005, type:"movie", char:"Rachel Dawes", actors:[{name:"Katie Holmes",role:"Rachel Dawes"}], desc:"Rachel's challenge to Bruce — and the line he later echoes back to her after becoming Batman. Character proved through action, not origin.", trivia:["Christopher Nolan said this was the moral thesis of the entire trilogy, planted in the first film and completed in the third.","The Nolan Batman trilogy is the highest-grossing superhero trilogy ever made."], cat:"Profound"},

];


// ── State ──
let currentIndex = 0;
let liked = new Set();
let touchStartX = 0, touchStartY = 0, touchCurrentX = 0;
let isDragging = false;
let activeCategory = 'All';

const allCategories = ['All', ...new Set(QUOTES.map(q => q.cat))];

// ── DOM refs ──
const cardStack   = document.getElementById('cardStack');
const counterEl   = document.getElementById('counterEl');
const progressDots= document.getElementById('progressDots');
const infoDrawer  = document.getElementById('infoDrawer');
const drawerSheet = document.getElementById('drawerSheet');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const drawerTabTitle = document.getElementById('drawerTabTitle');
const searchOverlay = document.getElementById('search-overlay');
const searchInput = document.getElementById('searchInput');

let filteredQuotes = QUOTES.slice();

function applyCategory(cat) {
  activeCategory = cat;
  filteredQuotes = cat === 'All' ? QUOTES.slice() : QUOTES.filter(q => q.cat === cat);
  currentIndex = 0;
  renderCard();
}

// ── Render ──
function renderCard() {
  cardStack.innerHTML = '';
  counterEl.textContent = `${currentIndex + 1} / ${filteredQuotes.length}`;
  renderDots();

  const positions = [2, 1, 0]; // back to front
  positions.forEach((offset, i) => {
    const idx = (currentIndex + offset) % filteredQuotes.length;
    if (!filteredQuotes[idx]) return;
    const d = filteredQuotes[idx];
    const card = buildCard(d, idx);
    if (offset === 0) {
      card.classList.add('active');
      card.style.zIndex = 10;
      card.style.transform = 'scale(1) translateY(0)';
      card.style.opacity = 1;
      if (i === 2) card.classList.add('card-incoming');
    } else if (offset === 1) {
      card.classList.add('card-ghost-1');
    } else {
      card.classList.add('card-ghost-2');
    }
    cardStack.appendChild(card);
  });

  setupSwipe();
}

function buildCard(d, idx) {
  const card = document.createElement('div');
  card.className = 'quote-card';
  const isLiked = liked.has(idx);

  const actors = d.actors.map(a => a.name).join(', ');
  const badge = `<span class="source-type-badge badge-${d.type}">${d.type === 'movie' ? 'Film' : 'TV'}</span>`;

  card.innerHTML = `
    <span class="quote-mark">"</span>
    <p class="quote-text">${d.q}</p>
    <div class="quote-source">
      <div class="source-icon">${d.type === 'movie' ? '🎬' : '📺'}</div>
      <div class="source-details">
        <div class="source-title">${d.src}</div>
        <div class="source-meta">${d.char} · ${actors} · ${d.year}</div>
      </div>
      ${badge}
    </div>
    <div class="info-pills">
      <button class="pill" data-drawer="film">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Film Info
      </button>
      <button class="pill" data-drawer="actors">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Cast
      </button>
      <button class="pill" data-drawer="trivia">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Trivia
      </button>
    </div>
  `;

  // pill clicks
  card.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', e => {
      e.stopPropagation();
      openDrawer(d, pill.dataset.drawer);
    });
  });

  return card;
}

function renderDots() {
  progressDots.innerHTML = '';
  const total = Math.min(filteredQuotes.length, 9);
  let start = Math.max(0, Math.min(currentIndex - 4, filteredQuotes.length - total));
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (start + i === currentIndex ? ' current' : '');
    progressDots.appendChild(dot);
  }
}

// ── Drawer ──
function openDrawer(d, tab) {
  // film
  document.getElementById('drawerFilmTitle').textContent = d.src;
  document.getElementById('drawerFilmYear').textContent = `${d.year} · ${d.type === 'movie' ? 'Film' : 'TV Series'}`;
  document.getElementById('drawerFilmDesc').textContent = d.desc;

  // actors
  const actorList = document.getElementById('drawerActorList');
  actorList.innerHTML = d.actors.map(a => {
    const initials = a.name.split(' ').map(n => n[0]).join('');
    return `<div class="actor-row">
      <div class="actor-avatar">${initials}</div>
      <div class="actor-info">
        <div class="actor-name">${a.name}</div>
        <div class="actor-role">as ${a.role}</div>
      </div>
    </div>`;
  }).join('');

  // trivia
  const triviaEl = document.getElementById('drawerTriviaContent');
  triviaEl.innerHTML = d.trivia.map(t => `<div class="trivia-item">${t}</div>`).join('');

  const tabs = ['film', 'actors', 'trivia'];
  const labels = ['Film Info', 'Cast', 'Trivia'];
  const ti = tabs.indexOf(tab);
  drawerTabTitle.textContent = labels[ti];
  tabs.forEach((t, i) => {
    const el = document.getElementById(`drawerContent${t.charAt(0).toUpperCase() + t.slice(1)}`);
    el.className = 'drawer-content' + (i === ti ? ' active' : '');
  });

  infoDrawer.classList.add('open');
}

function closeDrawer() { infoDrawer.classList.remove('open'); }
drawerBackdrop.addEventListener('click', closeDrawer);

// ── Navigation ──
function goNext() {
  if (filteredQuotes.length === 0) return;
  const activeCard = cardStack.querySelector('.active');
  if (activeCard) {
    activeCard.classList.add('flying-left');
    setTimeout(() => {
      currentIndex = (currentIndex + 1) % filteredQuotes.length;
      renderCard();
    }, 300);
  }
}

function goPrev() {
  if (filteredQuotes.length === 0) return;
  const activeCard = cardStack.querySelector('.active');
  if (activeCard) {
    activeCard.classList.add('flying-right');
    setTimeout(() => {
      currentIndex = (currentIndex - 1 + filteredQuotes.length) % filteredQuotes.length;
      renderCard();
    }, 300);
  }
}

document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnPrev').addEventListener('click', goPrev);
document.getElementById('btnLike').addEventListener('click', () => {
  const btn = document.getElementById('btnLike');
  if (liked.has(currentIndex)) {
    liked.delete(currentIndex);
    btn.classList.remove('liked');
  } else {
    liked.add(currentIndex);
    btn.classList.add('liked');
  }
});

// ── Touch/swipe ──
function setupSwipe() {
  const activeCard = cardStack.querySelector('.active');
  if (!activeCard) return;

  activeCard.addEventListener('touchstart', onTouchStart, { passive: true });
  activeCard.addEventListener('touchmove', onTouchMove, { passive: false });
  activeCard.addEventListener('touchend', onTouchEnd);

  // mouse drag
  activeCard.addEventListener('mousedown', onMouseDown);
}

function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchCurrentX = touchStartX;
  isDragging = false;
}

function onTouchMove(e) {
  touchCurrentX = e.touches[0].clientX;
  const dx = touchCurrentX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
    e.preventDefault();
    isDragging = true;
    const card = e.currentTarget;
    card.classList.add('dragging');
    const rotate = dx * 0.04;
    const opacity = 1 - Math.abs(dx) / 400;
    card.style.transform = `translateX(${dx}px) rotate(${rotate}deg)`;
    card.style.opacity = Math.max(opacity, 0.3);
  }
}

function onTouchEnd(e) {
  const dx = touchCurrentX - touchStartX;
  const card = e.currentTarget;
  card.classList.remove('dragging');
  if (isDragging && Math.abs(dx) > 80) {
    dx < 0 ? goNext() : goPrev();
  } else {
    card.style.transform = '';
    card.style.opacity = '';
  }
  isDragging = false;
}

// mouse
let mouseStartX = 0, mouseDragging = false;
function onMouseDown(e) {
  mouseStartX = e.clientX;
  mouseDragging = false;
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}
function onMouseMove(e) {
  const dx = e.clientX - mouseStartX;
  if (Math.abs(dx) > 8) {
    mouseDragging = true;
    const card = cardStack.querySelector('.active');
    if (card) {
      card.style.transform = `translateX(${dx}px) rotate(${dx*0.04}deg)`;
      card.style.opacity = Math.max(1 - Math.abs(dx)/400, 0.3);
    }
  }
}
function onMouseUp(e) {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
  const dx = e.clientX - mouseStartX;
  if (mouseDragging && Math.abs(dx) > 80) {
    dx < 0 ? goNext() : goPrev();
  } else {
    const card = cardStack.querySelector('.active');
    if (card) { card.style.transform = ''; card.style.opacity = ''; }
  }
  mouseDragging = false;
}

// keyboard
document.addEventListener('keydown', e => {
  if (searchOverlay.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if (e.key === 'Escape') closeDrawer();
});

// ── Search ──
document.getElementById('btnSearch').addEventListener('click', openSearch);
document.getElementById('searchClose').addEventListener('click', closeSearch);

function openSearch() {
  searchOverlay.classList.add('open');
  buildCategoryFilters();
  renderSearchResults('');
  setTimeout(() => searchInput.focus(), 100);
}

function closeSearch() {
  searchOverlay.classList.remove('open');
  searchInput.value = '';
}

function buildCategoryFilters() {
  const cf = document.getElementById('categoryFilter');
  cf.innerHTML = allCategories.map(cat =>
    `<button class="cat-btn${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  cf.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cf.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyCategory(btn.dataset.cat);
      renderSearchResults(searchInput.value);
    });
  });
}

searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));

function renderSearchResults(query) {
  const q = query.toLowerCase().trim();
  const pool = activeCategory === 'All' ? QUOTES : QUOTES.filter(x => x.cat === activeCategory);
  const results = q ? pool.filter(x =>
    x.q.toLowerCase().includes(q) ||
    x.src.toLowerCase().includes(q) ||
    x.char.toLowerCase().includes(q) ||
    x.actors.some(a => a.name.toLowerCase().includes(q))
  ) : pool.slice(0, 30);

  const el = document.getElementById('searchResults');
  if (results.length === 0) {
    el.innerHTML = `<div class="search-empty">No quotes found for "${query}"</div>`;
    return;
  }
  el.innerHTML = results.slice(0, 40).map((r, i) => {
    const origIdx = QUOTES.indexOf(r);
    return `<div class="search-result-item" data-idx="${origIdx}">
      <div class="sri-quote">${r.q}</div>
      <div class="sri-meta">${r.src} · ${r.char} · ${r.year}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      const origIdx = parseInt(item.dataset.idx);
      filteredQuotes = activeCategory === 'All' ? QUOTES.slice() : QUOTES.filter(x => x.cat === activeCategory);
      const newIdx = filteredQuotes.indexOf(QUOTES[origIdx]);
      currentIndex = newIdx >= 0 ? newIdx : 0;
      renderCard();
      closeSearch();
    });
  });
}

// ── Init ──
renderCard();
</script>
