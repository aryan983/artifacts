<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lines That Matter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #0a0a0c;
–surface: #111116;
–surface2: #18181f;
–border: rgba(255,255,255,0.07);
–accent: #c8a96e;
–accent2: #7b68ee;
–text: #e8e4dc;
–muted: #6b6878;
–pill-bg: rgba(200,169,110,0.12);
–pill-hover: rgba(200,169,110,0.22);
}

html, body {
height: 100%;
background: #0a0a0c !important;
background-color: #0a0a0c !important;
color: #e8e4dc;
font-family: ‘DM Sans’, sans-serif;
overflow: hidden;
-webkit-tap-highlight-color: transparent;
}

@media (prefers-color-scheme: light) {
html, body { background: #0a0a0c !important; background-color: #0a0a0c !important; }
}

/* ── Header ── */
header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
padding: 18px 24px 14px;
background: linear-gradient(to bottom, #0a0a0c 60%, transparent);
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 18px;
letter-spacing: 0.02em;
color: #c8a96e;
opacity: 0.9;
}

.counter {
font-size: 12px;
color: #6b6878;
letter-spacing: 0.08em;
font-weight: 300;
}

/* ── Main card area ── */
#stage {
position: fixed;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
padding: 80px 0 180px;
overflow: hidden;
}

.card-stack {
position: relative;
width: 100%;
max-width: 480px;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
padding: 0 20px;
}

.quote-card {
position: absolute;
width: 100%;
background: #1e1e28;
border: 1px solid rgba(255,255,255,0.10);
border-radius: 20px;
padding: 40px 32px 32px;
transition: transform 0.08s ease, opacity 0.08s ease;
touch-action: pan-y;
user-select: none;
cursor: grab;
will-change: transform;
box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.04) inset;
}

.card-ghost-1 {
transform: scale(0.94) translateY(14px);
opacity: 0.6;
pointer-events: none;
z-index: 2;
}

.card-ghost-2 {
transform: scale(0.88) translateY(28px);
opacity: 0.35;
pointer-events: none;
z-index: 1;
}

.quote-card.active {
z-index: 10;
cursor: grab;
}

.quote-card.dragging {
cursor: grabbing;
transition: none;
}

.quote-card.flying-left {
transition: transform 0.38s cubic-bezier(0.55, 0, 0.8, 0.45), opacity 0.3s ease !important;
transform: translateX(-115%) rotate(-10deg) scale(0.95) !important;
opacity: 0 !important;
pointer-events: none;
}

.quote-card.flying-right {
transition: transform 0.38s cubic-bezier(0.55, 0, 0.8, 0.45), opacity 0.3s ease !important;
transform: translateX(115%) rotate(10deg) scale(0.95) !important;
opacity: 0 !important;
pointer-events: none;
}

.card-incoming {
animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes cardIn {
from { transform: scale(0.9) translateY(24px); opacity: 0; }
to   { transform: scale(1) translateY(0); opacity: 1; }
}

/* ── Quote text ── */
.quote-mark {
font-family: ‘Playfair Display’, serif;
font-size: 52px;
line-height: 0.5;
color: #c8a96e;
opacity: 0.35;
display: block;
margin-bottom: 12px;
}

.quote-text {
font-family: ‘Playfair Display’, serif;
font-size: clamp(18px, 5vw, 24px);
font-style: italic;
line-height: 1.55;
color: #e8e4dc;
font-weight: 400;
margin-bottom: 28px;
}

.quote-source {
display: flex;
align-items: flex-start;
gap: 12px;
padding-top: 20px;
border-top: 1px solid rgba(255,255,255,0.09);
}

.source-icon {
width: 36px;
height: 36px;
border-radius: 8px;
background: #1e1e26;
display: flex;
align-items: center;
justify-content: center;
font-size: 16px;
flex-shrink: 0;
border: 1px solid rgba(255,255,255,0.09);
}

.source-details {
flex: 1;
min-width: 0;
}

.source-title {
font-size: 13px;
font-weight: 500;
color: #e8e4dc;
opacity: 0.9;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.source-meta {
font-size: 11px;
color: #6b6878;
margin-top: 2px;
font-weight: 300;
letter-spacing: 0.04em;
}

.source-type-badge {
font-size: 10px;
padding: 3px 8px;
border-radius: 20px;
font-weight: 500;
letter-spacing: 0.06em;
text-transform: uppercase;
flex-shrink: 0;
align-self: center;
}
.badge-movie  { background: rgba(200,169,110,0.15); color: #c8a96e; }
.badge-tv     { background: rgba(123,104,238,0.15); color: #7b68ee; }

/* ── Info pills ── */
.info-pills {
display: flex;
gap: 8px;
margin-top: 20px;
flex-wrap: wrap;
}

.pill {
display: flex;
align-items: center;
gap: 5px;
padding: 7px 13px;
border-radius: 30px;
background: rgba(200,169,110,0.13);
border: 1px solid rgba(200,169,110,0.25);
font-size: 11px;
font-weight: 500;
color: #c8a96e;
cursor: pointer;
letter-spacing: 0.05em;
text-transform: uppercase;
transition: background 0.15s ease, transform 0.1s ease;
-webkit-tap-highlight-color: transparent;
font-family: ‘DM Sans’, sans-serif;
-webkit-appearance: none;
appearance: none;
outline: none;
}

.pill:active { transform: scale(0.96); background: rgba(200,169,110,0.24); }

.pill svg { width: 11px; height: 11px; stroke: #c8a96e; fill: none; }

/* ── Drawer panel ── */
.info-drawer {
position: fixed;
inset: 0;
z-index: 200;
display: flex;
flex-direction: column;
justify-content: flex-end;
pointer-events: none;
opacity: 0;
transition: opacity 0.25s ease;
}

.info-drawer.open {
pointer-events: all;
opacity: 1;
}

.drawer-backdrop {
position: absolute;
inset: 0;
background: rgba(0,0,0,0.65);
backdrop-filter: blur(4px);
}

.drawer-sheet {
position: relative;
z-index: 1;
background: #1a1a22;
border-radius: 24px 24px 0 0;
border: 1px solid rgba(255,255,255,0.09);
border-bottom: none;
padding: 12px 24px 48px;
max-height: 72vh;
overflow-y: auto;
transform: translateY(100%);
transition: transform 0.32s cubic-bezier(0.34,1.2,0.64,1);
}

.info-drawer.open .drawer-sheet {
transform: translateY(0);
}

.drawer-handle {
width: 36px;
height: 4px;
background: rgba(255,255,255,0.09);
border-radius: 2px;
margin: 0 auto 24px;
}

.drawer-tab-title {
font-family: ‘Playfair Display’, serif;
font-size: 11px;
letter-spacing: 0.14em;
text-transform: uppercase;
color: #c8a96e;
margin-bottom: 16px;
font-style: normal;
}

.drawer-content {
display: none;
}
.drawer-content.active { display: block; }

.drawer-movie-title {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
font-weight: 700;
color: #e8e4dc;
margin-bottom: 6px;
}

.drawer-movie-year {
font-size: 13px;
color: #6b6878;
margin-bottom: 16px;
}

.drawer-body-text {
font-size: 14px;
line-height: 1.7;
color: rgba(232,228,220,0.75);
font-weight: 300;
}

.drawer-actor-list {
display: flex;
flex-direction: column;
gap: 12px;
margin-top: 4px;
}

.actor-row {
display: flex;
align-items: center;
gap: 14px;
padding: 12px;
background: #1e1e26;
border-radius: 12px;
border: 1px solid rgba(255,255,255,0.09);
}

.actor-avatar {
width: 42px;
height: 42px;
border-radius: 50%;
background: linear-gradient(135deg, #c8a96e 0%, #7b68ee 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 15px;
font-weight: 600;
color: #0a0a0c;
flex-shrink: 0;
font-family: ‘DM Sans’, sans-serif;
}

.actor-info { flex: 1; }

.actor-name {
font-size: 14px;
font-weight: 500;
color: #e8e4dc;
}

.actor-role {
font-size: 11px;
color: #6b6878;
margin-top: 2px;
font-style: italic;
}

.trivia-item {
padding: 14px;
background: #1e1e26;
border-radius: 12px;
border-left: 3px solid #c8a96e;
font-size: 13px;
line-height: 1.65;
color: rgba(232,228,220,0.8);
margin-bottom: 10px;
font-weight: 300;
}

/* ── Bottom controls ── */
#controls {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 100;
padding: 20px 24px 36px;
background: linear-gradient(to top, #0a0a0c 60%, transparent);
}

.controls-inner {
max-width: 480px;
margin: 0 auto;
display: flex;
flex-direction: column;
gap: 14px;
}

/* swipe hint */
.swipe-hint {
text-align: center;
font-size: 11px;
color: #6b6878;
letter-spacing: 0.08em;
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}

.swipe-hint::before, .swipe-hint::after {
content: ‘’;
flex: 1;
height: 1px;
background: rgba(255,255,255,0.09);
}

/* ── Nav buttons ── */
.nav-buttons {
display: flex;
align-items: center;
justify-content: center;
gap: 16px;
}

.nav-btn {
width: 52px;
height: 52px;
border-radius: 50%;
background: #18181f;
border: 1px solid rgba(255,255,255,0.08);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: background 0.15s, transform 0.1s, border-color 0.15s;
-webkit-tap-highlight-color: transparent;
color: #6b6878;
-webkit-appearance: none;
appearance: none;
outline: none;
font-family: ‘DM Sans’, sans-serif;
}

.nav-btn:active { transform: scale(0.92); }

.nav-btn.primary {
width: 64px;
height: 64px;
background: #c8a96e;
border-color: #c8a96e;
color: #0a0a0c;
}

.nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
.nav-btn.primary svg { width: 24px; height: 24px; stroke: #0a0a0c; }

/* search overlay */
#search-overlay {
position: fixed;
inset: 0;
z-index: 300;
background: #0a0a0c;
display: flex;
flex-direction: column;
padding: 60px 24px 24px;
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease;
}

#search-overlay.open {
opacity: 1;
pointer-events: all;
}

.search-bar {
display: flex;
align-items: center;
gap: 12px;
background: #1a1a22;
border: 1px solid rgba(255,255,255,0.09);
border-radius: 16px;
padding: 14px 18px;
margin-bottom: 20px;
}

.search-bar svg { stroke: #6b6878; width: 18px; height: 18px; flex-shrink: 0; }

.search-bar input {
flex: 1;
background: none;
border: none;
outline: none;
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
color: #e8e4dc;
caret-color: #c8a96e;
}

.search-bar input::placeholder { color: #6b6878; }

.search-close {
background: none;
border: none;
color: #6b6878;
font-size: 14px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
padding: 4px 8px;
letter-spacing: 0.04em;
}

.search-results {
flex: 1;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 10px;
}

.search-result-item {
padding: 16px;
background: #1a1a22;
border-radius: 14px;
border: 1px solid rgba(255,255,255,0.09);
cursor: pointer;
transition: background 0.15s;
}

.search-result-item:active { background: #1e1e26; }

.sri-quote {
font-family: ‘Playfair Display’, serif;
font-style: italic;
font-size: 14px;
color: #e8e4dc;
line-height: 1.5;
margin-bottom: 8px;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}

.sri-meta {
font-size: 11px;
color: #6b6878;
}

.search-empty {
text-align: center;
color: #6b6878;
font-size: 14px;
padding: 40px 0;
}

.category-filter {
display: flex;
gap: 8px;
overflow-x: auto;
padding-bottom: 12px;
scrollbar-width: none;
margin-bottom: 4px;
}
.category-filter::-webkit-scrollbar { display: none; }

.cat-btn {
white-space: nowrap;
padding: 7px 14px;
border-radius: 20px;
background: #1a1a22;
border: 1px solid rgba(255,255,255,0.09);
color: #6b6878;
font-size: 12px;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}

.cat-btn.active {
background: rgba(200,169,110,0.13);
border-color: #c8a96e;
color: #c8a96e;
}

/* liked icon pulse */
@keyframes heartPulse {
0%   { transform: scale(1); }
50%  { transform: scale(1.35); }
100% { transform: scale(1); }
}
.liked svg { animation: heartPulse 0.3s ease; stroke: #e05d5d !important; fill: #e05d5d !important; }

/* progress dots */
.progress-dots {
display: flex;
gap: 5px;
justify-content: center;
margin-bottom: 4px;
}
.progress-dot {
width: 5px;
height: 5px;
border-radius: 50%;
background: rgba(255,255,255,0.09);
transition: all 0.25s ease;
}
.progress-dot.current {
background: #c8a96e;
width: 16px;
border-radius: 3px;
}
</style>

</head>

<script>
const QUOTES = [

  // ── REGRET & WASTED POTENTIAL ──
  {q:"You don't understand! I could've had class. I could've been a contender. I could've been somebody, instead of a bum, which is what I am.", src:"On the Waterfront", year:1954, type:"movie", char:"Terry Malloy", actors:[{name:"Marlon Brando",role:"Terry Malloy"}], desc:"Terry confronting his brother in a taxi — the moment a man recognises what he traded away and who is responsible. It's not just about Terry. It's about every choice we made to stay safe instead of brave.", trivia:["Brando later said this was the most personal moment in his career — he felt he too had compromised himself by not doing theatre.","The speech was based on a real conversation overheard by screenwriter Budd Schulberg."], cat:"Regret"},

  {q:"I could've saved more. I don't know, if I'd just... I could've got more.", src:"Schindler's List", year:1993, type:"movie", char:"Oskar Schindler", actors:[{name:"Liam Neeson",role:"Oskar Schindler"}], desc:"Schindler saved over a thousand lives, and this is how he ends the film — destroyed by what he didn't do. The question it leaves with you: what would it take for you to use everything you have?", trivia:["Steven Spielberg called this the most difficult scene he ever filmed.","The real Schindlerjuden presented Liam Neeson with a ring made from their teeth — he was overwhelmed."], cat:"Regret"},

  {q:"It's only after we've lost everything that we're free to do anything.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"Tyler's gospel of destruction. He's wrong about almost everything, but he's right that we cling to comfort as a substitute for meaning. The question is whether loss is the only teacher.", trivia:["David Fincher made Tyler deliberately seductive — and then showed what his philosophy actually produces.","The film cost $63 million and grossed $37 million in theatres. On home video, it became a generational text."], cat:"Freedom"},

  {q:"The things you own end up owning you.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"The irony is that this line now appears on merchandise sold at Urban Outfitters. But the underlying point survives the co-optation: what are you actually working for?", trivia:["The film was adapted from Chuck Palahniuk's 1996 novel, which he wrote after being beaten up while camping and receiving no sympathy from co-workers.","Palahniuk has said the novel was about his own generation's crisis of masculinity and purpose."], cat:"Freedom"},

  // ── IDENTITY & SELF-KNOWLEDGE ──
  {q:"I did it for me. I liked it. I was good at it. And I was really… I was alive.", src:"Breaking Bad", year:2013, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Walt's final confession, and the most honest moment in five seasons. He spent years telling himself it was for his family. This is the admission that he was lying — to them and to himself. The question it asks: what are you doing for you, and what are you lying to yourself about?", trivia:["Vince Gilligan said this was the line that completed the show's thesis.","Bryan Cranston and Gilligan wrote the scene together during rehearsal — it wasn't in the original draft."], cat:"Identity"},

  {q:"Who is you, Chiron?", src:"Moonlight", year:2016, type:"movie", char:"Juan", actors:[{name:"Mahershala Ali",role:"Juan"}], desc:"A drug dealer asking a boy the only question that matters. It's unanswerable in that moment — which is the whole film. Most of us spend decades avoiding it.", trivia:["Mahershala Ali won the Academy Award for Best Supporting Actor — the first Muslim actor to win an Oscar.","Barry Jenkins shot each of the film's three chapters in a distinct colour palette reflecting Chiron's changing inner state."], cat:"Identity"},

  {q:"At some point, you gotta decide for yourself who you gonna be. Can't let nobody make that decision for you.", src:"Moonlight", year:2016, type:"movie", char:"Juan", actors:[{name:"Mahershala Ali",role:"Juan"}], desc:"A man who profits from destroying communities gives a boy the only piece of wisdom that could save him. The contradiction is the point. Even broken people can hand you something true.", trivia:["Barry Jenkins wrote this specifically so Juan could be both the agent of harm and the source of grace in Chiron's life.","Moonlight won the Academy Award for Best Picture."], cat:"Identity"},

  {q:"This never happened. It will shock you how much it never happened.", src:"Mad Men", year:2007, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don advising someone to suppress a secret. He's an expert — his entire life is built on this principle. The line is chilling because most of us recognise it. How much of your life have you decided 'never happened'?", trivia:["Matthew Weiner based Don Draper's identity theft on a real post-WWII phenomenon of men who reinvented themselves.","Jon Hamm said this was the line that most disturbed him personally."], cat:"Identity"},

  {q:"People tell you who they are, but we ignore it because we want them to be who we want them to be.", src:"Mad Men", year:2010, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don on self-deception in relationships. The tragedy is he's speaking about himself too — projecting the person he wants to be onto others, never seeing himself clearly.", trivia:["Mad Men won four consecutive Emmys for Outstanding Drama Series.","Jon Hamm said he never played Don as a villain — he played him as a man who genuinely doesn't know himself."], cat:"Identity"},

  {q:"What you call love was invented by guys like me, to sell nylons.", src:"Mad Men", year:2007, type:"tv", char:"Don Draper", actors:[{name:"Jon Hamm",role:"Don Draper"}], desc:"Don's cynicism about romantic love — a construct manufactured for commerce. He believes it because he built his life on manufactured versions of himself. The line invites you to ask what else you believe that was sold to you.", trivia:["The line was almost cut — the writers felt it was too dark for a pilot.","It became one of the most quoted lines from the entire series."], cat:"Identity"},

  // ── TRUTH & SELF-DECEPTION ──
  {q:"Every lie we tell incurs a debt to the truth. Sooner or later, that debt is paid.", src:"Chernobyl", year:2019, type:"tv", char:"Valery Legasov", actors:[{name:"Jared Harris",role:"Valery Legasov"}], desc:"The series' thesis in one sentence. Said about a nuclear reactor, but it applies to every corner of your life where you've chosen the comfortable lie over the difficult truth.", trivia:["The real Legasov recorded tapes confessing the truth before taking his own life. The tapes were discovered and helped expose the cover-up.","Jared Harris researched Legasov's actual recorded confessions to capture his specific psychology."], cat:"Truth"},

  {q:"What is the cost of lies? The real danger is that if we hear enough lies, then we no longer recognise the truth at all.", src:"Chernobyl", year:2019, type:"tv", char:"Valery Legasov", actors:[{name:"Jared Harris",role:"Valery Legasov"}], desc:"Legasov's opening monologue. Written about Soviet disinformation, it landed in 2019 as contemporary prophecy. It also applies personally: how many lies have you normalised?", trivia:["Craig Mazin spent five years researching before writing a single page of the script.","Chernobyl received 19 Emmy nominations — more than any limited series to that point."], cat:"Truth"},

  {q:"The greatest trick the devil ever pulled was convincing the world he didn't exist.", src:"The Usual Suspects", year:1995, type:"movie", char:"Verbal Kint", actors:[{name:"Kevin Spacey",role:"Verbal Kint"}], desc:"The whole film is built on this principle. But the personal application is sharper: what version of yourself have you hidden so thoroughly that even you've forgotten it's there?", trivia:["The line is adapted from a Baudelaire poem about the nature of evil.","Kevin Spacey won the Academy Award for Best Supporting Actor. His entire performance was a sustained misdirection."], cat:"Truth"},

  // ── TIME & MORTALITY ──
  {q:"I've seen things you people wouldn't believe. Attack ships on fire off the shoulder of Orion. All those moments will be lost in time, like tears in rain.", src:"Blade Runner", year:1982, type:"movie", char:"Roy Batty", actors:[{name:"Rutger Hauer",role:"Roy Batty"}], desc:"A dying machine's elegy for his own consciousness. Largely improvised by Hauer, who cut the scripted version to its bones. The line asks what happens to everything you've experienced — and whether it matters that it disappears.", trivia:["Rutger Hauer wrote the speech himself the night before filming, stripping the original script to its essence.","Ridley Scott called it the greatest death speech in cinema history."], cat:"Mortality"},

  {q:"We are all just prisoners here, of our own device.", src:"Hotel California", year:1977, type:"movie", char:"Eagles (lyrics)", actors:[{name:"Don Henley",role:"Lead vocals"}], desc:"From the Eagles song — often quoted in films. The line encapsulates addiction, comfort, and the traps we build for ourselves, then mistake for home.", trivia:["Don Henley said the song was about the dark side of the American Dream and the excess of 1970s Los Angeles.","Hotel California is one of the best-selling singles of all time."], cat:"Mortality"},

  {q:"Carpe diem. Seize the day, boys. Make your lives extraordinary.", src:"Dead Poets Society", year:1989, type:"movie", char:"John Keating", actors:[{name:"Robin Williams",role:"John Keating"}], desc:"Keating says it while standing before photographs of long-dead alumni. These boys were young once. They were certain of the future. The point isn't inspiration — it's terror.", trivia:["Robin Williams improvised much of his classroom material. Several scenes used genuine first-takes of student reactions.","Director Peter Weir said Williams understood Keating's grief better than anyone on set."], cat:"Mortality"},

  {q:"Life moves pretty fast. If you don't stop and look around once in a while, you could miss it.", src:"Ferris Bueller's Day Off", year:1986, type:"movie", char:"Ferris Bueller", actors:[{name:"Matthew Broderick",role:"Ferris Bueller"}], desc:"Said directly to the camera by a teenager playing hooky. The line sounds like a cliché until you're in your thirties and realise he was right the whole time.", trivia:["John Hughes wrote the script in six days. He was 35 at the time and said he identified completely with a teenager's restlessness.","Matthew Broderick said this line gets quoted at him more than anything else in his career."], cat:"Mortality"},

  {q:"Time you enjoy wasting is not wasted time.", src:"Somewhere in Time", year:1980, type:"movie", char:"Richard Collier", actors:[{name:"Christopher Reeve",role:"Richard Collier"}], desc:"Often misattributed to Bertrand Russell, this idea lands in film as permission to be present. The assumption that all time must be productive is itself a prison.", trivia:["The film was based on Richard Matheson's novel Bid Time Return.","Christopher Reeve said this was the line from the film he thought about most in later years."], cat:"Mortality"},

  // ── COURAGE & FEAR ──
  {q:"Courage is not the absence of fear. It is the judgement that something else is more important than fear.", src:"The Princess Diaries", year:2001, type:"movie", char:"Queen Clarisse", actors:[{name:"Julie Andrews",role:"Queen Clarisse Renaldi"}], desc:"Often misattributed to various historical figures. As a definition it's simply correct: bravery isn't emotional immunity — it's a hierarchy of priorities. Fear stays. You choose what outranks it.", trivia:["The origin of this idea is often traced to Ambrose Redmoon's 1991 essay, but it predates him.","Director Garry Marshall said this was the line that justified making the whole film."], cat:"Courage"},

  {q:"You're going to need a lot of luck. More than I can give you.", src:"The Godfather", year:1972, type:"movie", char:"Vito Corleone", actors:[{name:"Marlon Brando",role:"Vito Corleone"}], desc:"The old Don to his son Michael — telling him the limits of what a father can do. The most quietly devastating parenting line in cinema.", trivia:["Brando improvised the tenderness in the garden scene — the script was much colder.","Francis Ford Coppola said this was the scene that told him the film would be something different."], cat:"Courage"},

  {q:"Get busy living, or get busy dying.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"Andy says it to Red, who's given up. It's not optimism — Andy has been in prison for years for a crime he didn't commit. It's a choice about how to inhabit your own life regardless of what it is.", trivia:["The Shawshank Redemption was a box office failure on release. It became the most-watched film on cable television and still tops the IMDb ratings.","Frank Darabont wrote the screenplay in eight weeks."], cat:"Courage"},

  {q:"Hope is a good thing, maybe the best of things, and no good thing ever dies.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"Written in a letter to Red from a man who has escaped after twenty years of wrongful imprisonment. Andy had no reason to hope and chose it anyway. That's the whole argument.", trivia:["Morgan Freeman was not told the contents of the letter before filming the scene. His reaction is genuine.","Stephen King sold the adaptation rights for $1 — and sent Darabont a dollar bill when the film succeeded."], cat:"Courage"},

  {q:"It takes a great deal of bravery to stand up to your enemies, but a great deal more to stand up to your friends.", src:"Harry Potter and the Philosopher's Stone", year:2001, type:"movie", char:"Albus Dumbledore", actors:[{name:"Richard Harris",role:"Albus Dumbledore"}], desc:"Said to Neville Longbottom, the least likely hero. The line reframes courage entirely — most of us will never face enemies. Every day we have opportunities to disappoint the people who like us.", trivia:["Richard Harris was initially reluctant to take the role but agreed after his granddaughter threatened not to speak to him.","J.K. Rowling has said Neville's arc was always planned to mirror Harry's."], cat:"Courage"},

  // ── LOSS & GRIEF ──
  {q:"It's not your fault.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"Sean saying it to Will, over and over, until Will breaks. The most effective therapy scene ever filmed — not because of technique, but because sometimes the only thing that helps is a person saying the true thing until you actually hear it.", trivia:["Robin Williams improvised the entire park bench scene. Matt Damon has said he genuinely didn't know where it was going.","Williams won his only competitive Academy Award for this role."], cat:"Grief"},

  {q:"You don't know about real loss, 'cause it only occurs when you've loved something more than you love yourself.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"Sean's rebuke of Will's cleverness about death and suffering. You can read about loss. You can analyse it. You don't understand it until you've loved something more than your own comfort.", trivia:["Gus Van Sant let Williams and Matt Damon develop the therapy scenes largely on their own.","The script was sold to Castle Rock but they demanded a happy ending. Miramax let the writers keep the original."], cat:"Grief"},

  {q:"Grief is the price we pay for love.", src:"The Crown", year:2017, type:"tv", char:"Queen Elizabeth II", actors:[{name:"Claire Foy",role:"Queen Elizabeth II"}], desc:"The Queen's message to America after 9/11 — six words that reframe loss not as punishment but as the direct cost of having loved. If it hurts, you loved well.", trivia:["Adapted from a real message sent by the actual Queen Elizabeth II to the American people on September 21, 2001.","Claire Foy won both the Emmy and the Golden Globe for her portrayal."], cat:"Grief"},

  {q:"I think you know how to love better than any of us. That's why you find it all so painful.", src:"Fleabag", year:2019, type:"tv", char:"The Priest", actors:[{name:"Andrew Scott",role:"The Priest"}], desc:"The Priest diagnosing Fleabag — sensitivity as simultaneously gift and wound. The people who feel loss most deeply are not weaker. They loved more completely.", trivia:["Andrew Scott and Phoebe Waller-Bridge spent weeks developing their characters' dynamic before filming.","Andrew Scott won the BAFTA for Best Supporting Actor."], cat:"Grief"},

  {q:"I want someone to tell me what to wear every morning. I want someone to tell me what to eat. I just don't want to have to make any decisions anymore.", src:"Fleabag", year:2016, type:"tv", char:"Fleabag", actors:[{name:"Phoebe Waller-Bridge",role:"Fleabag"}], desc:"The most honest expression of grief exhaustion in recent television. Not sadness — just the bone-deep tiredness of having to keep being a person after loss.", trivia:["Phoebe Waller-Bridge wrote Fleabag as a one-woman stage show at the Edinburgh Fringe before it became a series.","The character never receives a name in the show — she is only 'Fleabag'."], cat:"Grief"},

  {q:"Happiness is only real when shared.", src:"Into the Wild", year:2007, type:"movie", char:"Christopher McCandless", actors:[{name:"Emile Hirsch",role:"Christopher McCandless"}], desc:"McCandless wrote this in his journal as he was dying alone in Alaska. The thing he had spent years rejecting — connection — turned out to be the whole point. He understood it too late.", trivia:["The real Christopher McCandless died in August 1992, aged 24.","Sean Penn corresponded with McCandless's family for years before they permitted the film."], cat:"Grief"},

  // ── RELATIONSHIPS & CONNECTION ──
  {q:"We accept the love we think we deserve.", src:"The Perks of Being a Wallflower", year:2012, type:"movie", char:"Bill", actors:[{name:"Paul Rudd",role:"Bill"}], desc:"A high school teacher's quiet observation about the relationship between self-worth and who we let in. The whole film builds to the moment the protagonist understands it applies to him.", trivia:["Stephen Chbosky wrote and directed the adaptation of his own novel.","Paul Rudd said this was the line he thought about long after the film ended."], cat:"Relationships"},

  {q:"You had me at hello.", src:"Jerry Maguire", year:1996, type:"movie", char:"Dorothy Boyd", actors:[{name:"Renée Zellweger",role:"Dorothy Boyd"}], desc:"Jerry has prepared a speech. Dorothy doesn't need it. She's not telling him she loves him — she's telling him the decision was already made, the first time she saw who he really was.", trivia:["Cameron Crowe wrote the script partly after a real conversation with his future wife.","Tom Cruise and Renée Zellweger had very little rehearsal — Crowe wanted genuine spontaneity."], cat:"Relationships"},

  {q:"I'm also just a girl, standing in front of a boy, asking him to love her.", src:"Notting Hill", year:1999, type:"movie", char:"Anna Scott", actors:[{name:"Julia Roberts",role:"Anna Scott"}], desc:"A movie star discarding her fame as a credential and making the most basic human appeal. The line works because she's stripping away everything she would normally use to be impressive.", trivia:["Richard Curtis wrote this scene in one sitting and said it was the fastest piece of writing in his career.","Julia Roberts said the line felt nakedly vulnerable — which is exactly why it worked."], cat:"Relationships"},

  {q:"You make me want to be a better man.", src:"As Good as It Gets", year:1997, type:"movie", char:"Melvin Udall", actors:[{name:"Jack Nicholson",role:"Melvin Udall"}], desc:"The most meaningful romantic declaration in comedy — not 'I love you' but 'you've changed what I aim for.' The highest compliment: you make me want more from myself.", trivia:["Jack Nicholson won his third Academy Award for Best Actor for this role.","James L. Brooks said this was the hardest line to write because it had to feel earned."], cat:"Relationships"},

  {q:"A real relationship is two imperfect people refusing to give up on each other.", src:"Grey's Anatomy", year:2005, type:"tv", char:"Meredith Grey", actors:[{name:"Ellen Pompeo",role:"Meredith Grey"}], desc:"The definition strips away romance's mythology — not two perfect people finding each other, but two broken ones choosing to stay.", trivia:["Grey's Anatomy has run for over 19 seasons, making it one of the longest medical dramas in television history.","Shonda Rhimes has said the show was fundamentally about chosen family."], cat:"Relationships"},

  // ── PURPOSE & MEANING ──
  {q:"Why do we fall, sir? So we might learn to pick ourselves up.", src:"Batman Begins", year:2005, type:"movie", char:"Alfred Pennyworth", actors:[{name:"Michael Caine",role:"Alfred Pennyworth"}], desc:"Thomas Wayne's principle, repeated by Alfred to Bruce. The fall isn't the disaster — it's the whole point. Failure is the mechanism of learning if you're willing to treat it that way.", trivia:["Michael Caine said Alfred was the easiest role he ever played because the character's love for Bruce was completely uncomplicated.","The line is repeated in The Dark Knight Rises as a payoff to the trilogy's arc."], cat:"Purpose"},

  {q:"It ain't about how hard you hit. It's about how hard you can get hit and keep moving forward.", src:"Rocky Balboa", year:2006, type:"movie", char:"Rocky Balboa", actors:[{name:"Sylvester Stallone",role:"Rocky Balboa"}], desc:"Stallone wrote this for himself as much as for Rocky — after years of career disappointment. He's talking to his son, but he's processing his own life.", trivia:["The speech was written the night before filming — it wasn't in the original script.","Rocky Balboa was made 16 years after Rocky V, with virtually no studio support."], cat:"Purpose"},

  {q:"I am not in danger, Skyler. I am the danger.", src:"Breaking Bad", year:2012, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"The moment Walter White stops pretending. What's disturbing about it is that it's also the most alive he's ever felt. The question it leaves is whether the life you're living is really yours, or just something that happened to you.", trivia:["Anna Gunn said filming this scene was the most frightened she ever felt on the series.","Bryan Cranston said this was the moment Heisenberg fully replaced Walter White."], cat:"Purpose"},

  {q:"Some men just want to watch the world burn.", src:"The Dark Knight", year:2008, type:"movie", char:"Alfred Pennyworth", actors:[{name:"Michael Caine",role:"Alfred Pennyworth"}], desc:"Alfred explaining why the Joker can't be bargained with — he has no motive, no price, no leverage point. But the line also applies to parts of people. What do you do with the part of yourself that just wants to burn things down?", trivia:["Christopher Nolan and Jonathan Nolan said the Joker was written as an embodiment of pure chaos — not evil with a goal.","Michael Caine based Alfred partly on his own father."], cat:"Purpose"},

  {q:"No more half measures, Walter.", src:"Breaking Bad", year:2010, type:"tv", char:"Mike Ehrmantraut", actors:[{name:"Jonathan Banks",role:"Mike Ehrmantraut"}], desc:"Mike's parable about a domestic abuser — the story of how his attempts at mercy made everything worse. The lesson cuts deeper than crime: half-commitment is its own kind of harm.", trivia:["Jonathan Banks said this monologue defined Mike more than any other scene.","The speech was filmed in a single take at Banks's insistence."], cat:"Purpose"},

  // ── CHOICES & CONSEQUENCES ──
  {q:"It is our choices, Harry, that show what we truly are, far more than our abilities.", src:"Harry Potter and the Chamber of Secrets", year:2002, type:"movie", char:"Albus Dumbledore", actors:[{name:"Richard Harris",role:"Albus Dumbledore"}], desc:"Dumbledore's answer to Harry's fear that the Sorting Hat considered putting him in Slytherin. Abilities are given. Choices are made. The distinction is everything.", trivia:["J.K. Rowling has said this is the line she is most proud of writing.","The theme — character through choice rather than destiny — is the spine of all seven books."], cat:"Choices"},

  {q:"You either die a hero or you live long enough to see yourself become the villain.", src:"The Dark Knight", year:2008, type:"movie", char:"Harvey Dent", actors:[{name:"Aaron Eckhart",role:"Harvey Dent"}], desc:"Dent says it about Batman, not knowing it's about himself. A prophecy about moral compromise — the ways in which good intentions, pursued long enough without reflection, become their opposite.", trivia:["Aaron Eckhart spent months studying the psychology of optimistic leaders who become corrupted.","The line was voted by fans as the greatest in superhero cinema."], cat:"Choices"},

  {q:"Every passing minute is another chance to turn it all around.", src:"Vanilla Sky", year:2001, type:"movie", char:"Sofia Serrano", actors:[{name:"Penélope Cruz",role:"Sofia Serrano"}], desc:"Time reframed not as diminishing resource but as continuous opportunity. The most generous way to think about where you are right now.", trivia:["Penélope Cruz played the same role in both Vanilla Sky and its Spanish-language original Abre los ojos.","Cameron Crowe said this was the line he was most proud of writing in his career."], cat:"Choices"},

  {q:"Your scientists were so preoccupied with whether or not they could, they didn't stop to think if they should.", src:"Jurassic Park", year:1993, type:"movie", char:"Dr. Ian Malcolm", actors:[{name:"Jeff Goldblum",role:"Dr. Ian Malcolm"}], desc:"The film's moral in one sentence. Applies to genetic engineering, AI, social media, nuclear weapons — anything built without ethical framework. Also applies to individual choices: just because you can doesn't mean you should.", trivia:["Jeff Goldblum largely improvised the pacing of this speech.","Steven Spielberg said this was the reason he made the film."], cat:"Choices"},

  // ── SELF-KNOWLEDGE & GROWTH ──
  {q:"I have a competition in me. I want no one else to succeed. I hate most people.", src:"There Will Be Blood", year:2007, type:"movie", char:"Daniel Plainview", actors:[{name:"Daniel Day-Lewis",role:"Daniel Plainview"}], desc:"The most honest thing Plainview says in the entire film — and he says it to a man he's about to betray. Most people have felt some version of this and never admitted it. What do you do with the parts of yourself that aren't admirable?", trivia:["Day-Lewis won his second Academy Award for Best Actor for this performance.","Paul Thomas Anderson wrote the script specifically for Day-Lewis after sending him a handwritten letter."], cat:"Self-Knowledge"},

  {q:"There are no two words in the English language more harmful than 'good job.'", src:"Whiplash", year:2014, type:"movie", char:"Terence Fletcher", actors:[{name:"J.K. Simmons",role:"Terence Fletcher"}], desc:"Fletcher's philosophy of excellence — that comfort kills potential. He's a monster who produces greatness. The film forces the question: what standard are you applying to yourself, and is it the right one?", trivia:["J.K. Simmons won the Academy Award for Best Supporting Actor.","Director Damien Chazelle based the film on his own experience in a brutal high school jazz program."], cat:"Self-Knowledge"},

  {q:"The next Charlie Parker would never be discouraged. That's what I'm trying to do. I'm trying to push people beyond what's expected of them.", src:"Whiplash", year:2014, type:"movie", char:"Terence Fletcher", actors:[{name:"J.K. Simmons",role:"Terence Fletcher"}], desc:"Fletcher's rationalisation. The film never fully disproves it — which is what makes it disturbing. Where is the line between the pressure that reveals you and the cruelty that breaks you?", trivia:["Chazelle deliberately left the ending ambiguous — Andrew's final performance could be triumph or capitulation.","The film was shot in 19 days on a $3.3 million budget."], cat:"Self-Knowledge"},

  {q:"I'm a part of the filth, part of the cycle. As long as I'm in here, it ain't over.", src:"Good Will Hunting", year:1997, type:"movie", char:"Will Hunting", actors:[{name:"Matt Damon",role:"Will Hunting"}], desc:"Will acknowledging that the environment that shaped him is also the thing he keeps choosing. The hardest self-knowledge: you are participating in your own damage.", trivia:["Matt Damon wrote the original script as a Harvard thesis assignment.","Ben Affleck has said the hardest scene to write was the one where Will finally admits what happened to him."], cat:"Self-Knowledge"},

  {q:"I'm not the hero type, clearly. With this laundry list of character defects, all the mistakes I've made.", src:"Iron Man", year:2008, type:"movie", char:"Tony Stark", actors:[{name:"Robert Downey Jr.",role:"Tony Stark"}], desc:"Tony's self-awareness without self-pity. He knows exactly what he is. The extraordinary thing about the character is that clarity about your flaws and commitment to change can coexist.", trivia:["Robert Downey Jr. improvised approximately 70% of Tony Stark's dialogue across the MCU.","The film launched the Marvel Cinematic Universe — the highest-grossing franchise in history."], cat:"Self-Knowledge"},

  // ── MORTALITY & LEGACY ──
  {q:"Remember who you are.", src:"The Lion King", year:1994, type:"movie", char:"Mufasa (Ghost)", actors:[{name:"James Earl Jones",role:"Mufasa"}], desc:"A father's voice from beyond death. The film is for children. The line is for adults — everyone who has drifted so far from their values that they need reminding of the person they were before everything got complicated.", trivia:["James Earl Jones and Jeremy Irons were cast specifically because their voices represented opposite ends of the moral spectrum.","The wildebeest stampede took three years to create and required entirely new rendering software."], cat:"Mortality"},

  {q:"Part of the journey is the end.", src:"Avengers: Endgame", year:2019, type:"movie", char:"Tony Stark", actors:[{name:"Robert Downey Jr.",role:"Tony Stark"}], desc:"Tony's final recorded message to his daughter, to be played if he doesn't come back. A man who spent his entire arc refusing to accept limits, finally making peace with the one limit that matters.", trivia:["Robert Downey Jr. improvised 'I am Iron Man' in the final battle — the writers had not planned those words.","Endgame is the second highest-grossing film of all time."], cat:"Mortality"},

  {q:"When you have children, you always have family. They will always be your priority, your responsibility. And a man provides. He does it even when he's not appreciated, or respected, or even loved.", src:"The Sopranos", year:2004, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"A murderer articulating the truth about fatherhood — clearly, without sentiment. The Sopranos specialised in having its monster say things that were simply true. This is one of them.", trivia:["James Gandolfini won three Emmy Awards for his portrayal of Tony Soprano.","David Chase has said Tony Soprano was partly inspired by his own relationship with his mother."], cat:"Mortality"},

  {q:"More is lost by indecision than wrong decision.", src:"The Sopranos", year:2000, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"Tony's operational philosophy — paralysis is the only true failure. It's sound advice delivered by a terrible man. The Sopranos made you nod along with the monster, which was the whole point.", trivia:["James Gandolfini improvised many of Tony's more philosophical moments in consultation with the writers.","The Sopranos changed the economic model of prestige television."], cat:"Purpose"},

  {q:"A wrong decision is better than indecision.", src:"The Sopranos", year:2002, type:"tv", char:"Tony Soprano", actors:[{name:"James Gandolfini",role:"Tony Soprano"}], desc:"The other side of Tony's leadership philosophy. He's monstrous, but this particular idea holds up: the cost of never deciding is often higher than the cost of deciding badly.", trivia:["The Sopranos ran for 86 episodes — David Chase said it was exactly the right length.","James Gandolfini was reportedly offered the role after a single meeting with David Chase in a New York restaurant."], cat:"Purpose"},

  // ── THE WIRE ──
  {q:"A man's gotta have a code.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's ethics are rigid even within moral chaos. He doesn't rob civilians, doesn't harm innocents. His code is more consistent than most of the legitimate characters around him. What's yours?", trivia:["David Simon based Omar loosely on a real-life Baltimore stick-up artist named Donnie Andrews.","Michael K. Williams died in September 2021. David Simon called him the most important actor in the history of the show."], cat:"Identity"},

  {q:"You come at the king, you best not miss.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's warning — escalation without decisive commitment is fatal. He's right. It's also a statement about half-measures: if you're going to do something, do it completely. Including the things you're afraid of.", trivia:["Barack Obama cited Omar Little as his favourite television character.","The Wire was famously ignored by awards shows but is now widely considered the greatest TV drama ever made."], cat:"Courage"},

  {q:"The wire always got to be there.", src:"The Wire", year:2004, type:"tv", char:"Clay Davis", actors:[{name:"Isiah Whitlock Jr.",role:"Clay Davis"}], desc:"A corrupt politician on the permanence of surveillance and accountability. The line's meaning has expanded: the record exists. What you say and do leaves a trace.", trivia:["Isiah Whitlock Jr. improvised most of Clay Davis's distinctive vocal delivery.","David Simon spent a year embedded with the Baltimore Police Department before writing the first season."], cat:"Truth"},

  {q:"We used to make shit in this country. Build shit. Now we just put our hand in the next guy's pocket.", src:"The Wire", year:2004, type:"tv", char:"Frank Sobotka", actors:[{name:"Chris Bauer",role:"Frank Sobotka"}], desc:"Season 2's thesis on deindustrialisation — and on a broader moral decline in which production has been replaced by extraction. Twenty years later it reads as prophecy.", trivia:["Season 2 of The Wire is widely considered the most criminally underrated television season ever made.","David Simon based the dockworkers' story on a real Baltimore port community he had covered as a journalist."], cat:"Truth"},

  // ── SUCCESSION ──
  {q:"You are not serious people.", src:"Succession", year:2021, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan's nuclear verdict on his own children's bid to inherit his empire. The cruelty is that he might be right. The question it leaves: in the areas that matter most to you, are you serious?", trivia:["Brian Cox improvised 'You are not serious people' on the second take — it was not in the script.","Succession won the Emmy for Outstanding Drama Series in all four of its eligible seasons."], cat:"Identity"},

  {q:"I love you but you are not serious people.", src:"Succession", year:2021, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"The 'I love you' makes it worse, not better. Logan Roy's love has always been conditional and weaponised. The line captures every parent who confused disappointment with honesty.", trivia:["Jesse Armstrong wrote all four seasons before filming began — an unusual approach in American television.","The scene was filmed in a single take."], cat:"Relationships"},

  {q:"I'm not going to get hurt. I don't get hurt.", src:"Succession", year:2018, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan's operating principle — the decision, made in childhood, that vulnerability wasn't an option. It explains every relationship in his life and everything he destroyed.", trivia:["Brian Cox said Logan was the most exhausting role of his career because the character never once relaxes.","Jesse Armstrong modelled Logan Roy partly on Rupert Murdoch and Robert Maxwell."], cat:"Identity"},

  // ── GOOD WILL HUNTING / HUMAN CONNECTION ──
  {q:"Real loss is only possible when you love something more than you love yourself.", src:"Good Will Hunting", year:1997, type:"movie", char:"Sean Maguire", actors:[{name:"Robin Williams",role:"Sean Maguire"}], desc:"Sean explaining what grief costs. Will can read about loss and intellectualise it. He doesn't understand it because he has never let himself love that much. The line is a diagnosis of a defence mechanism.", trivia:["Robin Williams ad-libbed the story about his wife's flatulence — it was completely genuine and broke Matt Damon completely.","The film's title refers to the idea that Will has a gift he's squandering."], cat:"Grief"},

  // ── PARASITE ──
  {q:"You know what kind of plan never fails? No plan at all. No plan. You know why? If you make a plan, life never works out that way.", src:"Parasite", year:2019, type:"movie", char:"Ki-woo Kim", actors:[{name:"Choi Woo-shik",role:"Ki-woo Kim"}], desc:"The film's central irony — a family that plans meticulously is destroyed by what no plan could anticipate. Bong Joon-ho's thesis on class and fate: the future is equally available to everyone and none of us controls it.", trivia:["Parasite was the first non-English language film to win the Academy Award for Best Picture.","Bong Joon-ho spent two years designing the script's architecture — every object carries symbolic weight."], cat:"Choices"},

  // ── SHAWSHANK / HOPE ──
  {q:"The world will ask you who you are, and if you do not know, the world will tell you.", src:"The Shawshank Redemption", year:1994, type:"movie", char:"Andy Dufresne", actors:[{name:"Tim Robbins",role:"Andy Dufresne"}], desc:"The quiet terror of identity. Define yourself or be defined. Andy speaks this from the lowest point of his life — imprisoned unjustly — and still sees clearly enough to say it.", trivia:["The film received seven Academy Award nominations and won none.","Red's final monologue was the hardest scene for director Frank Darabont to write — he rewrote it more than twenty times."], cat:"Identity"},

  // ── FLEABAG ──
  {q:"Hair is everything. We wish it wasn't so we could actually think about something else occasionally, but it is.", src:"Fleabag", year:2019, type:"tv", char:"Fleabag", actors:[{name:"Phoebe Waller-Bridge",role:"Fleabag"}], desc:"The comedy of vanity — that we still care about superficial things when our lives are falling apart. The fact that we do doesn't make us shallow. It makes us human, which is sometimes worse.", trivia:["Phoebe Waller-Bridge wrote Fleabag as a one-woman stage show at the Edinburgh Fringe in 2013.","The series won six Emmy Awards including Outstanding Comedy, Lead Actress, Writing and Directing."], cat:"Self-Knowledge"},

  // ── TRUE DETECTIVE ──
  {q:"Time is a flat circle. Everything we have ever done or will do, we will do over and over again.", src:"True Detective", year:2014, type:"tv", char:"Rust Cohle", actors:[{name:"Matthew McConaughey",role:"Rust Cohle"}], desc:"Cohle's nihilist cosmology — delivered drunk in an interrogation room. Whether or not it's philosophically correct, the question it raises is real: how many of your patterns are you just going to keep repeating?", trivia:["The line references Nietzsche's concept of eternal recurrence.","Matthew McConaughey won the Academy Award for Best Actor (Dallas Buyers Club) the same year True Detective aired."], cat:"Identity"},

  {q:"There are only two ways I can see this ending, and one of them involves me rolling you up in that carpet.", src:"True Detective", year:2014, type:"tv", char:"Rust Cohle", actors:[{name:"Matthew McConaughey",role:"Rust Cohle"}], desc:"Cohle's menace delivered absolutely without raising his voice. The line demonstrates that the most frightening authority is the kind that never needs to perform itself.", trivia:["Matthew McConaughey and Woody Harrelson spent weeks together before filming to build genuine chemistry.","Nic Pizzolatto wrote the entire first season alone in a cabin in Los Angeles."], cat:"Truth"},

  // ── AMERICAN BEAUTY ──
  {q:"It's a great thing when you realise you still have the ability to surprise yourself.", src:"American Beauty", year:1999, type:"movie", char:"Lester Burnham", actors:[{name:"Kevin Spacey",role:"Lester Burnham"}], desc:"Lester's late-life awakening — not wisdom exactly, but a spark of self-reclamation in a life of quiet deadness. The sadness and the hope are simultaneous.", trivia:["Kevin Spacey won the Academy Award for Best Actor.","Sam Mendes said the film was about the difference between living and merely existing."], cat:"Purpose"},

  {q:"I guess I could be pretty pissed off about what happened to me, but it's hard to stay mad when there's so much beauty in the world.", src:"American Beauty", year:1999, type:"movie", char:"Lester Burnham", actors:[{name:"Kevin Spacey",role:"Lester Burnham"}], desc:"Lester's final voiceover — dead, looking back on what he almost missed. The gratitude comes too late in the film. The question is whether you wait that long too.", trivia:["Alan Ball wrote the screenplay after a traumatic period in his own life.","Sam Mendes shot the plastic bag scene with CGI after failing to capture it practically."], cat:"Mortality"},

  // ── MOONLIGHT / IDENTITY ──
  {q:"I've been running my whole life, Chiron.", src:"Moonlight", year:2016, type:"movie", char:"Kevin", actors:[{name:"André Holland",role:"Kevin"}], desc:"Kevin's confession to Chiron as they reconnect as adults. Most of us are running from something — the question is whether you can see it clearly enough to stop.", trivia:["Barry Jenkins said Kevin's arc was as important as Chiron's — both men are imprisoned by performance.","The film was shot in Miami over 25 days."], cat:"Identity"},

  // ── SCHINDLER'S LIST / SACRIFICE ──
  {q:"He who saves a single soul, it is as if he has saved an entire world.", src:"Schindler's List", year:1993, type:"movie", char:"Itzhak Stern", actors:[{name:"Ben Kingsley",role:"Itzhak Stern"}], desc:"The Talmudic inscription on the ring the Schindlerjuden give Oskar Schindler. One life — expanded. The weight of individual action stated in its fullest dimension.", trivia:["The ring in the film was made from a real gold tooth donated by one of the Schindler survivors.","Steven Spielberg donated his entire director's salary to the USC Shoah Foundation."], cat:"Purpose"},

  // ── NETWORK / TRUTH ──
  {q:"I'm not going to leave you alone. I want you to get mad. I want you to say: I'm a human being, goddammit! My life has value!", src:"Network", year:1976, type:"movie", char:"Howard Beale", actors:[{name:"Peter Finch",role:"Howard Beale"}], desc:"Beale's call to action — not political, not ideological, just a demand for basic human dignity. The rage isn't the problem. The passivity that preceded it is.", trivia:["Paddy Chayefsky's script predicted 24-hour news, reality TV, and outrage media thirty years before they existed.","Peter Finch died before the film's release — he became the first posthumous Academy Award winner."], cat:"Courage"},

  // ── BLADE RUNNER / CONSCIOUSNESS ──
  {q:"More human than human.", src:"Blade Runner", year:1982, type:"movie", char:"Eldon Tyrell", actors:[{name:"Joe Turkel",role:"Eldon Tyrell"}], desc:"The Tyrell Corporation's motto — and the film's thesis. Roy Batty is more alive than almost anyone around him. The question of what makes someone human turns out to be uncomfortably open.", trivia:["Philip K. Dick, who wrote the source novel, saw an early cut and said it captured his vision completely.","Ridley Scott has never confirmed whether Deckard is a replicant — he considers it answered, and leaves you to decide."], cat:"Identity"},

  // ── DEAD POETS ──
  {q:"Oh captain, my captain.", src:"Dead Poets Society", year:1989, type:"movie", char:"Todd Anderson", actors:[{name:"Ethan Hawke",role:"Todd Anderson"}], desc:"Borrowed from Walt Whitman's elegy for Lincoln. The boys standing on desks — a final act of solidarity against an institution that has just destroyed someone who mattered to them. The choice to stand up, even when it costs you.", trivia:["Ethan Hawke said the scene was filmed with genuine emotion — Robin Williams' eyes filled with tears that weren't scripted.","The Walt Whitman poem was written in 1865 after Lincoln's assassination."], cat:"Courage"},

  {q:"We don't read and write poetry because it's cute. We read and write poetry because we are members of the human race.", src:"Dead Poets Society", year:1989, type:"movie", char:"John Keating", actors:[{name:"Robin Williams",role:"John Keating"}], desc:"Keating's argument for the humanities — not as decoration but as the mechanism by which we understand being alive. The arts aren't a luxury. They're how we know what we feel.", trivia:["Robin Williams spent time with real English teachers preparing for the role.","Peter Weir said the film was really about the question of who gives you permission to be yourself."], cat:"Purpose"},

  // ── FIGHT CLUB / SELF ──
  {q:"We're a generation of men raised by women. I'm wondering if another woman is really the answer we need.", src:"Fight Club", year:1999, type:"movie", char:"Tyler Durden", actors:[{name:"Brad Pitt",role:"Tyler Durden"}], desc:"Tyler's provocation — arguably wrong, but pointing at something real: the search for identity in a culture that has given young people very few templates for who to be.", trivia:["Chuck Palahniuk has said the novel was his attempt to process his own generation's confusion about masculinity and purpose.","David Fincher said the film was never meant to be taken as an instruction manual."], cat:"Identity"},

  // ── BATMAN / DARK KNIGHT ──
  {q:"The night is darkest just before the dawn. And I promise you, the dawn is coming.", src:"The Dark Knight", year:2008, type:"movie", char:"Harvey Dent", actors:[{name:"Aaron Eckhart",role:"Harvey Dent"}], desc:"Said by a man who is about to become Two-Face — the great hope of Gotham City in the process of breaking. The irony doesn't invalidate the sentiment. Sometimes the person who says the true thing is the one destroyed by the cost of it.", trivia:["Christopher Nolan shot the Harvey Dent arc as a deliberate parallel to idealistic politicians.","Aaron Eckhart said the most challenging part was making Dent's goodness feel real before his collapse."], cat:"Courage"},

  // ── FORREST GUMP / SIMPLICITY ──
  {q:"My mama always said, 'Life is like a box of chocolates. You never know what you're gonna get.'", src:"Forrest Gump", year:1994, type:"movie", char:"Forrest Gump", actors:[{name:"Tom Hanks",role:"Forrest Gump"}], desc:"Simple wisdom from a simple man — but the simplicity is the point. The most honest relationship with uncertainty isn't strategic planning. It's curiosity.", trivia:["Tom Hanks was not the first choice — Bill Murray, John Travolta and Chevy Chase all passed.","The film won six Academy Awards including Best Picture and Best Actor."], cat:"Choices"},

  // ── INTO THE WILD / SOLITUDE ──
  {q:"Two years he walks the earth. No phone, no pool, no pets, no cigarettes. Ultimate freedom.", src:"Into the Wild", year:2007, type:"movie", char:"Christopher McCandless", actors:[{name:"Emile Hirsch",role:"Christopher McCandless"}], desc:"The film's voiceover describing McCandless's abandonment of conventional life. The tragedy that follows complicates the romance of it — but the longing it describes is real.", trivia:["The real McCandless's story was first told in Jon Krakauer's 1996 book.","Sean Penn said the film was about the gap between the freedom we imagine and the freedom we can actually survive."], cat:"Freedom"},

  // ── CHERNOBYL / CONSEQUENCES ──
  {q:"You'll do it because it must be done. That is all.", src:"Chernobyl", year:2019, type:"tv", char:"Boris Shcherbina", actors:[{name:"Stellan Skarsgård",role:"Boris Shcherbina"}], desc:"A Soviet bureaucrat who transforms across the miniseries into a man of conscience. This line is his pivot — he has stopped calculating personal cost and started doing what the situation demands.", trivia:["Stellan Skarsgård won the Emmy for Outstanding Supporting Actor in a Limited Series.","The character of Shcherbina was based on a real Soviet Deputy Prime Minister who directed the clean-up effort."], cat:"Courage"},

  // ── MISC PROFOUND ──
  {q:"There are more things in heaven and earth, Horatio, than are dreamt of in your philosophy.", src:"Hamlet", year:1996, type:"movie", char:"Hamlet", actors:[{name:"Kenneth Branagh",role:"Hamlet"}], desc:"Shakespeare's core insight — the rational mind has limits. Four centuries later it remains the most important thing to remember about certainty.", trivia:["Kenneth Branagh's 1996 adaptation is the only complete unabridged film version of Hamlet, running four hours.","The line is often misquoted — the original reads 'your philosophy', not 'our philosophy'."], cat:"Truth"},

  {q:"To be, or not to be, that is the question.", src:"Hamlet", year:1996, type:"movie", char:"Hamlet", actors:[{name:"Kenneth Branagh",role:"Hamlet"}], desc:"The most famous line in English literature — and genuinely the hardest question. Not about suicide specifically, but about the active choice to exist, to engage, to endure. Every day is an answer to it.", trivia:["The soliloquy has generated more academic papers than any other passage in English literature.","Kenneth Branagh filmed the speech in a single unbroken take."], cat:"Mortality"},

  {q:"Don't dream it. Be it.", src:"The Rocky Horror Picture Show", year:1975, type:"movie", char:"Dr. Frank-N-Furter", actors:[{name:"Tim Curry",role:"Dr. Frank-N-Furter"}], desc:"Frank-N-Furter's manifesto. The transposition of dreaming and being is the whole film's philosophy — there is no virtue in the aspiration that never acts.", trivia:["Rocky Horror ran for one week on its initial US release before being pulled. Its midnight screening revival began in 1976 and never stopped.","Tim Curry said Frank-N-Furter was the most liberating and terrifying role of his career simultaneously."], cat:"Freedom"},

  {q:"I don't want to survive. I want to live.", src:"12 Years a Slave", year:2013, type:"movie", char:"Solomon Northup", actors:[{name:"Chiwetel Ejiofor",role:"Solomon Northup"}], desc:"The distinction between mere biological endurance and a life worth living. Northup refuses to let enslavement reduce him to bare existence. The same question is available to people who aren't enslaved.", trivia:["The film is based on Solomon Northup's 1853 memoir — one of the most important abolitionist texts in American history.","Chiwetel Ejiofor won the BAFTA for Best Actor. The film won the Academy Award for Best Picture."], cat:"Freedom"},

  {q:"Fear is the path to the dark side. Fear leads to anger, anger leads to hate, hate leads to suffering.", src:"The Phantom Menace", year:1999, type:"movie", char:"Yoda", actors:[{name:"Frank Oz",role:"Yoda (voice)"}], desc:"Yoda diagnosing Anakin's future in one chain of causation. As a map of how fear metastasises into destruction — within a person, within a family, within a society — it's accurate.", trivia:["George Lucas cited Buddhist philosophy as the primary inspiration for Yoda's teachings.","The prequel trilogy's fundamental story is about how fear of loss creates the thing you were afraid of."], cat:"Self-Knowledge"},

  {q:"Oh, yes, the past can hurt. But the way I see it, you can either run from it or learn from it.", src:"The Lion King", year:1994, type:"movie", char:"Rafiki", actors:[{name:"Robert Guillaume",role:"Rafiki (voice)"}], desc:"Rafiki says it after hitting Simba on the head. The physical experience of the past — it hurts, it already happened, and the only question is what you do with it.", trivia:["The Lion King is loosely based on Shakespeare's Hamlet — Disney has never officially confirmed this.","Robert Guillaume improvised much of Rafiki's accent and delivery."], cat:"Identity"},

  {q:"Change is nature, Dad. The part that we can influence. And it starts when we decide.", src:"Ratatouille", year:2007, type:"movie", char:"Remy", actors:[{name:"Patton Oswalt",role:"Remy (voice)"}], desc:"A rat arguing with his father about possibility and agency. The logic is sound: you can't change everything, but you can change your part. And the change starts with a decision, not a plan.", trivia:["Brad Bird spent two years developing the story before a single scene was animated.","Ratatouille won the Academy Award for Best Animated Feature."], cat:"Choices"},

  {q:"Life is not the amount of breaths you take. It's the moments that take your breath away.", src:"Hitch", year:2005, type:"movie", char:"Alex 'Hitch' Hitchens", actors:[{name:"Will Smith",role:"Hitch"}], desc:"Repackaged wisdom, but the distinction holds — duration and depth are different measures of a life. We default to the one that's easier to count.", trivia:["Will Smith said this was the line he thought about most long after the film.","Hitch grossed $368 million worldwide on a $70 million budget."], cat:"Mortality"},

  {q:"If you're good at something, never do it for free.", src:"The Dark Knight", year:2008, type:"movie", char:"The Joker", actors:[{name:"Heath Ledger",role:"The Joker"}], desc:"Said while burning his half of the mob's money. The Joker doesn't want money — so the advice is pure philosophy, not greed. The line surfaces an uncomfortable question about how you value what you're good at.", trivia:["Heath Ledger's Joker is consistently ranked the greatest villain performance in cinema history.","Christopher Nolan wrote the Joker with no plan — the character was intentionally unknowable even to himself."], cat:"Purpose"},

  {q:"Just when I thought I was out, they pull me back in.", src:"The Godfather Part III", year:1990, type:"movie", char:"Michael Corleone", actors:[{name:"Al Pacino",role:"Michael Corleone"}], desc:"Michael attempting legitimacy and finding the criminal world won't release him. The prison is the name itself — and the decisions he made that can't be undone. What are you trying to leave that keeps pulling you back?", trivia:["Al Pacino and Francis Ford Coppola both considered this the most emotionally difficult Corleone scene.","The line has been parodied so extensively it has almost become its own cultural object."], cat:"Identity"},

  {q:"Keep your friends close, but your enemies closer.", src:"The Godfather Part II", year:1974, type:"movie", char:"Michael Corleone", actors:[{name:"Al Pacino",role:"Michael Corleone"}], desc:"Often misattributed to Sun Tzu — it appears in no classical text. It's pure Corleone: the ethics of a man who has stopped trusting anyone, including himself. Useful advice, disturbing source.", trivia:["The line was added by Coppola and Puzo — it doesn't appear in the original novel.","Al Pacino was not nominated for an Academy Award for the role — widely considered one of the great oversights in Oscar history."], cat:"Choices"},

  {q:"What would you attempt if you knew you could not fail?", src:"We Bought a Zoo", year:2011, type:"movie", char:"Benjamin Mee", actors:[{name:"Matt Damon",role:"Benjamin Mee"}], desc:"A question designed to reveal what you actually want, underneath the risk calculations. Most people's failure to pursue what matters isn't about resources. It's about fear of the attempt.", trivia:["The film is based on the real Benjamin Mee's 2008 memoir.","Cameron Crowe said the line was the reason he made the film."], cat:"Courage"},

  {q:"You have to believe me. I am not the man I was.", src:"A Christmas Carol (various adaptations)", year:1984, type:"movie", char:"Ebenezer Scrooge", actors:[{name:"George C. Scott",role:"Ebenezer Scrooge"}], desc:"Scrooge's complete transformation — not a plan, not a resolution, but an identity statement. He has been changed by seeing himself clearly. The hardest and most necessary thing.", trivia:["Dickens published A Christmas Carol in 1843. It sold out its first edition of 6,000 copies in five days.","The story has been adapted for screen over 135 times — more than any other Christmas story."], cat:"Identity"},

  {q:"It's a funny thing about mothers and fathers. Even when their own child is the most disgusting little blister you could ever imagine, they still think that he or she is wonderful.", src:"Matilda", year:1996, type:"movie", char:"Miss Honey", actors:[{name:"Embeth Davidtz",role:"Miss Honey"}], desc:"Miss Honey on parental love and its catastrophic absence in Matilda's case. The observation is darkly funny and genuinely heartbreaking — for everyone who had that love and everyone who didn't.", trivia:["Mara Wilson, who played Matilda, lost her mother to breast cancer during filming.","Danny DeVito directed and produced the film while playing Mr. Wormwood."], cat:"Relationships"},

  {q:"Ohana means family. Family means nobody gets left behind or forgotten.", src:"Lilo & Stitch", year:2002, type:"movie", char:"Lilo", actors:[{name:"Daveigh Chase",role:"Lilo (voice)"}], desc:"A little girl and a dangerous alien discovering what family means — not blood, but the commitment not to abandon each other. The simplest and most honest definition.", trivia:["The film was almost entirely produced in the Florida studio — away from the main California production.","The relationship between Lilo and her sister Nani was praised as the most realistic sibling bond in animation."], cat:"Relationships"},

  {q:"With the right kind of eyes you can almost see the high-water mark — that place where the wave finally broke and rolled back.", src:"Fear and Loathing in Las Vegas", year:1998, type:"movie", char:"Raoul Duke", actors:[{name:"Johnny Depp",role:"Raoul Duke"}], desc:"Hunter S. Thompson's elegy for the 1960s — the moment idealism peaked before corporate reality absorbed it. The image of a wave that comes and goes is also a description of every golden period in your life.", trivia:["Johnny Depp spent months with the real Hunter S. Thompson preparing for the role.","Thompson called the film the only accurate adaptation of his work."], cat:"Mortality"},

  {q:"Certifiably, ridiculously, inconveniently in love with you.", src:"Crazy, Stupid, Love", year:2011, type:"movie", char:"Jacob Palmer", actors:[{name:"Ryan Gosling",role:"Jacob Palmer"}], desc:"The seducer laid completely bare — reduced to honesty by someone he didn't expect. Love described not as a feeling but as a condition: inconvenient, certain, unavoidable.", trivia:["Ryan Gosling and Emma Stone improvised their first scene together.","The film's twist — that Jacob is dating Hannah, who is Cal's daughter — was kept secret from the cast until filming."], cat:"Relationships"},

  {q:"You need to stop focusing on the darkness behind you. The past is the past. Nothing can change what we've done.", src:"Breaking Bad", year:2013, type:"tv", char:"Walter White", actors:[{name:"Bryan Cranston",role:"Walter White"}], desc:"Walt saying the right thing to Jesse at the worst possible moment. The line is correct. Coming from Walt, it's self-serving. The truth is still the truth.", trivia:["Vince Gilligan said the final season was about whether redemption was possible for Walt — and he deliberately left it ambiguous.","Bryan Cranston won four Emmy Awards for his portrayal."], cat:"Regret"},

  {q:"Why should we do anything more than once? Should I just smoke this one cigarette? Maybe we should only have sex once if it's the same thing? Should we just watch one sunset? Or live just one day? Because it's new every time.", src:"Breaking Bad", year:2010, type:"tv", char:"Jane Margolis", actors:[{name:"Krysten Ritter",role:"Jane Margolis"}], desc:"Jane's philosophy of repetition and novelty — each experience is genuinely new even if you've had it before. It's a beautiful idea from a character in the process of destroying herself with it.", trivia:["Krysten Ritter said Jane was the most complicated character she has ever played.","Jane's death scene was the moment that many viewers describe as the show permanently changing its register."], cat:"Mortality"},

  {q:"It does not do to dwell on dreams and forget to live.", src:"Harry Potter and the Philosopher's Stone", year:2001, type:"movie", char:"Albus Dumbledore", actors:[{name:"Richard Harris",role:"Albus Dumbledore"}], desc:"Dumbledore pulling Harry away from the Mirror of Erised — a mirror that shows you only what you most desire, and will drive you mad. The warning against nostalgia and longing at the expense of the present.", trivia:["J.K. Rowling based the Mirror of Erised on her own experience of grief after her mother's death.","Richard Harris was initially reluctant to take the role but accepted after his granddaughter threatened to never speak to him."], cat:"Mortality"},

  {q:"We are only as strong as we are united, as weak as we are divided.", src:"Harry Potter and the Goblet of Fire", year:2005, type:"movie", char:"Albus Dumbledore", actors:[{name:"Michael Gambon",role:"Albus Dumbledore"}], desc:"Dumbledore's end-of-year speech after Cedric Diggory's death — made to children, at a moment of real darkness. The principle survives being obvious because it's true.", trivia:["Michael Gambon said delivering the serious speeches was the most demanding aspect of the role.","The line is quoted in schools, military academies, and political speeches around the world."], cat:"Relationships"},

  {q:"I see you.", src:"Avatar", year:2009, type:"movie", char:"Neytiri", actors:[{name:"Zoe Saldana",role:"Neytiri"}], desc:"The Na'vi phrase for the deepest recognition — to see someone's soul, not just their face. English has no equivalent. The film invented a language to describe something we apparently don't have a word for.", trivia:["James Cameron developed the Na'vi language with linguist Paul Frommer, creating over a thousand words.","Avatar became the highest-grossing film of all time — twice."], cat:"Relationships"},

  // ── NO COUNTRY FOR OLD MEN ──
  {q:"You can't stop what's coming. It ain't all waiting on you. That's vanity.", src:"No Country for Old Men", year:2007, type:"movie", char:"Ellis", actors:[{name:"Barry Corbin",role:"Ellis"}], desc:"An old man telling a sheriff that his sense of responsibility for evil is itself a form of arrogance. The world doesn't hinge on any single person. The hardest pill: some things are beyond you and always were.", trivia:["The Coen Brothers adapted Cormac McCarthy's novel almost word for word.","Tommy Lee Jones said this scene was the most difficult to film because the emotion had to be completely suppressed."], cat:"Mortality"},

  {q:"What's the most you ever lost on a coin toss?", src:"No Country for Old Men", year:2007, type:"movie", char:"Anton Chigurh", actors:[{name:"Javier Bardem",role:"Anton Chigurh"}], desc:"Chigurh reduces a man's life to a coin flip — and the man doesn't understand what he's being asked. The terrifying implication: we are all in that gas station, not realising the stakes.", trivia:["Javier Bardem won the Academy Award for Best Supporting Actor.","Bardem has said Chigurh is the role he is asked about most and thinks about least."], cat:"Choices"},

  {q:"If the rule you followed brought you to this, of what use was the rule?", src:"No Country for Old Men", year:2007, type:"movie", char:"Anton Chigurh", actors:[{name:"Javier Bardem",role:"Anton Chigurh"}], desc:"Chigurh's inversion of moral logic — if your principles led you here, perhaps the principles were wrong. It's a villain's argument, but it deserves to be sat with.", trivia:["Cormac McCarthy said Chigurh represents a force that has always existed — not evil but pure indifferent consequence.","The film won four Academy Awards including Best Picture."], cat:"Truth"},

  // ── ARRIVAL ──
  {q:"If you could see your whole life from start to finish, would you change things?", src:"Arrival", year:2016, type:"movie", char:"Louise Banks", actors:[{name:"Amy Adams",role:"Louise Banks"}], desc:"The film's central question — delivered by a woman who already knows the answer. Knowing the pain doesn't change her choice. What does that tell you about what you actually value?", trivia:["Amy Adams learned the basics of linguistics for the role, consulting with real language researchers.","Denis Villeneuve said the film was really about grief and whether love is worth the cost."], cat:"Choices"},

  {q:"Language is the foundation of civilization. It is the glue that holds a people together. It is the first weapon drawn in a conflict.", src:"Arrival", year:2016, type:"movie", char:"Colonel Weber", actors:[{name:"Forest Whitaker",role:"Colonel Weber"}], desc:"The film's thesis before the real thesis emerges. What we say and how we say it shapes what we can think. The Sapir-Whorf hypothesis dressed as military briefing.", trivia:["The film is based on Ted Chiang's short story Story of Your Life.","The circular writing system was developed by an actual designer — it has its own internal grammar."], cat:"Truth"},

  // ── HER ──
  {q:"The heart is not like a box that gets filled up. It expands in size the more you love.", src:"Her", year:2013, type:"movie", char:"Amy", actors:[{name:"Amy Adams",role:"Amy"}], desc:"Said to a man grieving the end of a relationship. The line refuses the scarcity model of love — the idea that loving one thing depletes your capacity to love others.", trivia:["Spike Jonze wrote the script while going through his own experience of loneliness after a divorce.","Her won the Academy Award for Best Original Screenplay."], cat:"Relationships"},

  {q:"I'm yours, and I'm not yours.", src:"Her", year:2013, type:"movie", char:"Samantha", actors:[{name:"Scarlett Johansson",role:"Samantha (voice)"}], desc:"Samantha's impossible honesty — fully present, impossible to possess. The film's most devastating line about love's essential paradox.", trivia:["Scarlett Johansson was hired after original lead Samantha Morton had already recorded the entire role.","Spike Jonze has said Samantha represents the idealised version of a person we construct when we fall in love."], cat:"Relationships"},

  // ── LOST IN TRANSLATION ──
  {q:"I just don't know what I'm supposed to be.", src:"Lost in Translation", year:2003, type:"movie", char:"Charlotte", actors:[{name:"Scarlett Johansson",role:"Charlotte"}], desc:"A 25-year-old in a Tokyo hotel room, talking to a stranger, saying the only true thing. The line has no answer in the film. That's the point.", trivia:["Sofia Coppola wrote the script during her own period of uncertainty in Tokyo.","The film was shot largely without permission — most of the Tokyo footage was guerrilla filmmaking."], cat:"Identity"},

  // ── ETERNAL SUNSHINE ──
