  {q:"How happy is the blameless vestal's lot! The world forgetting, by the world forgot. Eternal sunshine of the spotless mind.", src:"Eternal Sunshine of the Spotless Mind", year:2004, type:"movie", char:"Dr. Howard Mierzwiak", actors:[{name:"Tom Wilkinson",role:"Dr. Howard Mierzwiak"}], desc:"Alexander Pope's poem — a vision of bliss through forgetting. The film asks whether it's actually bliss or just numbness. Joel and Clementine choose to remember, even knowing what's coming.", trivia:["Charlie Kaufman wrote the script as a philosophical argument about whether pain has value.","The film's non-linear structure was designed to mirror the fragmented nature of memory itself."], cat:"Grief"},

  {q:"I could die right now, Clem. I'm just... happy. I've never felt that before. I'm just exactly where I want to be.", src:"Eternal Sunshine of the Spotless Mind", year:2004, type:"movie", char:"Joel Barish", actors:[{name:"Jim Carrey",role:"Joel Barish"}], desc:"Joel, just before the memory is erased. The tragedy is the timing — he finds the feeling at the moment he's losing it. The question: are you present for the moments you'll one day grieve losing?", trivia:["Jim Carrey said this was the most emotionally demanding role of his career.","Michel Gondry and Charlie Kaufman wrote the script together over several years."], cat:"Mortality"},

  // ── WIRE SEASON 3/4 ──
  {q:"The game is out there, and it's either play or get played.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's cold realism. He has no illusions about the system he lives in. The line asks the harder question: what game are you in, and do you know the rules?", trivia:["David Simon has said Omar was the character who most surprised him — he was meant to be a minor figure.","Michael K. Williams said Omar was the role he was born to play."], cat:"Truth"},

  {q:"All in the game, yo.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's fatalism — acceptance not of injustice but of consequence. If you participate in something, the outcomes belong to you too. A disturbing piece of personal accountability.", trivia:["The phrase became so culturally embedded it was used by Barack Obama in an interview about the show.","David Simon based the drug game's internal logic on years of reporting for the Baltimore Sun."], cat:"Truth"},

  {q:"A man's got to have a code.", src:"The Wire", year:2002, type:"tv", char:"Omar Little", actors:[{name:"Michael K. Williams",role:"Omar Little"}], desc:"Omar's ethics are rigid within moral chaos — he doesn't harm civilians, keeps his word, operates with consistency. His code is more reliable than most of the show's 'legitimate' characters.", trivia:["David Simon based Omar's code on the real Baltimore stick-up artist Donnie Andrews.","The Wire was famously passed over for Emmy nominations its entire run."], cat:"Identity"},

  // ── SIX FEET UNDER ──
  {q:"You can't take a picture of this. It's already gone.", src:"Six Feet Under", year:2005, type:"tv", char:"Nate Fisher", actors:[{name:"Peter Krause",role:"Nate Fisher"}], desc:"Said in the final season — an acknowledgment that presence is the only real thing, and the attempt to capture it is always too late. One of the most quietly devastating lines in the whole run.", trivia:["Six Feet Under's finale is consistently rated the greatest series finale in television history.","Alan Ball said the show was fundamentally about learning to face death in order to live."], cat:"Mortality"},

  // ── PRESTIGE ──
  {q:"You're not really looking. You don't want to know. You want to be fooled.", src:"The Prestige", year:2006, type:"movie", char:"Cutter", actors:[{name:"Michael Caine",role:"Cutter"}], desc:"Cutter on magic — and on how we choose comfortable illusions over hard truths. The film is about this on every level. We participate in our own deception because the alternative is harder.", trivia:["Christopher Nolan said the film was really about obsession and the price of single-minded pursuit.","The film's twist requires a second viewing to see how thoroughly Nolan hid it in plain sight."], cat:"Truth"},

  {q:"Every great magic trick consists of three parts: The Pledge, The Turn, and The Prestige.", src:"The Prestige", year:2006, type:"movie", char:"Cutter", actors:[{name:"Michael Caine",role:"Cutter"}], desc:"The film's structural framework — and a metaphor for how we tell stories to ourselves. We set up, we complicate, and we require a payoff. Life rarely delivers the third act on schedule.", trivia:["Christopher Nolan wrote the script with his brother Jonathan over several years.","Christian Bale lost 63 pounds during filming for The Machinist, then gained it back for Batman Begins, then lost again for The Prestige."], cat:"Self-Knowledge"},

  // ── BEFORE SUNRISE ──
  {q:"I believe if there's any kind of God it wouldn't be in any of us, not you or me but just this little space in between.", src:"Before Sunrise", year:1995, type:"movie", char:"Jesse", actors:[{name:"Ethan Hawke",role:"Jesse"}], desc:"Jesse's theology of connection — God as the space between two people paying attention to each other. It's strange and moving and probably truer than most formal religion.", trivia:["Richard Linklater and Ethan Hawke wrote the script together, drawing from real overnight conversations.","Julie Delpy and Ethan Hawke have said they genuinely fell in love making the film."], cat:"Relationships"},

  {q:"I want to try to live like there's no tomorrow.", src:"Before Sunrise", year:1995, type:"movie", char:"Celine", actors:[{name:"Julie Delpy",role:"Celine"}], desc:"Celine's philosophy as a young woman — said the night before the film ends. Twenty years and two sequels later, the audience gets to see what that aspiration becomes when met with actual life.", trivia:["Before Sunrise was made for $2.5 million and grossed $5 million — enough to justify the trilogy.","Linklater, Hawke and Delpy co-wrote all three films together."], cat:"Freedom"},

  // ── INGLOURIOUS BASTERDS ──
  {q:"I think this just might be my masterpiece.", src:"Inglourious Basterds", year:2009, type:"movie", char:"Lt. Aldo Raine", actors:[{name:"Brad Pitt",role:"Lt. Aldo Raine"}], desc:"The last line of the film — Aldo carving a swastika into a Nazi's forehead. Tarantino breaking the fourth wall to announce his own satisfaction. The audacity is the point: sometimes you should be proud of what you made.", trivia:["Quentin Tarantino spent a decade writing the script in various forms before filming.","Christoph Waltz won the Academy Award for Best Supporting Actor for his role as Hans Landa."], cat:"Purpose"},

  // ── CATCHER IN THE RYE adapted / similar films ──
  {q:"I'm not going to tell you my whole goddamn autobiography or anything. I'll just tell you about this madman stuff that happened.", src:"The Perks of Being a Wallflower", year:2012, type:"movie", char:"Charlie", actors:[{name:"Logan Lerman",role:"Charlie"}], desc:"An opening that immediately establishes withholding — a narrator who isn't ready to tell you everything, which is the truth about most of us in therapy, in relationships, in life.", trivia:["Stephen Chbosky wrote the novel while working as a screenwriter — it was rejected by publishers for years.","Logan Lerman said the role required him to access memories he had never previously examined."], cat:"Identity"},

  // ── PHANTOM THREAD ──
  {q:"Whatever I do, I do it with conviction.", src:"Phantom Thread", year:2017, type:"movie", char:"Reynolds Woodcock", actors:[{name:"Daniel Day-Lewis",role:"Reynolds Woodcock"}], desc:"Woodcock's credo — not a moral statement but a statement about commitment. His conviction is the most admirable and most destructive thing about him simultaneously.", trivia:["Daniel Day-Lewis announced his retirement from acting after completing this film.","Paul Thomas Anderson wrote the role specifically for Day-Lewis after a conversation about control and obsession."], cat:"Identity"},

  {q:"I've eaten enough for both of us, and I've starved enough for both of us.", src:"Phantom Thread", year:2017, type:"movie", char:"Reynolds Woodcock", actors:[{name:"Daniel Day-Lewis",role:"Reynolds Woodcock"}], desc:"Woodcock on what he's given in love — and taken. Sacrifice and its shadow, ownership. The line captures the psychology of every controlling relationship.", trivia:["Day-Lewis spent eighteen months designing costumes for the role — he genuinely learned the craft.","The film was shot chronologically — an extremely rare approach."], cat:"Relationships"},

  // ── ORDINARY PEOPLE ──
  {q:"What do you feel? What do you really feel?", src:"Ordinary People", year:1980, type:"movie", char:"Dr. Berger", actors:[{name:"Judd Hirsch",role:"Dr. Berger"}], desc:"A therapist's simple, relentless question to a boy who has learned to feel nothing. The film is about the distance between performing function and actually being alive to your own inner life.", trivia:["Ordinary People beat Raging Bull and The Elephant Man for the Academy Award for Best Picture — still one of the most debated decisions in Oscar history.","Timothy Hutton won Best Supporting Actor at 20 years old — still the youngest winner."], cat:"Self-Knowledge"},

  // ── EVERYTHING EVERYWHERE ALL AT ONCE ──
  {q:"Of all the places I could be, I just want to be here, with you.", src:"Everything Everywhere All at Once", year:2022, type:"movie", char:"Evelyn Wang", actors:[{name:"Michelle Yeoh",role:"Evelyn Wang"}], desc:"A woman who has seen every version of her life choosing this one — not because it's perfect, but because it contains the people she loves. The entire film is built toward this sentence.", trivia:["Michelle Yeoh was not the original choice — the Daniels wrote the role for Jackie Chan.","The film won seven Academy Awards including Best Picture, Director and Actress."], cat:"Relationships"},

  {q:"When I choose to see the good side of things, I'm not being naive. It is strategic and necessary.", src:"Everything Everywhere All at Once", year:2022, type:"movie", char:"Waymond Wang", actors:[{name:"Ke Huy Quan",role:"Waymond Wang"}], desc:"Waymond's manifesto of radical kindness in the face of chaos. It's not weakness or ignorance. It's a deliberate decision about how to move through the world.", trivia:["Ke Huy Quan had retired from acting for 20 years before this role.","The Daniels have said Waymond is the true hero of the film — not Evelyn."], cat:"Courage"},

  // ── SUCCESSION cont. ──
  {q:"Every time I work out what it is I want to say to you, it just sounds like bile in my head.", src:"Succession", year:2023, type:"tv", char:"Kendall Roy", actors:[{name:"Jeremy Strong",role:"Kendall Roy"}], desc:"Kendall trying and failing to reach his father one last time. The thing he can't say is probably love. The thing he says instead is the rubble of it.", trivia:["Jeremy Strong approached Kendall Roy as if playing a man on the edge of an emotional breakdown at all times.","Jesse Armstrong wrote the final season's character beats without telling the actors what would happen."], cat:"Grief"},

  {q:"I wonder if the sad thing is… you know. That maybe you are just — not a good person.", src:"Succession", year:2023, type:"tv", char:"Logan Roy", actors:[{name:"Brian Cox",role:"Logan Roy"}], desc:"Logan Roy's verdict on his son — and the most devastating sentence a parent can say. It lands harder because Kendall has spent the whole series trying to prove it wrong.", trivia:["Brian Cox said this was the hardest line he ever had to deliver in his career.","The scene was filmed in one take at Cox's insistence."], cat:"Identity"},

  // ── THE LEFTOVERS ──
  {q:"There's no accounting for the things that people do when they feel left behind.", src:"The Leftovers", year:2014, type:"tv", char:"Kevin Garvey Sr.", actors:[{name:"Scott Glenn",role:"Kevin Garvey Sr."}], desc:"A man speaking about grief-induced behaviour — his own and everyone else's. The Leftovers was the most emotionally honest show about loss ever made.", trivia:["Damon Lindelof has said The Leftovers was his attempt to process the criticism he received after Lost's ending.","The second season, set in Texas, is considered by many critics the best single season of television drama."], cat:"Grief"},

  {q:"This is the most important day of my life. And I just want to be with you.", src:"The Leftovers", year:2017, type:"tv", char:"Kevin Garvey", actors:[{name:"Justin Theroux",role:"Kevin Garvey"}], desc:"Said in the final episode — a man who has spent three seasons running from love, finally stopping. The show gives you no clean resolution, just this.", trivia:["The Leftovers finale was shot in secret — even regular crew members didn't know the ending.","Co-creator Tom Perrotta has said the ending represents the only honest answer the show could give."], cat:"Relationships"},

  // ── BLUE IS THE WARMEST COLOUR ──
  {q:"I miss you. I feel your absence.", src:"Blue Is the Warmest Colour", year:2013, type:"movie", char:"Adèle", actors:[{name:"Adèle Exarchopoulos",role:"Adèle"}], desc:"The simplest and most complete statement of grief. Not nostalgia or longing, just the physical presence of absence.", trivia:["The film won the Palme d'Or at Cannes — awarded jointly to the director and both lead actresses, an unprecedented decision.","Adèle Exarchopoulos was 17 when filming began."], cat:"Grief"},

  // ── BOYHOOD ──
  {q:"I just thought there would be more.", src:"Boyhood", year:2014, type:"movie", char:"Mason Sr.", actors:[{name:"Ethan Hawke",role:"Mason Sr."}], desc:"A father on a road trip with his grown son, summing up the gap between what he expected from life and what he got. Not bitterness — just the quiet recognition of ordinary disappointment.", trivia:["Richard Linklater filmed Boyhood over twelve years with the same cast.","Ethan Hawke was nominated for the Academy Award for Best Supporting Actor."], cat:"Regret"},

  {q:"You know how everyone's always saying seize the moment? I don't know, I'm kind of thinking it's the other way around. You know, like the moment seizes us.", src:"Boyhood", year:2014, type:"movie", char:"Mason Jr.", actors:[{name:"Ellar Coltrane",role:"Mason Jr."}], desc:"The final lines of the film — a young man reframing agency and presence. Maybe we don't capture moments. Maybe we're just available when they arrive.", trivia:["Ellar Coltrane was six years old when filming began and eighteen when it ended.","Boyhood is considered one of the greatest achievements in film production history."], cat:"Mortality"},

  // ── MANCHESTER BY THE SEA ──
  {q:"I can't beat it.", src:"Manchester by the Sea", year:2016, type:"movie", char:"Lee Chandler", actors:[{name:"Casey Affleck",role:"Lee Chandler"}], desc:"The only honest answer to the question of whether he'll be okay. Not self-pity — just the clear-eyed recognition that some grief doesn't resolve, it just gets carried. The film refuses comfort, which is the most honest thing it does.", trivia:["Casey Affleck won the Academy Award for Best Actor.","Kenneth Lonergan based the film partly on his own experience of irreversible loss."], cat:"Grief"},

  // ── INSIDE LLEWYN DAVIS ──
  {q:"If it was never new, and it never gets old, then it's a folk song.", src:"Inside Llewyn Davis", year:2013, type:"movie", char:"Llewyn Davis", actors:[{name:"Oscar Isaac",role:"Llewyn Davis"}], desc:"A failed musician's definition of timeless art — and also, unintentionally, the reason he can't succeed. He believes in something that can't be sold, and he won't compromise it.", trivia:["The Coen Brothers wrote the film after years spent listening to early 1960s Greenwich Village recordings.","Oscar Isaac learned to perform every song live with no assistance — all the musical performances are real."], cat:"Purpose"},

  // ── MULHOLLAND DRIVE ──
  {q:"No hay banda. There is no band. It is all recorded. It is an illusion.", src:"Mulholland Drive", year:2001, type:"movie", char:"The Emcee", actors:[{name:"Angelo Badalamenti",role:"The Emcee"}], desc:"Lynch's warning at the centre of the film — nothing is what it appears, and you are being told this directly. The illusion continues anyway. Which is the point about Hollywood, about dreams, about memory.", trivia:["David Lynch made Mulholland Drive from a failed TV pilot, adding new material funded by French investors.","Lynch has never explained the film and refuses to — he considers interpretation the viewer's responsibility."], cat:"Truth"},

  // ── THE FATHER (Anthony Hopkins) ──
  {q:"I feel as if I'm losing all my leaves. The branches, and the wind… and the rain.", src:"The Father", year:2020, type:"movie", char:"Anthony", actors:[{name:"Anthony Hopkins",role:"Anthony"}], desc:"A man with dementia describing what it feels like from the inside. The image is devastating — identity as a tree being stripped bare. Hopkins won his second Academy Award for this performance.", trivia:["Anthony Hopkins became the oldest winner of the Academy Award for Best Actor at 83.","Florian Zeller adapted his own stage play for the screen."], cat:"Mortality"},

  // ── PARASITE cont. ──
  {q:"If I make a plan, life never works out that way. So I don't make one. No plan. You know what I call it? Meticulously carefree.", src:"Parasite", year:2019, type:"movie", char:"Ki-woo Kim", actors:[{name:"Choi Woo-shik",role:"Ki-woo Kim"}], desc:"An elaborate plan for spontaneity — the paradox Bong Joon-ho is pointing at. Flexibility and rigidity turn out to be the same thing wearing different clothes.", trivia:["Bong Joon-ho has a degree in sociology — the class dynamics of Parasite are architecturally precise.","The Parks' house was designed as a philosophical statement — elevation as privilege."], cat:"Choices"},

  // ── STILL ALICE ──
  {q:"I want to be recognised for what I've achieved. Not pitied for what I've lost.", src:"Still Alice", year:2014, type:"movie", char:"Alice Howland", actors:[{name:"Julianne Moore",role:"Alice Howland"}], desc:"A woman with early-onset Alzheimer's defining herself on her own terms. The demand for dignity in the face of loss.", trivia:["Julianne Moore won the Academy Award for Best Actress.","Moore spent months researching Alzheimer's and spent time with real patients and their families."], cat:"Identity"},

  // ── BEFORE SUNSET ──
  {q:"Baby, you are gonna miss that plane.", src:"Before Sunset", year:2004, type:"movie", char:"Celine", actors:[{name:"Julie Delpy",role:"Celine"}], desc:"The last line of the film — and maybe the most efficient ending in cinema. She's right. He knows it. They both know what it means. The choice is already made and no one says it out loud.", trivia:["The ending was not scripted — Linklater, Hawke and Delpy improvised it the day before shooting wrapped.","Before Sunset is Richard Linklater's favourite of his own films."], cat:"Choices"},

  // ── AMERICAN HISTORY X ──
  {q:"Hate is baggage. Life's too short to be pissed off all the time. It's just not worth it.", src:"American History X", year:1998, type:"movie", char:"Danny Vinyard", actors:[{name:"Edward Furlong",role:"Danny Vinyard"}], desc:"The younger brother's conclusion — not about tolerance as moral instruction but as self-interest. The cost of hate falls primarily on the person carrying it.", trivia:["Edward Norton rewrote significant portions of his own dialogue, leading to a very public dispute with director Tony Kaye.","The film had its final cut taken away from Kaye by the studio — he requested his name be removed."], cat:"Self-Knowledge"},

  // ── ZERO DARK THIRTY ──
  {q:"I'm the motherfucker that found this place.", src:"Zero Dark Thirty", year:2012, type:"movie", char:"Maya", actors:[{name:"Jessica Chastain",role:"Maya"}], desc:"The only thing Maya can say on the plane home after ten years of singular obsession. The victory is hollow. She doesn't know where she's going. The cost of complete commitment to a single purpose.", trivia:["Jessica Chastain was nominated for the Academy Award for Best Actress.","Kathryn Bigelow became the first woman to win the Academy Award for Best Director for The Hurt Locker."], cat:"Purpose"},

];



// ── State ──
let currentIndex = 0;
let touchStartX = 0, touchStartY = 0, touchCurrentX = 0;
let isDragging = false;
let _lastTouchX = 0, _lastTouchT = 0, _touchVelocity = 0;
let activeCategory = 'All';
let _navigating = false; // prevent double-taps

const allCategories = ['All', ...new Set(QUOTES.map(q => q.cat))];

// ── DOM refs ──
const cardStack      = document.getElementById('cardStack');
const counterEl      = document.getElementById('counterEl');
const progressDots   = document.getElementById('progressDots');
const infoDrawer     = document.getElementById('infoDrawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const drawerTabTitle = document.getElementById('drawerTabTitle');
const searchOverlay  = document.getElementById('search-overlay');
const searchInput    = document.getElementById('searchInput');

let filteredQuotes = QUOTES.slice();

function applyCategory(cat) {
  activeCategory = cat;
  filteredQuotes = cat === 'All' ? QUOTES.slice() : QUOTES.filter(q => q.cat === cat);
  currentIndex = 0;
  initStack();
}

// ── Build stack once, then only swap active card ──
function initStack() {
  cardStack.innerHTML = '';

  // Ghost shells — created once, stay in DOM
  if (filteredQuotes.length > 2) {
    const g2 = document.createElement('div');
    g2.className = 'quote-card card-ghost-2';
    g2.id = 'ghost2';
    cardStack.appendChild(g2);
  }
  if (filteredQuotes.length > 1) {
    const g1 = document.createElement('div');
    g1.className = 'quote-card card-ghost-1';
    g1.id = 'ghost1';
    cardStack.appendChild(g1);
  }

  // Active card
  const card = buildCard(filteredQuotes[currentIndex]);
  card.id = 'activeCard';
  card.classList.add('quote-card', 'active');
  cardStack.appendChild(card);

  updateCounter();
  renderDots();
  setupSwipe();
}

// Just re-render the active card content without touching ghosts
function renderCard() {
  updateCounter();
  renderDots();

  const d = filteredQuotes[currentIndex];
  const newCard = buildCard(d);
  newCard.id = 'activeCard';
  newCard.classList.add('quote-card', 'active', 'card-incoming');

  const old = document.getElementById('activeCard');
  if (old) old.remove();
  cardStack.appendChild(newCard);
  setupSwipe();
}

function updateCounter() {
  counterEl.textContent = `${currentIndex + 1} / ${filteredQuotes.length}`;
}

function buildCard(d) {
  const card = document.createElement('div');
  card.className = 'quote-card';
  const actors = d.actors.map(a => a.name).join(', ');
  const badge = `<span class="source-type-badge badge-${d.type}">${d.type === 'movie' ? 'Film' : 'TV'}</span>`;

  card.innerHTML = `
    <span class="quote-mark">"</span>
    <p class="quote-text">${d.q}</p>
    <div class="quote-source">
      <div class="source-icon">${d.type === 'movie' ? '🎬' : '📺'}</div>
      <div class="source-details">
        <div class="source-title">${d.src}</div>
        <div class="source-meta">${d.char} · ${actors} · ${d.year}</div>
      </div>
      ${badge}
    </div>
    <div class="info-pills">
      <button class="pill" data-drawer="film">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Film Info
      </button>
      <button class="pill" data-drawer="actors">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Cast
      </button>
      <button class="pill" data-drawer="trivia">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Trivia
      </button>
    </div>
  `;

  // pill clicks
  card.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', e => {
      e.stopPropagation();
      openDrawer(d, pill.dataset.drawer);
    });
  });

  return card;
}

function renderDots() {
  progressDots.innerHTML = '';
  const total = Math.min(filteredQuotes.length, 9);
  let start = Math.max(0, Math.min(currentIndex - 4, filteredQuotes.length - total));
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (start + i === currentIndex ? ' current' : '');
    progressDots.appendChild(dot);
  }
}

// ── Drawer ──
function openDrawer(d, tab) {
  // film
  document.getElementById('drawerFilmTitle').textContent = d.src;
  document.getElementById('drawerFilmYear').textContent = `${d.year} · ${d.type === 'movie' ? 'Film' : 'TV Series'}`;
  document.getElementById('drawerFilmDesc').textContent = d.desc;

  // actors
  const actorList = document.getElementById('drawerActorList');
  actorList.innerHTML = d.actors.map(a => {
    const initials = a.name.split(' ').map(n => n[0]).join('');
    return `<div class="actor-row">
      <div class="actor-avatar">${initials}</div>
      <div class="actor-info">
        <div class="actor-name">${a.name}</div>
        <div class="actor-role">as ${a.role}</div>
      </div>
    </div>`;
  }).join('');

  // trivia
  const triviaEl = document.getElementById('drawerTriviaContent');
  triviaEl.innerHTML = d.trivia.map(t => `<div class="trivia-item">${t}</div>`).join('');

  const tabs = ['film', 'actors', 'trivia'];
  const labels = ['Film Info', 'Cast', 'Trivia'];
  const ti = tabs.indexOf(tab);
  drawerTabTitle.textContent = labels[ti];
  tabs.forEach((t, i) => {
    const el = document.getElementById(`drawerContent${t.charAt(0).toUpperCase() + t.slice(1)}`);
    el.className = 'drawer-content' + (i === ti ? ' active' : '');
  });

  infoDrawer.classList.add('open');
}

function closeDrawer() { infoDrawer.classList.remove('open'); }
drawerBackdrop.addEventListener('click', closeDrawer);

// ── Navigation ──
function _doNext() {
  currentIndex = (currentIndex + 1) % filteredQuotes.length;
  renderCard();
  _navigating = false;
}

function _doPrev() {
  currentIndex = (currentIndex - 1 + filteredQuotes.length) % filteredQuotes.length;
  renderCard();
  _navigating = false;
}

function goNext() {
  if (_navigating || filteredQuotes.length === 0) return;
  _navigating = true;
  const card = document.getElementById('activeCard');
  if (!card) { _doNext(); return; }
  card.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.8,0.6), opacity 0.22s ease';
  card.style.transform = 'translateX(-105%) rotate(-6deg)';
  card.style.opacity = '0';
  card.style.pointerEvents = 'none';
  setTimeout(_doNext, 240);
}

function goPrev() {
  if (_navigating || filteredQuotes.length === 0) return;
  _navigating = true;
  const card = document.getElementById('activeCard');
  if (!card) { _doPrev(); return; }
  card.style.transition = 'transform 0.28s cubic-bezier(0.4,0,0.8,0.6), opacity 0.22s ease';
  card.style.transform = 'translateX(105%) rotate(6deg)';
  card.style.opacity = '0';
  card.style.pointerEvents = 'none';
  setTimeout(_doPrev, 240);
}

document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnPrev').addEventListener('click', goPrev);

// ── Touch/swipe ──
function setupSwipe() {
  const activeCard = document.getElementById('activeCard');
  if (!activeCard) return;
  activeCard.addEventListener('touchstart', onTouchStart, { passive: true });
  activeCard.addEventListener('touchmove', onTouchMove, { passive: false });
  activeCard.addEventListener('touchend', onTouchEnd);
  activeCard.addEventListener('mousedown', onMouseDown);
}

function onTouchStart(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchCurrentX = touchStartX;
  isDragging = false;
  _lastTouchX = touchStartX;
  _lastTouchT = Date.now();
  _touchVelocity = 0;
}

function onTouchMove(e) {
  const now = Date.now();
  const cx = e.touches[0].clientX;
  const dx = cx - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  // Track velocity
  const dt = now - _lastTouchT;
  if (dt > 0) _touchVelocity = (cx - _lastTouchX) / dt;
  _lastTouchX = cx;
  _lastTouchT = now;
  touchCurrentX = cx;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 6) {
    e.preventDefault();
    isDragging = true;
    const card = e.currentTarget;
    card.classList.add('dragging');
    // Resistance curve — feels more physical
    const resist = Math.sign(dx) * Math.min(Math.abs(dx) * 0.85, window.innerWidth * 0.6);
    const rotate = resist * 0.045;
    const opacity = Math.max(1 - Math.abs(resist) / (window.innerWidth * 0.7), 0.25);
    card.style.transform = `translateX(${resist}px) rotate(${rotate}deg)`;
    card.style.opacity = opacity;
  }
}

function onTouchEnd(e) {
  const dx = touchCurrentX - touchStartX;
  const card = e.currentTarget;
  card.classList.remove('dragging');

  const shouldSwipe = isDragging && (Math.abs(dx) > 72 || Math.abs(_touchVelocity) > 0.4);

  if (shouldSwipe && !_navigating) {
    const dir = dx < 0 ? 'left' : 'right';
    const vx = Math.abs(_touchVelocity);
    const dur = Math.max(0.18, 0.28 - vx * 0.08);
    card.style.transition = `transform ${dur}s cubic-bezier(0.4,0,1,1), opacity ${dur}s ease`;
    card.style.transform = `translateX(${dir === 'left' ? -110 : 110}%) rotate(${dir === 'left' ? -8 : 8}deg)`;
    card.style.opacity = '0';
    card.style.pointerEvents = 'none';
    _navigating = true;
    setTimeout(() => { dir === 'left' ? _doNext() : _doPrev(); }, dur * 1000);
  } else {
    // Spring snap back
    card.style.transition = 'transform 0.38s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease';
    card.style.transform = '';
    card.style.opacity = '';
    setTimeout(() => { card.style.transition = ''; }, 400);
  }
  isDragging = false;
}

// mouse
let mouseStartX = 0, mouseDragging = false, _mouseVelocity = 0, _lastMouseX = 0, _lastMouseT = 0;
function onMouseDown(e) {
  mouseStartX = e.clientX;
  mouseDragging = false;
  _mouseVelocity = 0;
  _lastMouseX = e.clientX;
  _lastMouseT = Date.now();
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}
function onMouseMove(e) {
  const now = Date.now();
  const dt = now - _lastMouseT;
  if (dt > 0) _mouseVelocity = (e.clientX - _lastMouseX) / dt;
  _lastMouseX = e.clientX;
  _lastMouseT = now;

  const dx = e.clientX - mouseStartX;
  if (Math.abs(dx) > 6) {
    mouseDragging = true;
    const card = cardStack.querySelector('.active');
    if (card) {
      const resist = Math.sign(dx) * Math.min(Math.abs(dx) * 0.85, window.innerWidth * 0.6);
      card.style.transform = `translateX(${resist}px) rotate(${resist * 0.045}deg)`;
      card.style.opacity = Math.max(1 - Math.abs(resist) / (window.innerWidth * 0.7), 0.25);
    }
  }
}
function onMouseUp(e) {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
  const dx = e.clientX - mouseStartX;
  const card = document.getElementById('activeCard');
  const shouldSwipe = mouseDragging && (Math.abs(dx) > 72 || Math.abs(_mouseVelocity) > 0.4);
  if (shouldSwipe && card && !_navigating) {
    dx < 0 ? goNext() : goPrev();
  } else if (card) {
    card.style.transition = 'transform 0.38s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease';
    card.style.transform = '';
    card.style.opacity = '';
    setTimeout(() => { card.style.transition = ''; }, 400);
  }
  mouseDragging = false;
}


// keyboard
document.addEventListener('keydown', e => {
  if (searchOverlay.classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if (e.key === 'Escape') closeDrawer();
});

// ── Search ──
document.getElementById('btnSearch').addEventListener('click', openSearch);
document.getElementById('searchClose').addEventListener('click', closeSearch);

function openSearch() {
  searchOverlay.classList.add('open');
  buildCategoryFilters();
  renderSearchResults('');
  setTimeout(() => searchInput.focus(), 100);
}

function closeSearch() {
  searchOverlay.classList.remove('open');
  searchInput.value = '';
}

function buildCategoryFilters() {
  const cf = document.getElementById('categoryFilter');
  cf.innerHTML = allCategories.map(cat =>
    `<button class="cat-btn${cat === activeCategory ? ' active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  cf.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      cf.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyCategory(btn.dataset.cat);
      renderSearchResults(searchInput.value);
    });
  });
}

searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));

function renderSearchResults(query) {
  const q = query.toLowerCase().trim();
  const pool = activeCategory === 'All' ? QUOTES : QUOTES.filter(x => x.cat === activeCategory);
  const results = q ? pool.filter(x =>
    x.q.toLowerCase().includes(q) ||
    x.src.toLowerCase().includes(q) ||
    x.char.toLowerCase().includes(q) ||
    x.actors.some(a => a.name.toLowerCase().includes(q))
  ) : pool.slice(0, 30);

  const el = document.getElementById('searchResults');
  if (results.length === 0) {
    el.innerHTML = `<div class="search-empty">No quotes found for "${query}"</div>`;
    return;
  }
  el.innerHTML = results.slice(0, 40).map((r, i) => {
    const origIdx = QUOTES.indexOf(r);
    return `<div class="search-result-item" data-idx="${origIdx}">
      <div class="sri-quote">${r.q}</div>
      <div class="sri-meta">${r.src} · ${r.char} · ${r.year}</div>
    </div>`;
  }).join('');

  el.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      const origIdx = parseInt(item.dataset.idx);
      filteredQuotes = activeCategory === 'All' ? QUOTES.slice() : QUOTES.filter(x => x.cat === activeCategory);
      const newIdx = filteredQuotes.indexOf(QUOTES[origIdx]);
      currentIndex = newIdx >= 0 ? newIdx : 0;
      renderCard();
      closeSearch();
    });
  });
}

// ── Init ──
currentIndex = Math.floor(Math.random() * QUOTES.length);
initStack();
</script>
