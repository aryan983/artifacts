<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FV Interview Prep - Windows XP Edition</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="xp-window" id="mainWin">
  <!-- Title Bar -->
  <div class="title-bar">
    <div class="title-bar-icon">🔬</div>
    <div class="title-bar-text">FV Interview Prep — Formal Verification Flashcard Drill</div>
    <div class="title-bar-btns">
      <div class="tb-btn minimize">─</div>
      <div class="tb-btn maximize">□</div>
      <div class="tb-btn close">✕</div>
    </div>
  </div>

  <!-- Menu Bar -->
  <div class="menu-bar">
    <div class="menu-item">File</div>
    <div class="menu-item">Edit</div>
    <div class="menu-item" onclick="restartDeck()">Deck</div>
    <div class="menu-item" onclick="toggleShuffle()">Shuffle</div>
    <div class="menu-item">Help</div>
  </div>

  <!-- Toolbar / Filters -->
  <div class="toolbar">
    <span class="filter-label-xp">Filter:</span>
    <div class="filter-group" id="filter-group">
      <button class="xp-btn active-btn" onclick="setFilter('All',this)">All</button>
      <button class="xp-btn" onclick="setFilter('Beginner',this)">🟢 Beginner</button>
      <button class="xp-btn" onclick="setFilter('Intermediate',this)">🔵 Intermediate</button>
      <button class="xp-btn" onclick="setFilter('Advanced',this)">🟡 Advanced</button>
      <button class="xp-btn" onclick="setFilter('Jasper',this)">🟣 Jasper</button>
      <button class="xp-btn" onclick="setFilter('Coverage',this)">🔵 Coverage</button>
      <button class="xp-btn" onclick="setFilter('Mutation',this)">🟠 Mutation</button>
      <button class="xp-btn" onclick="setFilter('Bug',this)">🐛 Spot Bug</button>
      <button class="xp-btn" onclick="setFilter('SVA_Deep',this)">🔬 SVA Deep</button>
      <button class="xp-btn" onclick="setFilter('Debug',this)">🔧 Debug FPV</button>
      <button class="xp-btn" onclick="setFilter('Interview',this)">🎤 Interview</button>
      <button class="xp-btn" onclick="setFilter('Methodology_Adv',this)">📋 Sign-off</button>
      <button class="xp-btn" onclick="setFilter('CDC',this)">⚡ CDC</button>
      <button class="xp-btn" onclick="setFilter('Liveness',this)">♾ Liveness</button>
      <button class="xp-btn" onclick="setFilter('Bug2',this)">🐛🐛 Spot Bug II</button>
    </div>
    <div class="tb-sep"></div>
    <button class="xp-btn" onclick="toggleShuffle()"><span id="shuffle-label">🔀 Shuffle: ON</span></button>
    <button class="xp-btn" onclick="restartDeck()">↺ Restart</button>
  </div>

  <!-- Window Body -->
  <div class="window-body">

    <!-- Stats -->
    <div class="stats-panel">
      <div class="stat-item"><span class="stat-val green" id="s-correct">0</span><span class="stat-label">Got It</span></div>
      <div class="stat-item"><span class="stat-val red"   id="s-wrong">0</span><span class="stat-label">Missed</span></div>
      <div class="stat-item"><span class="stat-val amber" id="s-skip">0</span><span class="stat-label">Skipped</span></div>
      <div class="stat-item"><span class="stat-val"       id="s-remain">0</span><span class="stat-label">Left</span></div>
      <div class="stat-item"><span class="stat-val"       id="s-total">0</span><span class="stat-label">Total</span></div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="xp-progress-wrap">
        <div class="xp-progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progress-text">0 / 0</div>
    </div>

    <!-- Main card area -->
    <div id="main-area">
      <div class="xp-groupbox">
        <div class="xp-groupbox-title">
          <span class="q-num-tag" id="q-num">Q—</span>
          <span class="diff-tag" id="diff-tag">—</span>
          <span class="cat-tag" id="cat-tag">—</span>
        </div>
        <div class="card-body" id="card-body">
          <div id="question-container"></div>
          <div class="reveal-hint" id="reveal-hint" onclick="revealAnswer()">
            ▼ Click to reveal answer &nbsp;<span class="key-hint">SPACE</span>
          </div>
          <div class="answer-block" id="answer-block">
            <div class="answer-label" id="answer-label">ANSWER:</div>
            <div id="answer-container"></div>
          </div>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="action-row" id="action-row-reveal" style="margin-top:6px;">
        <button class="action-xp-btn reveal-btn" onclick="revealAnswer()">▼ Reveal Answer &nbsp;<span class="key-hint">SPACE</span></button>
      </div>
      <div class="action-row" id="action-row-grade" style="display:none;margin-top:6px;">
        <button class="action-xp-btn got-it-btn" onclick="grade('correct')">✔ Got It &nbsp;<span class="key-hint">1</span></button>
        <button class="action-xp-btn missed-btn"  onclick="grade('wrong')">✘ Missed &nbsp;<span class="key-hint">2</span></button>
        <button class="action-xp-btn skip-btn"    onclick="grade('skip')">→ Skip &nbsp;<span class="key-hint">3</span></button>
      </div>
    </div>

    <!-- Done screen -->
    <div class="done-screen" id="done-screen">
      <div class="done-dialog">
        <div class="done-title">🎉 Session Complete</div>
        <div class="done-body">
          <div class="done-icon">🏆</div>
          <div class="done-score" id="final-score">—</div>
          <div class="done-sub" id="final-sub"></div>
          <div class="done-btns">
            <button class="action-xp-btn reveal-btn" onclick="restartDeck()" style="flex:unset;padding:5px 16px;">↺ Restart</button>
            <button class="action-xp-btn got-it-btn" onclick="reviewMissed()" style="flex:unset;padding:5px 16px;">Review Missed</button>
          </div>
          <div class="missed-list" id="missed-list"></div>
        </div>
      </div>
    </div>

  </div><!-- /window-body -->
</div><!-- /xp-window -->

<!-- Taskbar -->
<div class="taskbar">
  <button class="start-btn">⊞ start</button>
  <div class="taskbar-sep"></div>
  <div class="taskbar-app">🔬 FV Interview Prep</div>
  <div class="taskbar-clock" id="taskbar-clock">00:00</div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
