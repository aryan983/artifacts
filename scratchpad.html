<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SCRATCHPAD</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080808; --bg2:#101010; --bg3:#181818; --bg4:#202020;
  --border:#222; --border2:#333;
  --white:#efefef; --muted:#484848; --muted2:#666;
  --green:#00ff88; --red:#ff2d55; --yellow:#ffd600; --blue:#00d4ff; --orange:#ff6b2b;
  --c-action:#ff2d55; --c-idea:#00d4ff;
  --c-critical:#ff2d55; --c-normal:#ffd600; --c-low:#00ff88;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'JetBrains Mono',monospace;font-size:14px;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9998;}

/* HEADER */
.hdr{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--green);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.hdr-left{}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:.16em;color:var(--green);text-shadow:0 0 24px rgba(0,255,136,.45);}
.hdr-sub{font-size:10px;color:var(--muted2);letter-spacing:.08em;margin-top:2px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.hdr-clock{font-size:12px;color:var(--muted2);letter-spacing:.06em;}

/* STORAGE BAR */
.storage-row{display:flex;align-items:center;gap:7px;}
.storage-label{font-size:9px;color:var(--muted2);letter-spacing:.07em;white-space:nowrap;}
.storage-bar-wrap{width:64px;height:5px;background:var(--bg3);border-radius:1px;overflow:hidden;border:1px solid var(--border2);}
.storage-bar-fill{height:100%;border-radius:1px;transition:width .3s,background .3s;}

/* TABS */
.tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border2);background:var(--bg);}
.tab{flex:1;padding:11px 0;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.14em;border:none;background:transparent;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
.tab.active-action{color:var(--c-action);border-bottom-color:var(--c-action);}
.tab.active-idea{color:var(--c-idea);border-bottom-color:var(--c-idea);}

/* LIST */
.list{flex:1;overflow-y:auto;padding:12px 14px 110px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch;}
.empty{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.1em;padding:60px 20px;line-height:2.5;}
.cur{display:inline-block;width:7px;height:13px;background:var(--green);vertical-align:middle;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pop{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--border2);padding:11px 13px;cursor:pointer;animation:pop .18s ease;transition:background .12s;}
.card:active{background:var(--bg3);}
.card[data-sev="critical"]{border-left-color:var(--c-critical);}
.card[data-sev="normal"]{border-left-color:var(--c-normal);}
.card[data-sev="low"]{border-left-color:var(--c-low);}
.card[data-tag="idea"]{border-left-color:var(--c-idea);}
.card.done-card{opacity:.5;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap;}
.chip{font-size:9px;font-weight:700;letter-spacing:.13em;padding:2px 6px;border-radius:1px;}
.chip.action{background:var(--c-action);color:#000;}
.chip.idea{background:var(--c-idea);color:#000;}
.chip.critical{background:var(--c-critical);color:#000;}
.chip.normal{background:var(--c-normal);color:#000;}
.chip.low{background:var(--c-low);color:#000;}
.chip.done-chip{background:var(--border2);color:var(--muted2);}
.card-time{font-size:10px;color:var(--muted);flex:1;}
.card-del{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 2px;line-height:1;font-family:monospace;}
.card-del:active{color:var(--red);}
.card-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:3px;}
.card-body{font-size:12px;color:#999;white-space:pre-wrap;word-break:break-word;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.55;}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
.due-badge{font-size:9px;color:var(--muted2);background:var(--bg3);border:1px solid var(--border2);padding:2px 7px;border-radius:1px;}
.due-badge.od{color:var(--c-action);border-color:var(--c-action);}
.audio-indicator{font-size:9px;color:var(--blue);letter-spacing:.08em;}

/* FAB */
.fabs{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:50;}
.fab-btn{flex:1;height:56px;border:none;border-top:2px solid;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:800;letter-spacing:.13em;cursor:pointer;background:var(--bg2);transition:opacity .12s;}
.fab-btn:active{opacity:.7;}
.fab-btn.action{color:var(--c-action);border-top-color:var(--c-action);}
.fab-btn.idea{color:var(--c-idea);border-top-color:var(--c-idea);}

/* OVERLAY / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{width:100%;background:var(--bg2);padding:0 16px 48px;transform:translateY(100%);transition:transform .26s cubic-bezier(.16,1,.3,1);max-height:93dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.overlay.open .sheet{transform:none;}
.sheet-bar{height:3px;margin-bottom:18px;}
.sheet-bar.action{background:var(--c-action);box-shadow:0 0 14px rgba(255,45,85,.55);}
.sheet-bar.idea{background:var(--c-idea);box-shadow:0 0 14px rgba(0,212,255,.55);}
.sheet-bar.warn{background:var(--yellow);box-shadow:0 0 14px rgba(255,214,0,.55);}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.sheet-title{font-size:13px;font-weight:700;letter-spacing:.15em;}
.sheet-title.action{color:var(--c-action);}
.sheet-title.idea{color:var(--c-idea);}
.sheet-title.warn{color:var(--yellow);}
.sheet-close{background:none;border:1px solid var(--border2);color:var(--muted);font-family:monospace;font-size:13px;cursor:pointer;padding:4px 9px;border-radius:2px;}
.sheet-close:active{color:var(--red);border-color:var(--red);}

/* FORM */
.lbl{display:block;font-size:10px;color:var(--muted2);letter-spacing:.12em;margin:14px 0 5px;}
.field{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--white);font-family:'JetBrains Mono',monospace;font-size:14px;padding:10px 12px;border-radius:2px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
.field:focus{border-color:var(--green);}
.field::placeholder{color:var(--muted);}
textarea.field{resize:none;line-height:1.7;min-height:100px;}

.sev-row{display:flex;gap:8px;}
.sev-opt{flex:1;padding:9px 4px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;border:2px solid transparent;background:var(--bg3);color:var(--muted2);text-align:center;transition:all .15s;}
.sev-opt[data-v="critical"]{border-color:var(--c-critical);}
.sev-opt[data-v="normal"]{border-color:var(--c-normal);}
.sev-opt[data-v="low"]{border-color:var(--c-low);}
.sev-opt[data-v="critical"].sel{background:var(--c-critical);color:#000;}
.sev-opt[data-v="normal"].sel{background:var(--c-normal);color:#000;}
.sev-opt[data-v="low"].sel{background:var(--c-low);color:#000;}

.tog-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
.tog-lbl{font-size:11px;color:var(--muted2);letter-spacing:.09em;flex:1;}
.tog{position:relative;width:42px;height:23px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-sl{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;cursor:pointer;transition:.18s;}
.tog-sl::before{content:'';position:absolute;width:16px;height:14px;left:2px;top:3px;background:var(--muted);border-radius:1px;transition:.18s;}
.tog input:checked+.tog-sl{background:rgba(0,255,136,.12);border-color:var(--green);}
.tog input:checked+.tog-sl::before{background:var(--green);transform:translateX(19px);}

/* VOICE */
.voice-box{background:var(--bg3);border:1px solid var(--border2);border-radius:2px;padding:12px;}
.rec-row{display:flex;align-items:center;gap:10px;}
.rec-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--c-action);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.rec-btn.recording{background:var(--c-action);animation:pulse 1s infinite;}
.rec-btn:active{transform:scale(.93);}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,45,85,.4)}70%{box-shadow:0 0 0 10px rgba(255,45,85,0)}100%{box-shadow:0 0 0 0 rgba(255,45,85,0)}}
.rec-icon{width:14px;height:14px;background:var(--c-action);border-radius:50%;}
.rec-icon.stop{background:var(--white);border-radius:2px;width:12px;height:12px;}
.rec-status{font-size:11px;color:var(--muted2);letter-spacing:.08em;line-height:1.5;}
.rec-timer{font-size:13px;font-weight:700;color:var(--c-action);}
audio{width:100%;height:36px;margin-top:10px;display:block;}
.clear-audio{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:6px;display:block;}
.clear-audio:active{color:var(--red);}

/* STORAGE WARNING BANNER */
.storage-warn{background:rgba(255,214,0,.08);border:1px solid var(--yellow);border-radius:2px;padding:10px 12px;font-size:11px;color:var(--yellow);letter-spacing:.07em;line-height:1.6;margin-bottom:14px;display:none;}
.storage-warn.show{display:block;}

.save-btn{width:100%;margin-top:18px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:800;letter-spacing:.2em;border:none;border-radius:2px;cursor:pointer;transition:opacity .15s;}
.save-btn:active{opacity:.8;}
.save-btn.action{background:var(--c-action);color:#000;}
.save-btn.idea{background:var(--c-idea);color:#000;}

/* VIEW */
.view-title{font-size:17px;font-weight:800;color:var(--white);margin-bottom:10px;line-height:1.3;}
.view-block{font-size:13px;line-height:1.8;color:var(--white);white-space:pre-wrap;word-break:break-word;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;max-height:38dvh;overflow-y:auto;}
.view-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;}
.view-time{font-size:10px;color:var(--muted);letter-spacing:.07em;margin-top:11px;}
.act-btn{width:100%;margin-top:12px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.15em;border:none;border-radius:2px;cursor:pointer;}
.act-btn:active{opacity:.8;}
.act-btn.done-btn{background:var(--green);color:#000;}
.act-btn.undone-btn{background:var(--border2);color:var(--muted2);}
.act-btn.cal-btn{background:var(--bg3);color:var(--blue);border:1px solid var(--blue);margin-top:8px;}

/* STORAGE FULL SHEET */
.full-body{font-size:12px;color:var(--muted2);line-height:1.9;letter-spacing:.05em;margin-bottom:16px;}
.full-body strong{color:var(--yellow);}
.voice-entry-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;margin-bottom:8px;}
.ve-info{flex:1;}
.ve-title{font-size:12px;font-weight:700;color:var(--white);}
.ve-size{font-size:10px;color:var(--muted2);margin-top:2px;}
.ve-del{font-size:16px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:monospace;padding:0 4px;}
.ve-del:active{color:var(--red);}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--green);color:#000;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.14em;padding:8px 16px;border-radius:2px;opacity:0;transition:all .18s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);color:#fff;}
.toast.warn{background:var(--yellow);color:#000;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-title">SCRATCHPAD</div>
    <div class="hdr-sub" id="hdrSub">0 entries</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-clock" id="clock"></div>
    <div class="storage-row" title="localStorage usage">
      <div class="storage-bar-wrap">
        <div class="storage-bar-fill" id="storeFill" style="width:0%;background:var(--green);"></div>
      </div>
      <div class="storage-label" id="storeLabel">0.0 / 5MB</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active-action" data-tab="action" onclick="switchTab('action')">⚡ ACTIONS</button>
  <button class="tab" data-tab="idea" onclick="switchTab('idea')">💡 IDEAS</button>
</div>

<div class="list" id="list"></div>

<div class="fabs">
  <button class="fab-btn action" onclick="openNew('action')">＋ ACTION</button>
  <button class="fab-btn idea" onclick="openNew('idea')">＋ IDEA</button>
</div>

<!-- NEW ENTRY SHEET -->
<div class="overlay" id="newOverlay" onclick="if(event.target===this)closeNew()">
  <div class="sheet" id="newSheet">
    <div class="sheet-bar" id="newBar"></div>
    <div class="sheet-hdr">
      <div class="sheet-title" id="newTitle"></div>
      <button class="sheet-close" onclick="closeNew()">[ ESC ]</button>
    </div>
    <div class="storage-warn" id="newStorageWarn"></div>
    <div id="newFields"></div>
    <button class="save-btn" id="saveBtn" onclick="saveEntry()">SAVE</button>
  </div>
</div>

<!-- VIEW SHEET -->
<div class="overlay" id="viewOverlay" onclick="if(event.target===this)closeView()">
  <div class="sheet">
    <div class="sheet-bar" id="viewBar"></div>
    <div class="sheet-hdr">
      <div class="sheet-title" id="viewTitle"></div>
      <button class="sheet-close" onclick="closeView()">[ ESC ]</button>
    </div>
    <div id="viewContent"></div>
    <div class="view-time" id="viewTime"></div>
  </div>
</div>

<!-- STORAGE FULL SHEET -->
<div class="overlay" id="fullOverlay" onclick="if(event.target===this)closeFullSheet()">
  <div class="sheet">
    <div class="sheet-bar warn"></div>
    <div class="sheet-hdr">
      <div class="sheet-title warn">⚠ STORAGE LIMIT</div>
      <button class="sheet-close" onclick="closeFullSheet()">[ ESC ]</button>
    </div>
    <p class="full-body">You're <strong id="fullPct"></strong> full. Voice notes are taking up most of the space. Delete some below to free up room.</p>
    <div id="voiceEntryList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'scratchpad_v3';
const LIMIT_BYTES = 5 * 1024 * 1024; // 5MB
const WARN_PCT = 0.75;
const BLOCK_PCT = 0.92;

let entries = [], activeTab = 'action', currentTag = null;
let mediaRec = null, audioChunks = [], recInterval = null, recSecs = 0;
let pendingAudioB64 = null, pendingAudioMime = null;

function load() { try { entries = JSON.parse(localStorage.getItem(KEY)) || []; } catch { entries = []; } }
function persist() { localStorage.setItem(KEY, JSON.stringify(entries)); }
function pad(n) { return String(n).padStart(2,'0'); }
function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(ts) { const d=new Date(ts); return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${String(d.getFullYear()).slice(2)} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDate(s) { if(!s)return''; const[y,m,d]=s.split('-'); return `${d}/${m}/${String(y).slice(2)}`; }
function overdue(s,done) { return s && !done && new Date(s)<new Date(new Date().toDateString()); }

function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
}

// ── STORAGE UTILS ──────────────────────────────────────────────
function getStorageUsedBytes() {
  let total = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) {
      total += (localStorage[k].length + k.length) * 2;
    }
  }
  return total;
}

function fmtBytes(b) {
  if (b < 1024) return b+'B';
  if (b < 1024*1024) return (b/1024).toFixed(1)+'KB';
  return (b/(1024*1024)).toFixed(2)+'MB';
}

function updateStorageUI() {
  const used = getStorageUsedBytes();
  const pct = Math.min(used / LIMIT_BYTES, 1);
  const fill = document.getElementById('storeFill');
  const label = document.getElementById('storeLabel');
  fill.style.width = (pct*100)+'%';
  fill.style.background = pct >= BLOCK_PCT ? 'var(--red)' : pct >= WARN_PCT ? 'var(--yellow)' : 'var(--green)';
  label.style.color = pct >= BLOCK_PCT ? 'var(--red)' : pct >= WARN_PCT ? 'var(--yellow)' : 'var(--muted2)';
  label.textContent = `${fmtBytes(used)} / 5MB`;
}

function checkStorageWarning() {
  const used = getStorageUsedBytes();
  const pct = used / LIMIT_BYTES;
  const warn = document.getElementById('newStorageWarn');
  if (pct >= BLOCK_PCT) {
    warn.textContent = `⚠ Storage ${Math.round(pct*100)}% full — delete old voice notes before recording more.`;
    warn.className = 'storage-warn show';
    return 'block';
  } else if (pct >= WARN_PCT) {
    warn.textContent = `Storage ${Math.round(pct*100)}% full. You have limited space for new voice notes.`;
    warn.className = 'storage-warn show';
    return 'warn';
  } else {
    warn.className = 'storage-warn';
    return 'ok';
  }
}

function audioSizeB64(b64) {
  // base64 size → approximate bytes
  return Math.round((b64.length * 3) / 4);
}

// ── TABS ───────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>{
    b.className='tab';
    if(b.dataset.tab===tab) b.classList.add(`active-${tab}`);
  });
  render();
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('list');
  const filtered = entries.filter(e=>e.tag===activeTab);
  document.getElementById('hdrSub').textContent = `${entries.length} ${entries.length===1?'entry':'entries'}`;
  updateStorageUI();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">NO ${activeTab.toUpperCase()}S YET<br><br><span class="cur"></span><br><br>TAP ＋ BELOW</div>`;
    return;
  }

  list.innerHTML = filtered.slice().reverse().map(e => {
    const meta = `<div class="card-meta">
      <span class="chip ${e.tag}">${e.tag.toUpperCase()}</span>
      ${e.tag==='action'?`<span class="chip ${e.sev}">${e.sev.toUpperCase()}</span>`:''}
      ${e.done?'<span class="chip done-chip">✓ DONE</span>':''}
      <span class="card-time">${fmt(e.ts)}</span>
      ${e.audio?`<span class="audio-indicator">▶ VOICE</span>`:''}
      <button class="card-del" onclick="delEntry(event,'${e.id}')">×</button>
    </div>`;
    let body = '';
    if (e.tag==='action') {
      const od = overdue(e.due,e.done);
      body = `<div class="card-title">${esc(e.title)}</div>
        ${e.desc?`<div class="card-body">${esc(e.desc)}</div>`:''}
        <div class="card-footer">${e.due?`<span class="due-badge ${od?'od':''}">${od?'⚠ ':''}DUE ${fmtDate(e.due)}</span>`:''}</div>`;
    } else {
      body = `<div class="card-title">${esc(e.title)}</div>${e.body?`<div class="card-body">${esc(e.body)}</div>`:''}`;
    }
    return `<div class="card ${e.done?'done-card':''}" data-tag="${e.tag}" data-sev="${e.sev||''}" onclick="viewEntry('${e.id}')">${meta}${body}</div>`;
  }).join('');
}

// ── NEW ENTRY ──────────────────────────────────────────────────
function openNew(tag) {
  currentTag = tag;
  pendingAudioB64 = null; pendingAudioMime = null;
  stopRecording(false);
  document.getElementById('newBar').className = `sheet-bar ${tag}`;
  const nt = document.getElementById('newTitle');
  nt.className = `sheet-title ${tag}`; nt.textContent = `> NEW ${tag.toUpperCase()}`;
  document.getElementById('saveBtn').className = `save-btn ${tag}`;

  const f = document.getElementById('newFields');
  if (tag==='action') {
    f.innerHTML = `
      <label class="lbl">// TASK TITLE *</label>
      <input id="f_title" class="field" type="text" placeholder="what needs doing..." autocomplete="off">
      <label class="lbl">// SEVERITY</label>
      <div class="sev-row">
        <div class="sev-opt sel" data-v="critical" onclick="pickSev(this)">CRITICAL</div>
        <div class="sev-opt" data-v="normal" onclick="pickSev(this)">NORMAL</div>
        <div class="sev-opt" data-v="low" onclick="pickSev(this)">LOW</div>
      </div>
      <label class="lbl">// DESCRIPTION</label>
      <textarea id="f_desc" class="field" placeholder="more detail..."></textarea>
      <label class="lbl">// DUE DATE</label>
      <input id="f_due" class="field" type="date">
      <div class="tog-row">
        <span class="tog-lbl">// MARK AS DONE</span>
        <label class="tog"><input type="checkbox" id="f_done"><span class="tog-sl"></span></label>
      </div>
      <label class="lbl">// VOICE NOTE</label>
      ${voiceUI()}`;
  } else {
    f.innerHTML = `
      <label class="lbl">// IDEA TITLE *</label>
      <input id="f_title" class="field" type="text" placeholder="the big idea..." autocomplete="off">
      <label class="lbl">// BRAIN DUMP</label>
      <textarea id="f_body" class="field" placeholder="everything about it..."></textarea>
      <label class="lbl">// VOICE NOTE</label>
      ${voiceUI()}`;
  }

  document.getElementById('newOverlay').classList.add('open');
  checkStorageWarning();
  setTimeout(()=>{ const fi=f.querySelector('.field'); if(fi) fi.focus(); },300);
}

function voiceUI() {
  return `<div class="voice-box">
    <div class="rec-row">
      <button class="rec-btn" id="recBtn" onclick="toggleRec()"><div class="rec-icon" id="recIcon"></div></button>
      <div>
        <div class="rec-status" id="recStatus">Tap to record</div>
        <div class="rec-timer" id="recTimer" style="display:none">0:00</div>
      </div>
    </div>
    <div id="audioPreview"></div>
  </div>`;
}

function pickSev(el) {
  document.querySelectorAll('.sev-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function closeNew() {
  stopRecording(false);
  document.getElementById('newOverlay').classList.remove('open');
}

// ── RECORDING ─────────────────────────────────────────────────
async function toggleRec() {
  if (mediaRec && mediaRec.state==='recording') { stopRecording(true); return; }

  // Block if storage too full
  const storePct = getStorageUsedBytes() / LIMIT_BYTES;
  if (storePct >= BLOCK_PCT) {
    toast('// STORAGE FULL — delete voice notes first', 'err');
    openFullSheet();
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = []; recSecs = 0;
    mediaRec = new MediaRecorder(stream);
    mediaRec.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRec.onstop = () => {
      stream.getTracks().forEach(t=>t.stop());
      const mime = audioChunks[0]?.type || 'audio/webm';
      const blob = new Blob(audioChunks,{type:mime});
      const reader = new FileReader();
      reader.onload = () => {
        const b64 = reader.result.split(',')[1];
        // Check if saving this would push us over
        const projected = getStorageUsedBytes() + audioSizeB64(b64);
        if (projected / LIMIT_BYTES >= BLOCK_PCT) {
          toast('// VOICE NOTE TOO LARGE — storage full', 'err');
          openFullSheet();
          document.getElementById('recStatus').textContent = 'Too large — storage full';
          return;
        }
        if (projected / LIMIT_BYTES >= WARN_PCT) {
          toast('// Storage nearly full after this note', 'warn');
        }
        pendingAudioB64 = b64;
        pendingAudioMime = mime;
        const url = URL.createObjectURL(blob);
        const prev = document.getElementById('audioPreview');
        prev.innerHTML = `<audio controls src="${url}"></audio>
          <button class="clear-audio" onclick="clearAudio()">[ × REMOVE VOICE NOTE ]</button>`;
        document.getElementById('recStatus').textContent = `Recorded ✓ (${fmtBytes(audioSizeB64(b64))})`;
        document.getElementById('recTimer').style.display='none';
        checkStorageWarning();
      };
      reader.readAsDataURL(blob);
    };
    mediaRec.start();
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recIcon').className='rec-icon stop';
    document.getElementById('recStatus').textContent='Recording...';
    document.getElementById('recTimer').style.display='block';
    recInterval = setInterval(()=>{
      recSecs++;
      const m=Math.floor(recSecs/60),s=recSecs%60;
      document.getElementById('recTimer').textContent=`${m}:${pad(s)}`;
    },1000);
  } catch(err) {
    toast('// MIC ACCESS DENIED', 'err');
  }
}

function stopRecording(save=true) {
  if (recInterval) { clearInterval(recInterval); recInterval=null; }
  if (mediaRec) {
    if (mediaRec.state==='recording') {
      if (save) mediaRec.stop();
      else { mediaRec.stream?.getTracks().forEach(t=>t.stop()); mediaRec=null; }
    } else mediaRec=null;
  }
  const btn=document.getElementById('recBtn'), icon=document.getElementById('recIcon');
  if(btn) btn.classList.remove('recording');
  if(icon) icon.className='rec-icon';
}

function clearAudio() {
  pendingAudioB64=null; pendingAudioMime=null;
  document.getElementById('audioPreview').innerHTML='';
  document.getElementById('recStatus').textContent='Tap to record';
  checkStorageWarning();
}

// ── SAVE ───────────────────────────────────────────────────────
function saveEntry() {
  const tag=currentTag;
  const title=document.getElementById('f_title')?.value.trim();
  if (!title) { toast('// TITLE REQUIRED','err'); return; }

  // Final storage check before save
  if (pendingAudioB64) {
    const projected = getStorageUsedBytes() + audioSizeB64(pendingAudioB64);
    if (projected / LIMIT_BYTES >= BLOCK_PCT) {
      toast('// STORAGE FULL — remove voice note or delete old ones','err');
      openFullSheet(); return;
    }
  }

  let entry = {id:Date.now().toString(),tag,ts:Date.now(),title};
  if (pendingAudioB64) { entry.audio=pendingAudioB64; entry.audioMime=pendingAudioMime; }
  if (tag==='action') {
    entry.sev = document.querySelector('.sev-opt.sel')?.dataset.v || 'normal';
    entry.desc = document.getElementById('f_desc')?.value.trim()||'';
    entry.due = document.getElementById('f_due')?.value||null;
    entry.done = document.getElementById('f_done')?.checked||false;
  } else {
    entry.body = document.getElementById('f_body')?.value.trim()||'';
  }

  entries.push(entry);
  persist();
  closeNew(); render();
  toast('// SAVED');
}

// ── VIEW ───────────────────────────────────────────────────────
function viewEntry(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('viewBar').className=`sheet-bar ${e.tag}`;
  const vt=document.getElementById('viewTitle');
  vt.className=`sheet-title ${e.tag}`; vt.textContent=`> ${e.tag.toUpperCase()}`;
  document.getElementById('viewTime').textContent=`// logged ${fmt(e.ts)}`;
  const vc=document.getElementById('viewContent');
  let html=`<div class="view-title">${esc(e.title)}</div>`;
  if (e.tag==='action') {
    const od=overdue(e.due,e.done);
    html+=`<div class="view-row">
      <span class="chip ${e.sev}">${e.sev.toUpperCase()}</span>
      ${e.done?'<span class="chip done-chip">✓ DONE</span>':''}
      ${e.due?`<span class="due-badge ${od?'od':''}">${od?'⚠ ':''}DUE ${fmtDate(e.due)}</span>`:''}
    </div>`;
    if(e.desc) html+=`<div class="view-block" style="margin-top:10px;">${esc(e.desc)}</div>`;
    html+=`<button class="act-btn ${e.done?'undone-btn':'done-btn'}" onclick="toggleDone('${e.id}')">${e.done?'MARK AS PENDING':'MARK AS DONE ✓'}</button>`;
    if(e.due&&!e.done) html+=`<button class="act-btn cal-btn" onclick="exportICS('${e.id}')">📅 ADD TO CALENDAR (.ICS)</button>`;
  } else {
    if(e.body) html+=`<div class="view-block" style="margin-top:4px;">${esc(e.body)}</div>`;
  }
  if(e.audio) {
    const url=`data:${e.audioMime};base64,${e.audio}`;
    html+=`<div style="margin-top:14px;"><div class="lbl" style="margin-top:0;">// VOICE NOTE</div><audio controls src="${url}"></audio></div>`;
  }
  vc.innerHTML=html;
  document.getElementById('viewOverlay').classList.add('open');
}

function closeView() { document.getElementById('viewOverlay').classList.remove('open'); }
function toggleDone(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  e.done=!e.done; persist(); render(); viewEntry(id);
}

// ── STORAGE FULL SHEET ────────────────────────────────────────
function openFullSheet() {
  const used = getStorageUsedBytes();
  const pct = Math.round(Math.min(used/LIMIT_BYTES,1)*100);
  document.getElementById('fullPct').textContent = `${pct}%`;

  const withAudio = entries.filter(e=>e.audio).sort((a,b)=>audioSizeB64(b.audio)-audioSizeB64(a.audio));
  const vel = document.getElementById('voiceEntryList');
  if (!withAudio.length) {
    vel.innerHTML = `<p style="font-size:11px;color:var(--muted2);">No voice notes found. Storage may be used by other data.</p>`;
  } else {
    vel.innerHTML = withAudio.map(e=>`
      <div class="voice-entry-row">
        <div class="ve-info">
          <div class="ve-title">${esc(e.title)}</div>
          <div class="ve-size">${fmt(e.ts)} · ${fmtBytes(audioSizeB64(e.audio))}</div>
        </div>
        <button class="ve-del" onclick="deleteVoice('${e.id}')">× DEL</button>
      </div>`).join('');
  }
  document.getElementById('fullOverlay').classList.add('open');
}

function closeFullSheet() { document.getElementById('fullOverlay').classList.remove('open'); }

function deleteVoice(id) {
  const e=entries.find(x=>x.id===id); if(!e) return;
  delete e.audio; delete e.audioMime;
  persist(); render(); updateStorageUI();
  openFullSheet(); // re-render the list
  toast('// VOICE NOTE REMOVED');
  checkStorageWarning();
}

// ── ICS ────────────────────────────────────────────────────────
function exportICS(id) {
  const e=entries.find(x=>x.id===id); if(!e||!e.due) return;
  const d=e.due.replace(/-/g,'');
  const stamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SCRATCHPAD//EN',
    'BEGIN:VEVENT',`UID:${e.id}@scratchpad`,`DTSTAMP:${stamp}`,
    `DTSTART;VALUE=DATE:${d}`,`DTEND;VALUE=DATE:${d}`,
    `SUMMARY:[${(e.sev||'').toUpperCase()}] ${(e.title||'').replace(/,/g,'\\,')}`,
    e.desc?`DESCRIPTION:${e.desc.replace(/\n/g,'\\n')}`:'',
    'END:VEVENT','END:VCALENDAR'].filter(Boolean).join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${(e.title||'action').replace(/\s+/g,'_').slice(0,30)}.ics`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url); toast('// .ICS DOWNLOADED');
}

// ── DELETE ENTRY ───────────────────────────────────────────────
function delEntry(evt,id) {
  evt.stopPropagation();
  entries=entries.filter(e=>e.id!==id);
  persist(); render(); toast('// DELETED');
}

// ── CLOCK ──────────────────────────────────────────────────────
function tick(){const n=new Date();document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;}
setInterval(tick,1000); tick();

load(); render();
</script>
</body>
